<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 가계부 - 스마트 자산관리</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3182F6;--primary-dark:#1B64DA;--primary-light:#EBF4FF;
  --bg:#F5F6F8;--white:#fff;--gray-50:#F9FAFB;--gray-100:#F2F4F6;
  --gray-200:#E5E8EB;--gray-300:#D1D6DB;--gray-400:#B0B8C1;
  --gray-500:#8B95A1;--gray-600:#6B7684;--gray-700:#4E5968;
  --gray-800:#333D4B;--gray-900:#191F28;
  --income:#3182F6;--expense:#F04452;--green:#00C853;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --shadow:0 2px 8px rgba(0,0,0,.06);--shadow-lg:0 8px 24px rgba(0,0,0,.1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--gray-900);line-height:1.5;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 100px;position:relative;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#3182F6 0%,#1B64DA 100%);color:#fff;padding:24px 20px 32px;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.08);border-radius:50%}
.header::before{content:'';position:absolute;bottom:-20px;left:30%;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;position:relative;z-index:1}
.header-title{font-size:18px;font-weight:700}
.month-nav{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.month-nav button:hover{background:rgba(255,255,255,.35)}
.month-nav span{font-size:16px;font-weight:600;min-width:120px;text-align:center}

/* Summary Cards */
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px;margin-top:-20px;position:relative;z-index:2}
.summary-card{background:var(--white);border-radius:var(--radius-sm);padding:16px 14px;box-shadow:var(--shadow);text-align:center}
.summary-card .label{font-size:12px;color:var(--gray-500);font-weight:500;margin-bottom:6px}
.summary-card .amount{font-size:16px;font-weight:700}
.summary-card.income .amount{color:var(--income)}
.summary-card.expense .amount{color:var(--expense)}
.summary-card.balance .amount{color:var(--gray-900)}

/* Section */
.section{padding:20px 16px 0}
.section-title{font-size:16px;font-weight:700;color:var(--gray-800);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:18px}

/* Chart Container */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;margin-top:20px}
.chart-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.chart-card h3{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:12px}
.chart-card canvas{width:100%!important;height:auto!important}

/* Donut Legend */
.donut-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.donut-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--gray-600)}
.donut-legend-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Transactions */
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{background:var(--white);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.tx-item:active{transform:scale(.98)}
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-title{font-size:14px;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.tx-date{font-size:11px;color:var(--gray-500)}
.tx-cat-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.tx-amount{font-size:15px;font-weight:700;white-space:nowrap}
.tx-amount.income{color:var(--income)}
.tx-amount.expense{color:var(--expense)}

.empty-state{text-align:center;padding:48px 20px;color:var(--gray-400)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* FAB */
.fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:56px;height:56px;background:linear-gradient(135deg,#3182F6,#1B64DA);color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(49,130,246,.4);z-index:100;display:flex;align-items:center;justify-content:center;transition:.2s}
.fab:hover{transform:translateX(-50%) scale(1.08)}

/* Modal Overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:var(--gray-100);border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-600)}

/* Tabs */
.type-tabs{display:flex;gap:8px;padding:16px 20px}
.type-tab{flex:1;padding:10px;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;background:var(--gray-100);color:var(--gray-500)}
.type-tab.active-income{background:var(--primary-light);color:var(--income)}
.type-tab.active-expense{background:#FFEBEE;color:var(--expense)}

/* Form */
.form-body{padding:0 20px 32px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:8px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);font-size:15px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.amount-input-wrap{position:relative}
.amount-input-wrap .currency{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:600;color:var(--gray-400)}
.amount-input-wrap input{padding-left:28px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:1.5px solid var(--gray-200);border-radius:var(--radius-xs);background:var(--white);cursor:pointer;transition:.2s;font-size:11px;color:var(--gray-600);font-family:inherit}
.cat-btn .cat-icon{font-size:22px}
.cat-btn.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#3182F6,#1B64DA);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{background:var(--gray-300);cursor:not-allowed}

/* Delete */
.tx-item .delete-btn{opacity:0;width:28px;height:28px;border-radius:50%;border:none;background:var(--gray-100);color:var(--expense);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
.tx-item:hover .delete-btn{opacity:1}

/* Responsive */
@media(max-width:400px){
  .summary{grid-template-columns:1fr;gap:8px}
  .chart-row{grid-template-columns:1fr}
  .summary-card .amount{font-size:14px}
}
@media(min-width:401px) and (max-width:480px){
  .summary-card .amount{font-size:14px}
}

/* Scroll */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">내 가계부</div>
    </div>
    <div class="month-nav">
      <button id="prevMonth">&#8249;</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">&#8250;</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card income">
      <div class="label">수입</div>
      <div class="amount" id="totalIncome">0원</div>
    </div>
    <div class="summary-card expense">
      <div class="label">지출</div>
      <div class="amount" id="totalExpense">0원</div>
    </div>
    <div class="summary-card balance">
      <div class="label">잔액</div>
      <div class="amount" id="totalBalance">0원</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-row">
    <div class="chart-card">
      <h3>카테고리별 지출</h3>
      <canvas id="donutChart" width="200" height="200"></canvas>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
    <div class="chart-card">
      <h3>월별 수입/지출</h3>
      <canvas id="barChart" width="200" height="200"></canvas>
    </div>
  </div>

  <!-- Transaction List -->
  <div class="section">
    <div class="section-title"><span class="icon">📋</span>거래 내역</div>
    <div class="tx-list" id="txList"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabAdd">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>거래 추가</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="type-tabs">
      <button class="type-tab active-expense" id="tabExpense" data-type="expense">지출</button>
      <button class="type-tab" id="tabIncome" data-type="income">수입</button>
    </div>
    <div class="form-body">
      <div class="form-group">
        <label>금액</label>
        <div class="amount-input-wrap">
          <span class="currency">&#8361;</span>
          <input type="number" class="form-input" id="inputAmount" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-group" id="catGroup">
        <label>카테고리</label>
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <div class="form-group">
        <label>메모</label>
        <input type="text" class="form-input" id="inputMemo" placeholder="내용을 입력하세요">
      </div>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" class="form-input" id="inputDate">
      </div>
      <button class="submit-btn" id="submitBtn">추가하기</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  {id:'food',name:'식비',icon:'🍚',color:'#FF6B6B',bg:'#FFF0F0'},
  {id:'transport',name:'교통',icon:'🚌',color:'#4ECDC4',bg:'#E8FAF8'},
  {id:'shopping',name:'쇼핑',icon:'🛍️',color:'#A78BFA',bg:'#F3EEFF'},
  {id:'culture',name:'문화',icon:'🎬',color:'#F59E0B',bg:'#FFF8E7'},
  {id:'medical',name:'의료',icon:'🏥',color:'#EF4444',bg:'#FEE2E2'},
  {id:'housing',name:'주거',icon:'🏠',color:'#3B82F6',bg:'#EFF6FF'},
  {id:'telecom',name:'통신',icon:'📱',color:'#8B5CF6',bg:'#F3EEFF'},
  {id:'etc',name:'기타',icon:'📦',color:'#6B7280',bg:'#F3F4F6'}
];

const STORAGE_KEY = 'finance_app_data';
let currentYear, currentMonth, selectedType = 'expense', selectedCat = null;

function initDate(){
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
}

function loadData(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch{ return []; }
}
function saveData(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function formatMoney(n){
  return n.toLocaleString('ko-KR')+'원';
}

function getMonthTx(year, month){
  return loadData().filter(t=>{
    const d = new Date(t.date);
    return d.getFullYear()===year && d.getMonth()===month;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function updateMonthLabel(){
  document.getElementById('monthLabel').textContent = `${currentYear}년 ${currentMonth+1}월`;
}

function updateSummary(){
  const txs = getMonthTx(currentYear, currentMonth);
  const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('totalIncome').textContent = formatMoney(inc);
  document.getElementById('totalExpense').textContent = formatMoney(exp);
  document.getElementById('totalBalance').textContent = formatMoney(inc-exp);
}

function renderTxList(){
  const list = document.getElementById('txList');
  const txs = getMonthTx(currentYear, currentMonth);
  if(!txs.length){
    list.innerHTML = '<div class="empty-state"><div class="icon">💰</div><p>거래 내역이 없습니다.<br>아래 + 버튼으로 추가해보세요!</p></div>';
    return;
  }
  list.innerHTML = txs.map(t=>{
    const cat = CATEGORIES.find(c=>c.id===t.category) || CATEGORIES[7];
    const d = new Date(t.date);
    const dateStr = `${d.getMonth()+1}.${d.getDate()}`;
    const sign = t.type==='income'?'+':'-';
    return `<div class="tx-item" data-id="${t.id}">
      <div class="tx-icon" style="background:${cat.bg}">${cat.icon}</div>
      <div class="tx-info">
        <div class="tx-title">${t.memo||cat.name}</div>
        <div class="tx-meta">
          <span class="tx-date">${dateStr}</span>
          <span class="tx-cat-tag" style="background:${cat.bg};color:${cat.color}">${cat.name}</span>
        </div>
      </div>
      <div class="tx-amount ${t.type}">${sign}${formatMoney(t.amount)}</div>
      <button class="delete-btn" onclick="deleteTx('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

function deleteTx(id){
  let data = loadData().filter(t=>t.id!==id);
  saveData(data);
  refresh();
}

function drawDonut(){
  const canvas = document.getElementById('donutChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  canvas.width = 200*dpr; canvas.height = 200*dpr;
  canvas.style.width='200px'; canvas.style.height='200px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,200,200);

  const txs = getMonthTx(currentYear, currentMonth).filter(t=>t.type==='expense');
  const catTotals = {};
  txs.forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+t.amount; });
  const entries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,e)=>s+e[1],0);

  const legend = document.getElementById('donutLegend');
  if(!total){
    ctx.fillStyle='#E5E8EB';
    ctx.beginPath(); ctx.arc(100,100,70,0,Math.PI*2); ctx.arc(100,100,45,0,Math.PI*2,true); ctx.fill();
    ctx.fillStyle='#8B95A1'; ctx.font='500 13px Inter'; ctx.textAlign='center'; ctx.fillText('데이터 없음',100,104);
    legend.innerHTML='';
    return;
  }

  let startAngle = -Math.PI/2;
  entries.forEach(([catId, amt])=>{
    const cat = CATEGORIES.find(c=>c.id===catId)||CATEGORIES[7];
    const sweep = (amt/total)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(100,100,70,startAngle,startAngle+sweep);
    ctx.arc(100,100,45,startAngle+sweep,startAngle,true);
    ctx.closePath();
    ctx.fillStyle=cat.color;
    ctx.fill();
    startAngle+=sweep;
  });

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(100,100,43,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=('#191F28'); ctx.font='700 14px Inter'; ctx.textAlign='center';
  ctx.fillText(formatMoney(total),100,98);
  ctx.fillStyle='#8B95A1'; ctx.font='500 10px Inter';
  ctx.fillText('총 지출',100,114);

  legend.innerHTML = entries.map(([catId, amt])=>{
    const cat = CATEGORIES.find(c=>c.id===catId)||CATEGORIES[7];
    const pct = Math.round(amt/total*100);
    return `<div class="donut-legend-item"><span class="dot" style="background:${cat.color}"></span>${cat.name} ${pct}%</div>`;
  }).join('');
}

function drawBar(){
  const canvas = document.getElementById('barChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  canvas.width=200*dpr; canvas.height=200*dpr;
  canvas.style.width='200px'; canvas.style.height='200px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,200,200);

  const all = loadData();
  const months = [];
  for(let i=5;i>=0;i--){
    let m=currentMonth-i, y=currentYear;
    while(m<0){m+=12;y--;}
    const mtx = all.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m;});
    const inc = mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    months.push({label:`${m+1}월`,inc,exp});
  }

  const maxVal = Math.max(...months.map(m=>Math.max(m.inc,m.exp)),1);
  const chartH=150, chartY=10, barW=10, groupW=200/6;

  months.forEach((m,i)=>{
    const x = i*groupW+groupW/2;
    const hInc = (m.inc/maxVal)*chartH;
    const hExp = (m.exp/maxVal)*chartH;

    // income bar
    ctx.fillStyle='#3182F6';
    ctx.beginPath();
    const iy=chartY+chartH-hInc;
    roundRect(ctx,x-barW-1,iy,barW,hInc,3);
    ctx.fill();

    // expense bar
    ctx.fillStyle='#F04452';
    ctx.beginPath();
    roundRect(ctx,x+1,chartY+chartH-hExp,barW,hExp,3);
    ctx.fill();

    // label
    ctx.fillStyle='#8B95A1'; ctx.font='500 9px Inter'; ctx.textAlign='center';
    ctx.fillText(m.label,x,chartY+chartH+14);
  });

  // legend
  ctx.fillStyle='#3182F6'; roundRect(ctx,40,chartY+chartH+26,8,8,2); ctx.fill();
  ctx.fillStyle='#4E5968'; ctx.font='500 9px Inter'; ctx.textAlign='left'; ctx.fillText('수입',52,chartY+chartH+34);
  ctx.fillStyle='#F04452'; roundRect(ctx,80,chartY+chartH+26,8,8,2); ctx.fill();
  ctx.fillStyle='#4E5968'; ctx.fillText('지출',92,chartY+chartH+34);
}

function roundRect(ctx,x,y,w,h,r){
  if(h<=0)return;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function refresh(){
  updateMonthLabel();
  updateSummary();
  renderTxList();
  drawDonut();
  drawBar();
}

// Month nav
document.getElementById('prevMonth').onclick=()=>{
  currentMonth--;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  refresh();
};
document.getElementById('nextMonth').onclick=()=>{
  currentMonth++;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  refresh();
};

// Modal
const overlay = document.getElementById('modalOverlay');
document.getElementById('fabAdd').onclick=()=>{
  openModal();
};
document.getElementById('modalClose').onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};

function openModal(){
  selectedType='expense'; selectedCat=null;
  document.getElementById('tabExpense').className='type-tab active-expense';
  document.getElementById('tabIncome').className='type-tab';
  document.getElementById('catGroup').style.display='block';
  document.getElementById('inputAmount').value='';
  document.getElementById('inputMemo').value='';
  document.getElementById('inputDate').value=todayStr();
  renderCatGrid();
  overlay.classList.add('active');
}
function closeModal(){ overlay.classList.remove('active'); }

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Tabs
document.getElementById('tabExpense').onclick=()=>{
  selectedType='expense'; selectedCat=null;
  document.getElementById('tabExpense').className='type-tab active-expense';
  document.getElementById('tabIncome').className='type-tab';
  document.getElementById('catGroup').style.display='block';
  renderCatGrid();
};
document.getElementById('tabIncome').onclick=()=>{
  selectedType='income'; selectedCat=null;
  document.getElementById('tabIncome').className='type-tab active-income';
  document.getElementById('tabExpense').className='type-tab';
  document.getElementById('catGroup').style.display='none';
};

function renderCatGrid(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c=>
    `<button class="cat-btn ${selectedCat===c.id?'selected':''}" data-id="${c.id}">
      <span class="cat-icon">${c.icon}</span>${c.name}
    </button>`
  ).join('');
  grid.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.onclick=()=>{
      selectedCat=btn.dataset.id;
      renderCatGrid();
    };
  });
}

// Submit
document.getElementById('submitBtn').onclick=()=>{
  const amount = parseInt(document.getElementById('inputAmount').value);
  if(!amount||amount<=0)return alert('금액을 입력해주세요.');
  if(selectedType==='expense'&&!selectedCat)return alert('카테고리를 선택해주세요.');
  const memo = document.getElementById('inputMemo').value.trim();
  const date = document.getElementById('inputDate').value;
  if(!date)return alert('날짜를 선택해주세요.');

  const tx = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    type: selectedType,
    amount,
    category: selectedType==='income'?'etc':selectedCat,
    memo,
    date
  };
  const data = loadData();
  data.push(tx);
  saveData(data);
  closeModal();

  // Navigate to the month of the new tx
  const d=new Date(date);
  currentYear=d.getFullYear();
  currentMonth=d.getMonth();
  refresh();
};
