<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 문의 — ONESTEP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0B1120;
      --surface: #111827;
      --surface-light: #1E293B;
      --border: rgba(148,163,184,0.08);
      --border-light: rgba(148,163,184,0.12);
      --text: #F1F5F9;
      --text-sub: #94A3B8;
      --text-muted: #64748B;
      --primary: #818CF8;
      --primary-deep: #6366F1;
      --live: #34D399;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      background-image:
        radial-gradient(circle, rgba(148,163,184,0.07) 1px, transparent 1px),
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(129,140,248,0.03) 0%, transparent 50%);
      background-size: 24px 24px, 100% 100%, 100% 100%;
      background-attachment: fixed;
    }

    a { text-decoration: none; color: inherit; }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text-sub);
      transition: color 0.3s;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }

    .back-link:hover {
      color: var(--primary);
    }

    /* Container */
    .contact-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    /* Header */
    .contact-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .contact-label {
      font-size: 0.72rem;
      letter-spacing: 4px;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .contact-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .contact-header p {
      font-size: 0.95rem;
      color: var(--text-sub);
      line-height: 1.7;
      word-break: keep-all;
    }

    /* Contact info */
    .contact-info {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .contact-info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .contact-info-item span {
      color: var(--text-sub);
      font-weight: 500;
    }

    /* Form */
    .contact-form {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 40px 36px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full {
      grid-column: span 2;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .form-label .required {
      color: #EF4444;
      margin-left: 2px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-light);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.3s;
      outline: none;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--text-muted);
    }

    .form-select {
      appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 40px;
    }

    .form-select option {
      background: var(--surface);
      color: var(--text);
    }

    .form-textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    /* Budget chips */
    .budget-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .budget-chip {
      padding: 8px 16px;
      background: var(--surface-light);
      border: 1px solid var(--border-light);
      border-radius: 100px;
      font-size: 0.82rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }

    .budget-chip:hover {
      border-color: rgba(129,140,248,0.3);
      color: var(--text);
    }

    .budget-chip.selected {
      background: linear-gradient(135deg, var(--primary-deep), var(--primary));
      border-color: var(--primary);
      color: #fff;
    }

    .budget-chip input {
      display: none;
    }

    /* Submit */
    .form-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-deep), var(--primary));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 24px rgba(99,102,241,0.3);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .form-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .form-submit:hover::before {
      left: 100%;
    }

    .form-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(99,102,241,0.45);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-light);
      color: var(--text);
      border: 1px solid var(--live);
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer note */
    .contact-footer {
      text-align: center;
      padding: 40px 0;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .contact-page {
        padding: 80px 16px 40px;
      }

      .contact-form {
        padding: 28px 20px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .form-group.full {
        grid-column: span 1;
      }

      .contact-header h1 {
        font-size: 1.6rem;
      }

      .back-link {
        position: static;
        display: inline-flex;
        margin-bottom: 20px;
      }

      .budget-chip {
        font-size: 0.78rem;
        padding: 7px 14px;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← 포트폴리오로 돌아가기</a>

  <div class="contact-page">
    <div class="contact-header">
      <p class="contact-label">ONESTEP</p>
      <h1>프로젝트 문의하기</h1>
      <p>아래 양식을 작성해 주시면 24시간 내에 답변 드리겠습니다.<br>간단한 아이디어라도 괜찮아요.</p>
      <div class="contact-info">
        <div class="contact-info-item">
          📧 <span>wogns5486@gmail.com</span>
        </div>
        <div class="contact-info-item">
          📱 <span>010-2656-9757</span>
        </div>
      </div>
    </div>

    <form class="contact-form" id="contactForm" onsubmit="submitForm(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="clientName">이름 / 회사명 <span class="required">*</span></label>
          <input type="text" class="form-input" id="clientName" placeholder="홍길동 / 주식회사 OO" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="clientContact">연락처 <span class="required">*</span></label>
          <input type="text" class="form-input" id="clientContact" placeholder="이메일 또는 전화번호" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="projectType">프로젝트 유형</label>
        <select class="form-select" id="projectType">
          <option value="">선택해 주세요</option>
          <option value="랜딩페이지">랜딩페이지 / 홈페이지</option>
          <option value="쇼핑몰">쇼핑몰</option>
          <option value="웹앱">웹앱 / SaaS</option>
          <option value="모바일앱">모바일 앱</option>
          <option value="대시보드">관리자 대시보드</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" id="budgetLabel">예상 예산</label>
        <div class="budget-chips" role="radiogroup" aria-labelledby="budgetLabel">
          <label class="budget-chip" onclick="selectBudget(this)">
            <input type="radio" name="budget" value="30만원 이하">30만원 이하
          </label>
          <label class="budget-chip" onclick="selectBudget(this)">
            <input type="radio" name="budget" value="30~50만원">30~50만원
          </label>
          <label class="budget-chip" onclick="selectBudget(this)">
            <input type="radio" name="budget" value="50~100만원">50~100만원
          </label>
          <label class="budget-chip" onclick="selectBudget(this)">
            <input type="radio" name="budget" value="100만원 이상">100만원 이상
          </label>
          <label class="budget-chip" onclick="selectBudget(this)">
            <input type="radio" name="budget" value="협의">협의
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="timeline">희망 완성 시기</label>
        <select class="form-select" id="timeline">
          <option value="">선택해 주세요</option>
          <option value="1주 이내">1주 이내</option>
          <option value="2주 이내">2주 이내</option>
          <option value="1개월 이내">1개월 이내</option>
          <option value="여유있음">여유있게</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="projectDesc">프로젝트 설명 <span class="required">*</span></label>
        <textarea class="form-textarea" id="projectDesc" placeholder="어떤 사이트/앱을 만들고 싶으신지 자유롭게 적어주세요.&#10;&#10;예시: 카페 홈페이지를 만들고 싶어요. 메뉴판, 예약 기능, 지도가 필요합니다." required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="refSite">참고 사이트 (선택)</label>
        <input type="text" class="form-input" id="refSite" placeholder="https://example.com">
      </div>

      <button type="submit" class="form-submit">문의 보내기 →</button>
    </form>

    <div class="contact-footer">
      <p>© 2025 ONESTEP. 빠르고 정확하게, 합리적으로.</p>
    </div>
  </div>

  <div class="toast" id="toast">문의 메일이 준비되었습니다!</div>

  <script>
    function selectBudget(el) {
      document.querySelectorAll('.budget-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }

    function submitForm(e) {
      e.preventDefault();

      const name = document.getElementById('clientName').value;
      const contact = document.getElementById('clientContact').value;
      const type = document.getElementById('projectType').value || '미선택';
      const budget = document.querySelector('input[name="budget"]:checked');
      const budgetVal = budget ? budget.value : '미선택';
      const timeline = document.getElementById('timeline').value || '미선택';
      const desc = document.getElementById('projectDesc').value;
      const ref = document.getElementById('refSite').value || '없음';

      const subject = '[ONESTEP 문의] ' + name + ' - ' + type;
      const bodyText =
        '=== ONESTEP 프로젝트 문의 ===\n\n' +
        '■ 이름/회사: ' + name + '\n' +
        '■ 연락처: ' + contact + '\n' +
        '■ 프로젝트 유형: ' + type + '\n' +
        '■ 예상 예산: ' + budgetVal + '\n' +
        '■ 희망 완성 시기: ' + timeline + '\n' +
        '■ 참고 사이트: ' + ref + '\n\n' +
        '■ 프로젝트 설명:\n' + desc + '\n\n' +
        '---\n' +
        'ONESTEP 포트폴리오에서 전송됨';

      // 1순위: Gmail 작성 창 새 탭으로 열기
      const gmailUrl = 'https://mail.google.com/mail/?view=cm&to=wogns5486@gmail.com'
        + '&su=' + encodeURIComponent(subject)
        + '&body=' + encodeURIComponent(bodyText);

      const newWindow = window.open(gmailUrl, '_blank');

      // Gmail 창이 안 열리면 (팝업 차단 등) 클립보드 복사로 대체
      if (!newWindow || newWindow.closed) {
        navigator.clipboard.writeText(
          '받는 사람: wogns5486@gmail.com\n제목: ' + subject + '\n\n' + bodyText
        ).then(() => {
          showToast('문의 내용이 클립보드에 복사되었습니다! wogns5486@gmail.com으로 보내주세요.');
        });
      } else {
        showToast('Gmail 작성 창이 열렸습니다. 전송 버튼을 눌러주세요!');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
