<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주차장 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0f0d;
  --bg-secondary: #111a16;
  --bg-card: #152019;
  --bg-card-hover: #1a2b22;
  --border: #1e3a2a;
  --border-light: #2a5040;
  --green-primary: #22c55e;
  --green-light: #4ade80;
  --green-dim: #16a34a;
  --green-dark: #0d5c2e;
  --green-glow: rgba(34,197,94,0.15);
  --green-glow-strong: rgba(34,197,94,0.3);
  --text-primary: #e8f5ec;
  --text-secondary: #8fbfa3;
  --text-muted: #5a8a70;
  --red: #ef4444;
  --red-dim: #dc2626;
  --yellow: #eab308;
  --yellow-dim: #ca8a04;
  --blue: #3b82f6;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 20px var(--green-glow);
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.header h1 span {
  color: var(--green-primary);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.clock {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: var(--green-primary);
  color: #000;
  box-shadow: 0 0 20px var(--green-glow);
}

.btn-primary:hover {
  background: var(--green-light);
  box-shadow: 0 0 30px var(--green-glow-strong);
  transform: translateY(-1px);
}

.btn-danger {
  background: var(--red);
  color: #fff;
}

.btn-danger:hover {
  background: var(--red-dim);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  border-color: var(--green-primary);
  color: var(--green-primary);
}

/* Main Layout */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}

.stat-card.green::before { background: var(--green-primary); }
.stat-card.red::before { background: var(--red); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.blue::before { background: var(--blue); }

.stat-card:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.stat-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.stat-card.green .stat-value { color: var(--green-primary); }
.stat-card.red .stat-value { color: var(--red); }
.stat-card.yellow .stat-value { color: var(--yellow); }
.stat-card.blue .stat-value { color: var(--blue); }

.stat-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  margin-top: 12px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
  background: var(--green-primary);
}

/* Content Grid */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body {
  padding: 20px;
}

/* Parking Map */
.parking-map {
  grid-column: 1 / -1;
}

.zone-tabs {
  display: flex;
  gap: 8px;
}

.zone-tab {
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  transition: all 0.2s;
}

.zone-tab.active,
.zone-tab:hover {
  background: var(--green-primary);
  color: #000;
  border-color: var(--green-primary);
}

.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}

.slot {
  aspect-ratio: 1.2;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
}

.slot-id {
  font-size: 11px;
  font-weight: 700;
  opacity: 0.8;
  margin-bottom: 2px;
}

.slot-icon {
  font-size: 22px;
  margin-bottom: 2px;
}

.slot-plate {
  font-size: 9px;
  font-weight: 500;
  opacity: 0.7;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
}

.slot.empty {
  background: rgba(34,197,94,0.08);
  border-color: rgba(34,197,94,0.2);
  color: var(--green-primary);
}

.slot.empty:hover {
  background: rgba(34,197,94,0.15);
  border-color: var(--green-primary);
  transform: scale(1.05);
}

.slot.occupied {
  background: rgba(239,68,68,0.08);
  border-color: rgba(239,68,68,0.2);
  color: var(--red);
}

.slot.occupied:hover {
  background: rgba(239,68,68,0.15);
  border-color: var(--red);
  transform: scale(1.05);
}

.slot.reserved {
  background: rgba(234,179,8,0.08);
  border-color: rgba(234,179,8,0.2);
  color: var(--yellow);
}

.slot.reserved:hover {
  background: rgba(234,179,8,0.15);
  border-color: var(--yellow);
  transform: scale(1.05);
}

/* Legend */
.legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.legend-dot.empty { background: var(--green-primary); }
.legend-dot.occupied { background: var(--red); }
.legend-dot.reserved { background: var(--yellow); }

/* Records Table */
.records-section {
  grid-column: 1 / -1;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
}

td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid rgba(30,58,42,0.5);
  font-variant-numeric: tabular-nums;
}

tr:hover td {
  background: rgba(34,197,94,0.03);
}

.badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.badge-active {
  background: rgba(34,197,94,0.15);
  color: var(--green-primary);
}

.badge-complete {
  background: rgba(100,116,139,0.15);
  color: #94a3b8;
}

.fee {
  font-weight: 700;
  color: var(--green-primary);
}

.exit-btn {
  padding: 5px 12px;
  border: 1px solid var(--red);
  background: transparent;
  color: var(--red);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.exit-btn:hover {
  background: var(--red);
  color: #fff;
}

/* Revenue Card */
.revenue-card .stat-value {
  color: var(--green-primary);
}

.revenue-breakdown {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.revenue-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(30,58,42,0.3);
}

.revenue-row:last-child { border-bottom: none; }
.revenue-row .label { color: var(--text-secondary); }
.revenue-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }

/* Zone Summary */
.zone-summary {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.zone-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.zone-label {
  font-size: 14px;
  font-weight: 700;
  width: 50px;
  color: var(--green-primary);
}

.zone-progress {
  flex: 1;
  height: 24px;
  background: var(--bg-primary);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.zone-progress-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--green-dark), var(--green-primary));
}

.zone-progress-text {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  width: 90%;
  max-width: 440px;
  transform: translateY(20px) scale(0.95);
  transition: transform 0.3s;
  box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}

.modal-overlay.show .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  font-size: 18px;
  font-weight: 700;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.modal-close:hover {
  background: rgba(239,68,68,0.1);
  color: var(--red);
}

.modal-body {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--green-primary);
  box-shadow: 0 0 0 3px var(--green-glow);
}

.form-group select option {
  background: var(--bg-secondary);
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Exit Modal */
.exit-info {
  background: var(--bg-primary);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.exit-info-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.exit-info-row .label { color: var(--text-secondary); }
.exit-info-row .value { font-weight: 600; }
.exit-info-row.total { font-size: 18px; border-top: 1px solid var(--border); padding-top: 10px; }
.exit-info-row.total .value { color: var(--green-primary); font-weight: 800; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.empty-state-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* Responsive */
@media (max-width: 1024px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .content-grid { grid-template-columns: 1fr; }
  .slots-grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
}

@media (max-width: 768px) {
  .header { flex-direction: column; gap: 12px; padding: 12px 16px; }
  .main { padding: 16px; gap: 16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-value { font-size: 24px; }
  .slots-grid { grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 6px; }
  .legend { flex-wrap: wrap; gap: 12px; }
  th, td { padding: 8px 10px; font-size: 12px; }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stats-row .stat-card:last-child { grid-column: 1 / -1; }
  .zone-tabs { flex-wrap: wrap; }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: fadeIn 0.4s ease; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="header-icon">P</div>
    <h1><span>PARK</span>ING 관리 시스템</h1>
  </div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <button class="btn btn-primary" onclick="openEntryModal()">+ 입차 등록</button>
  </div>
</header>

<!-- Main -->
<main class="main">
  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card green">
      <div class="stat-label">총 슬롯</div>
      <div class="stat-value" id="totalSlots">40</div>
      <div class="stat-sub">4개 구역</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">사용중</div>
      <div class="stat-value" id="usedSlots">0</div>
      <div class="stat-sub" id="usedPercent">0%</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">빈자리</div>
      <div class="stat-value" id="freeSlots">40</div>
      <div class="stat-sub">이용 가능</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">예약</div>
      <div class="stat-value" id="reservedSlots">0</div>
      <div class="stat-sub">예약 대기</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">이용률</div>
      <div class="stat-value" id="utilRate">0%</div>
      <div class="progress-bar"><div class="progress-fill" id="utilBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Parking Map -->
  <div class="card parking-map">
    <div class="card-header">
      <div class="card-title">🅿️ 주차장 맵</div>
      <div class="zone-tabs" id="zoneTabs"></div>
    </div>
    <div class="card-body">
      <div class="slots-grid" id="slotsGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot empty"></div>빈자리</div>
        <div class="legend-item"><div class="legend-dot occupied"></div>사용중</div>
        <div class="legend-item"><div class="legend-dot reserved"></div>예약</div>
      </div>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="content-grid">
    <!-- Revenue -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">💰 일일 매출 통계</div>
      </div>
      <div class="card-body">
        <div class="stat-label">오늘 총 매출</div>
        <div class="stat-value" style="color:var(--green-primary)" id="todayRevenue">₩0</div>
        <div class="revenue-breakdown" id="revenueBreakdown">
          <div class="revenue-row">
            <span class="label">출차 완료 건수</span>
            <span class="value" id="exitCount">0건</span>
          </div>
          <div class="revenue-row">
            <span class="label">평균 주차 시간</span>
            <span class="value" id="avgTime">0분</span>
          </div>
          <div class="revenue-row">
            <span class="label">평균 요금</span>
            <span class="value" id="avgFee">₩0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Zone Summary -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📊 구역별 현황</div>
      </div>
      <div class="card-body">
        <div class="zone-summary" id="zoneSummary"></div>
      </div>
    </div>
  </div>

  <!-- Records -->
  <div class="card records-section">
    <div class="card-header">
      <div class="card-title">📋 입출차 기록</div>
      <span style="font-size:12px;color:var(--text-muted)" id="recordCount">0건</span>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>차량번호</th>
              <th>구역</th>
              <th>슬롯</th>
              <th>입차 시간</th>
              <th>출차 시간</th>
              <th>주차 시간</th>
              <th>요금</th>
              <th>상태</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Entry Modal -->
<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🚗 차량 입차 등록</h2>
      <button class="modal-close" onclick="closeEntryModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>차량 번호</label>
        <input type="text" id="plateInput" placeholder="예: 12가 3456" maxlength="12" autocomplete="off">
      </div>
      <div class="form-group">
        <label>구역 선택</label>
        <select id="zoneSelect">
          <option value="">구역을 선택하세요</option>
          <option value="A">A 구역</option>
          <option value="B">B 구역</option>
          <option value="C">C 구역</option>
          <option value="D">D 구역</option>
        </select>
      </div>
      <div class="form-group">
        <label>슬롯 선택</label>
        <select id="slotSelect" disabled>
          <option value="">먼저 구역을 선택하세요</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEntryModal()">취소</button>
      <button class="btn btn-primary" onclick="registerEntry()">입차 등록</button>
    </div>
  </div>
</div>

<!-- Exit Modal -->
<div class="modal-overlay" id="exitModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🚙 출차 처리</h2>
      <button class="modal-close" onclick="closeExitModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="exit-info" id="exitInfo"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeExitModal()">취소</button>
      <button class="btn btn-danger" onclick="confirmExit()">출차 확인</button>
    </div>
  </div>
</div>

<script>
// ====== DATA ======
const ZONES = ['A', 'B', 'C', 'D'];
const SLOTS_PER_ZONE = 10;
const FEE_PER_10MIN = 500;

let currentZone = 'A';
let exitingRecord = null;

// Initialize parking data
let parkingSlots = {};
ZONES.forEach(z => {
  parkingSlots[z] = [];
  for (let i = 1; i <= SLOTS_PER_ZONE; i++) {
    parkingSlots[z].push({
      id: `${z}${String(i).padStart(2,'0')}`,
      zone: z,
      number: i,
      status: 'empty', // empty | occupied | reserved
      plate: null,
      entryTime: null
    });
  }
});

let records = [];

// Seed some sample data
function seedData() {
  const samplePlates = ['12가 3456', '34나 7890', '56다 1234', '78라 5678', '90마 9012', '11바 3344'];
  const zones = ['A','A','B','C','C','D'];
  const slotNums = [1,5,3,2,7,4];

  samplePlates.forEach((plate, i) => {
    const z = zones[i];
    const n = slotNums[i];
    const slot = parkingSlots[z][n - 1];
    const entryTime = new Date(Date.now() - Math.floor(Math.random() * 180 + 20) * 60000);
    slot.status = 'occupied';
    slot.plate = plate;
    slot.entryTime = entryTime;

    records.push({
      id: Date.now() + i,
      plate,
      zone: z,
      slotId: slot.id,
      entryTime,
      exitTime: null,
      duration: null,
      fee: null,
      status: 'active'
    });
  });

  // Add a reserved slot
  parkingSlots['B'][7].status = 'reserved';
  parkingSlots['D'][9].status = 'reserved';

  // Add completed record for revenue
  const pastExit = new Date(Date.now() - 60 * 60000);
  const pastEntry = new Date(pastExit.getTime() - 45 * 60000);
  records.push({
    id: Date.now() + 100,
    plate: '22사 5566',
    zone: 'B',
    slotId: 'B06',
    entryTime: pastEntry,
    exitTime: pastExit,
    duration: 45,
    fee: 2500,
    status: 'complete'
  });
}

seedData();

// ====== CLOCK ======
function updateClock() {
  const now = new Date();
  const str = now.toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  document.getElementById('clock').textContent = str;
}
setInterval(updateClock, 1000);
updateClock();

// ====== STATS ======
function updateStats() {
  const total = ZONES.length * SLOTS_PER_ZONE;
  let used = 0, reserved = 0;

  ZONES.forEach(z => {
    parkingSlots[z].forEach(s => {
      if (s.status === 'occupied') used++;
      if (s.status === 'reserved') reserved++;
    });
  });

  const free = total - used - reserved;
  const util = Math.round((used / total) * 100);

  document.getElementById('totalSlots').textContent = total;
  document.getElementById('usedSlots').textContent = used;
  document.getElementById('usedPercent').textContent = `전체의 ${util}%`;
  document.getElementById('freeSlots').textContent = free;
  document.getElementById('reservedSlots').textContent = reserved;
  document.getElementById('utilRate').textContent = util + '%';
  document.getElementById('utilBar').style.width = util + '%';

  // Revenue
  const completedRecords = records.filter(r => r.status === 'complete');
  const todayRevenue = completedRecords.reduce((sum, r) => sum + (r.fee || 0), 0);
  const avgDuration = completedRecords.length > 0
    ? Math.round(completedRecords.reduce((sum, r) => sum + (r.duration || 0), 0) / completedRecords.length)
    : 0;
  const avgFee = completedRecords.length > 0
    ? Math.round(todayRevenue / completedRecords.length)
    : 0;

  document.getElementById('todayRevenue').textContent = `₩${todayRevenue.toLocaleString()}`;
  document.getElementById('exitCount').textContent = `${completedRecords.length}건`;
  document.getElementById('avgTime').textContent = `${avgDuration}분`;
  document.getElementById('avgFee').textContent = `₩${avgFee.toLocaleString()}`;
}

// ====== ZONE TABS ======
function renderZoneTabs() {
  const container = document.getElementById('zoneTabs');
  container.innerHTML = ZONES.map(z =>
    `<button class="zone-tab ${z === currentZone ? 'active' : ''}" onclick="switchZone('${z}')">${z} 구역</button>`
  ).join('');
}

function switchZone(z) {
  currentZone = z;
  renderZoneTabs();
  renderSlots();
}

// ====== SLOTS ======
function renderSlots() {
  const container = document.getElementById('slotsGrid');
  const slots = parkingSlots[currentZone];

  container.innerHTML = slots.map(s => {
    let icon, statusClass, plateHtml;
    if (s.status === 'empty') {
      icon = '🅿️';
      statusClass = 'empty';
      plateHtml = '빈자리';
    } else if (s.status === 'occupied') {
      icon = '🚗';
      statusClass = 'occupied';
      plateHtml = s.plate || '';
    } else {
      icon = '📌';
      statusClass = 'reserved';
      plateHtml = '예약';
    }

    const onclick = s.status === 'empty'
      ? `onclick="openEntryModalWithSlot('${s.zone}', ${s.number})"`
      : s.status === 'occupied'
        ? `onclick="openExitModal('${s.zone}', ${s.number})"`
        : '';

    return `
      <div class="slot ${statusClass}" ${onclick}>
        <div class="slot-id">${s.id}</div>
        <div class="slot-icon">${icon}</div>
        <div class="slot-plate">${plateHtml}</div>
      </div>
    `;
  }).join('');
}

// ====== ZONE SUMMARY ======
function renderZoneSummary() {
  const container = document.getElementById('zoneSummary');
  container.innerHTML = ZONES.map(z => {
    const slots = parkingSlots[z];
    const occupied = slots.filter(s => s.status === 'occupied').length;
    const pct = Math.round((occupied / SLOTS_PER_ZONE) * 100);
    return `
      <div class="zone-bar">
        <div class="zone-label">${z} 구역</div>
        <div class="zone-progress">
          <div class="zone-progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${pct > 80 ? 'var(--red-dim),var(--red)' : pct > 50 ? 'var(--yellow-dim),var(--yellow)' : 'var(--green-dark),var(--green-primary)'})"></div>
          <div class="zone-progress-text">${occupied}/${SLOTS_PER_ZONE} (${pct}%)</div>
        </div>
      </div>
    `;
  }).join('');
}

// ====== RECORDS TABLE ======
function renderRecords() {
  const tbody = document.getElementById('recordsBody');
  document.getElementById('recordCount').textContent = `${records.length}건`;

  if (records.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">🅿️</div>입출차 기록이 없습니다</div></td></tr>`;
    return;
  }

  const sorted = [...records].sort((a, b) => b.entryTime - a.entryTime);

  tbody.innerHTML = sorted.map(r => {
    const entryStr = formatTime(r.entryTime);
    const exitStr = r.exitTime ? formatTime(r.exitTime) : '-';
    const durationStr = r.duration != null ? `${r.duration}분` : calcLiveDuration(r.entryTime);
    const feeStr = r.fee != null ? `₩${r.fee.toLocaleString()}` : '-';
    const badge = r.status === 'active'
      ? '<span class="badge badge-active">주차중</span>'
      : '<span class="badge badge-complete">완료</span>';
    const actionBtn = r.status === 'active'
      ? `<button class="exit-btn" onclick="openExitModalByRecord(${r.id})">출차</button>`
      : '';

    return `
      <tr>
        <td style="font-weight:600">${r.plate}</td>
        <td>${r.zone}</td>
        <td>${r.slotId}</td>
        <td>${entryStr}</td>
        <td>${exitStr}</td>
        <td>${durationStr}</td>
        <td class="fee">${feeStr}</td>
        <td>${badge}</td>
        <td>${actionBtn}</td>
      </tr>
    `;
  }).join('');
}

function formatTime(date) {
  return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function calcLiveDuration(entryTime) {
  const mins = Math.floor((Date.now() - entryTime.getTime()) / 60000);
  return `${mins}분`;
}

function calcFee(minutes) {
  const blocks = Math.ceil(minutes / 10);
  return blocks * FEE_PER_10MIN;
}

// ====== ENTRY MODAL ======
function openEntryModal() {
  document.getElementById('plateInput').value = '';
  document.getElementById('zoneSelect').value = '';
  document.getElementById('slotSelect').innerHTML = '<option value="">먼저 구역을 선택하세요</option>';
  document.getElementById('slotSelect').disabled = true;
  document.getElementById('entryModal').classList.add('show');
  setTimeout(() => document.getElementById('plateInput').focus(), 100);
}

function openEntryModalWithSlot(zone, num) {
  openEntryModal();
  document.getElementById('zoneSelect').value = zone;
  updateSlotOptions();
  document.getElementById('slotSelect').value = num;
}

document.getElementById('zoneSelect').addEventListener('change', updateSlotOptions);

function updateSlotOptions() {
  const zone = document.getElementById('zoneSelect').value;
  const slotSelect = document.getElementById('slotSelect');

  if (!zone) {
    slotSelect.innerHTML = '<option value="">먼저 구역을 선택하세요</option>';
    slotSelect.disabled = true;
    return;
  }

  const emptySlots = parkingSlots[zone].filter(s => s.status === 'empty');
  if (emptySlots.length === 0) {
    slotSelect.innerHTML = '<option value="">빈 슬롯이 없습니다</option>';
    slotSelect.disabled = true;
    return;
  }

  slotSelect.innerHTML = '<option value="">슬롯을 선택하세요</option>' +
    emptySlots.map(s => `<option value="${s.number}">${s.id}</option>`).join('');
  slotSelect.disabled = false;
}

function closeEntryModal() {
  document.getElementById('entryModal').classList.remove('show');
}

function registerEntry() {
  const plate = document.getElementById('plateInput').value.trim();
  const zone = document.getElementById('zoneSelect').value;
  const slotNum = parseInt(document.getElementById('slotSelect').value);

  if (!plate) return alert('차량 번호를 입력해주세요.');
  if (!zone) return alert('구역을 선택해주세요.');
  if (!slotNum) return alert('슬롯을 선택해주세요.');

  // Check duplicate plate
  const dup = records.find(r => r.plate === plate && r.status === 'active');
  if (dup) return alert('이미 입차된 차량입니다.');

  const slot = parkingSlots[zone][slotNum - 1];
  const now = new Date();

  slot.status = 'occupied';
  slot.plate = plate;
  slot.entryTime = now;

  records.push({
    id: Date.now(),
    plate,
    zone,
    slotId: slot.id,
    entryTime: now,
    exitTime: null,
    duration: null,
    fee: null,
    status: 'active'
  });

  closeEntryModal();
  refreshAll();
}

// ====== EXIT MODAL ======
function openExitModal(zone, num) {
  const slot = parkingSlots[zone][num - 1];
  const record = records.find(r => r.plate === slot.plate && r.status === 'active');
  if (!record) return;
  showExitInfo(record);
}

function openExitModalByRecord(recordId) {
  const record = records.find(r => r.id === recordId);
  if (!record) return;
  showExitInfo(record);
}

function showExitInfo(record) {
  exitingRecord = record;
  const now = new Date();
  const minutes = Math.max(1, Math.floor((now - record.entryTime) / 60000));
  const fee = calcFee(minutes);

  document.getElementById('exitInfo').innerHTML = `
    <div class="exit-info-row"><span class="label">차량 번호</span><span class="value">${record.plate}</span></div>
    <div class="exit-info-row"><span class="label">주차 위치</span><span class="value">${record.slotId}</span></div>
    <div class="exit-info-row"><span class="label">입차 시간</span><span class="value">${formatTime(record.entryTime)}</span></div>
    <div class="exit-info-row"><span class="label">현재 시간</span><span class="value">${formatTime(now)}</span></div>
    <div class="exit-info-row"><span class="label">주차 시간</span><span class="value">${minutes}분</span></div>
    <div class="exit-info-row total"><span class="label">요금</span><span class="value">₩${fee.toLocaleString()}</span></div>
  `;

  document.getElementById('exitModal').classList.add('show');
}

function closeExitModal() {
  document.getElementById('exitModal').classList.remove('show');
  exitingRecord = null;
}

function confirmExit() {
  if (!exitingRecord) return;

  const now = new Date();
  const minutes = Math.max(1, Math.floor((now - exitingRecord.entryTime) / 60000));
  const fee = calcFee(minutes);

  exitingRecord.exitTime = now;
  exitingRecord.duration = minutes;
  exitingRecord.fee = fee;
  exitingRecord.status = 'complete';

  // Free the slot
  const zone = exitingRecord.zone;
  const slot = parkingSlots[zone].find(s => s.plate === exitingRecord.plate);
  if (slot) {
    slot.status = 'empty';
    slot.plate = null;
    slot.entryTime = null;
  }

  closeExitModal();
  refreshAll();
}

// ====== REFRESH ======
function refreshAll() {
  updateStats();
  renderZoneTabs();
  renderSlots();
  renderZoneSummary();
  renderRecords();
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('show');
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(el => el.classList.remove('show'));
  }
});

// Auto-refresh live durations every 30s
setInterval(() => {
  renderRecords();
}, 30000);

// Initial render
refreshAll();
</script>
</body>
</html>
