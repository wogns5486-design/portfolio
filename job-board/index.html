<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobFlow - 나에게 맞는 채용공고를 찾아보세요</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --primary-bg: #eff6ff;
  --primary-100: #dbeafe;
  --primary-50: #eff6ff;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --orange: #f59e0b;
  --orange-bg: #fffbeb;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --purple: #8b5cf6;
  --purple-bg: #f5f3ff;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: .2s ease;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== NAV ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-200);
}
.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -.5px;
  cursor: pointer;
}
.nav-logo span { color: var(--gray-900); }
.nav-links {
  display: flex;
  gap: 8px;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  color: var(--gray-600);
  font-size: 14px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.nav-links a:hover, .nav-links a.active {
  color: var(--primary);
  background: var(--primary-50);
}
.nav-login {
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-ghost {
  background: none;
  border: 1px solid var(--gray-200);
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: var(--transition);
}
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
}
.mobile-menu-btn svg { width: 24px; height: 24px; color: var(--gray-700); }

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg, #1e3a8a 0%, var(--primary) 50%, #7c3aed 100%);
  padding: 72px 24px 64px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-content {
  position: relative;
  max-width: 720px;
  margin: 0 auto;
}
.hero h1 {
  font-size: 40px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 12px;
  letter-spacing: -.5px;
  line-height: 1.2;
}
.hero p {
  font-size: 17px;
  color: rgba(255,255,255,.8);
  margin-bottom: 32px;
}
.search-box {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 8px;
  display: flex;
  gap: 4px;
  box-shadow: var(--shadow-xl);
  max-width: 640px;
  margin: 0 auto;
}
.search-field {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: var(--radius);
  background: var(--gray-50);
  min-width: 0;
}
.search-field svg { width: 20px; height: 20px; color: var(--gray-400); flex-shrink: 0; }
.search-field input {
  border: none;
  background: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  width: 100%;
  color: var(--gray-800);
}
.search-field input::placeholder { color: var(--gray-400); }
.search-divider { width: 1px; background: var(--gray-200); margin: 8px 0; }
.search-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  font-family: inherit;
}
.search-btn:hover { background: var(--primary-dark); }
.popular-tags {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}
.popular-tag {
  background: rgba(255,255,255,.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  backdrop-filter: blur(4px);
}
.popular-tag:hover { background: rgba(255,255,255,.25); }

/* ===== MAIN LAYOUT ===== */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 28px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: sticky;
  top: 96px;
  align-self: start;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
.filter-section {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--gray-200);
}
.filter-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-title svg { width: 16px; height: 16px; color: var(--primary); }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
  color: var(--gray-600);
}
.filter-item:hover { background: var(--primary-50); color: var(--primary); }
.filter-item.active { background: var(--primary-50); color: var(--primary); font-weight: 600; }
.filter-item input[type="checkbox"] {
  appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--gray-300);
  border-radius: 4px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  flex-shrink: 0;
}
.filter-item input[type="checkbox"]:checked {
  background: var(--primary);
  border-color: var(--primary);
}
.filter-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  left: 5px;
  top: 2px;
  width: 5px;
  height: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.filter-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--gray-400);
  background: var(--gray-100);
  padding: 2px 8px;
  border-radius: 50px;
}
.salary-range {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.salary-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  text-align: center;
  outline: none;
  transition: var(--transition);
}
.salary-input:focus { border-color: var(--primary); }
.salary-unit { font-size: 13px; color: var(--gray-500); }
.filter-reset {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  background: var(--gray-100);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-600);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  margin-top: 8px;
}
.filter-reset:hover { background: var(--gray-200); }

/* ===== CONTENT AREA ===== */
.content-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.result-count {
  font-size: 15px;
  color: var(--gray-600);
}
.result-count strong { color: var(--primary); font-weight: 700; }
.sort-group {
  display: flex;
  gap: 4px;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.sort-btn {
  padding: 8px 16px;
  border: none;
  background: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  white-space: nowrap;
}
.sort-btn.active { background: var(--primary); color: #fff; }
.sort-btn:hover:not(.active) { color: var(--primary); background: var(--primary-50); }

/* ===== JOB CARDS GRID ===== */
.jobs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.job-card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 24px;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
}
.job-card:hover {
  border-color: var(--primary-light);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.job-card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 16px;
}
.company-logo {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.job-card-info { flex: 1; min-width: 0; }
.company-name {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 500;
  margin-bottom: 2px;
}
.job-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bookmark-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  transition: var(--transition);
  color: var(--gray-300);
}
.bookmark-btn:hover { color: var(--primary); background: var(--primary-50); }
.bookmark-btn.active { color: var(--primary); }
.bookmark-btn svg { width: 20px; height: 20px; }
.job-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 500;
}
.meta-tag svg { width: 13px; height: 13px; }
.meta-location { background: var(--primary-50); color: var(--primary); }
.meta-career { background: var(--green-bg); color: var(--green); }
.meta-salary { background: var(--orange-bg); color: var(--orange); }
.tech-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  flex: 1;
}
.tech-tag {
  padding: 4px 10px;
  background: var(--gray-100);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--gray-600);
  transition: var(--transition);
}
.job-card:hover .tech-tag { background: var(--primary-50); color: var(--primary); }
.job-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid var(--gray-100);
  margin-top: auto;
}
.deadline {
  font-size: 12px;
  color: var(--gray-400);
  display: flex;
  align-items: center;
  gap: 4px;
}
.deadline svg { width: 14px; height: 14px; }
.deadline.urgent { color: var(--red); font-weight: 600; }
.apply-btn-small {
  padding: 6px 16px;
  background: var(--primary-50);
  color: var(--primary);
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.apply-btn-small:hover { background: var(--primary); color: #fff; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  transition: opacity .3s;
}
.modal-overlay.show { display: flex; opacity: 1; }
.modal {
  background: #fff;
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-xl);
  transform: translateY(20px);
  transition: transform .3s;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 6px; }
.modal-header {
  padding: 28px 32px;
  border-bottom: 1px solid var(--gray-100);
  display: flex;
  align-items: flex-start;
  gap: 18px;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.modal-logo {
  width: 56px;
  height: 56px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.modal-header-info { flex: 1; }
.modal-company {
  font-size: 14px;
  color: var(--gray-500);
  font-weight: 500;
  margin-bottom: 4px;
}
.modal-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--gray-900);
  line-height: 1.3;
  margin-bottom: 10px;
}
.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.modal-close {
  background: var(--gray-100);
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.modal-close:hover { background: var(--gray-200); }
.modal-close svg { width: 18px; height: 18px; color: var(--gray-600); }
.modal-body { padding: 28px 32px; }
.modal-section { margin-bottom: 28px; }
.modal-section:last-child { margin-bottom: 0; }
.modal-section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary-100);
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-section-title svg { width: 18px; height: 18px; color: var(--primary); }
.modal-section p, .modal-section li {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.8;
}
.modal-section ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.modal-section li::before {
  content: '•';
  color: var(--primary);
  font-weight: 700;
  margin-right: 8px;
}
.modal-tech-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.modal-tech-tag {
  padding: 6px 14px;
  background: var(--primary-50);
  color: var(--primary);
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
}
.modal-footer {
  padding: 20px 32px;
  border-top: 1px solid var(--gray-100);
  display: flex;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: #fff;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}
.modal-bookmark-btn {
  padding: 12px 24px;
  border: 2px solid var(--gray-200);
  background: #fff;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--gray-600);
  font-family: inherit;
}
.modal-bookmark-btn:hover { border-color: var(--primary); color: var(--primary); }
.modal-bookmark-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-50); }
.modal-bookmark-btn svg { width: 18px; height: 18px; }
.modal-apply-btn {
  flex: 1;
  padding: 14px 32px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.modal-apply-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }

/* ===== MOBILE SIDEBAR TOGGLE ===== */
.filter-toggle-btn {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  font-family: inherit;
}
.filter-toggle-btn svg { width: 18px; height: 18px; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--gray-900);
  color: #fff;
  padding: 14px 28px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  z-index: 300;
  box-shadow: var(--shadow-xl);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast svg { width: 20px; height: 20px; color: var(--green); flex-shrink: 0; }

/* ===== RESPONSIVE ===== */
@media (max-width: 960px) {
  .main { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    top: 0;
    left: -300px;
    width: 280px;
    height: 100vh;
    background: #fff;
    z-index: 150;
    padding: 20px;
    transition: left .3s;
    overflow-y: auto;
    box-shadow: var(--shadow-xl);
    max-height: 100vh;
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 140;
  }
  .sidebar-overlay.show { display: block; }
  .filter-toggle-btn { display: flex; }
}
@media (max-width: 768px) {

// ===== STATE =====
let bookmarks = JSON.parse(localStorage.getItem('jf_bookmarks') || '[]');
let currentSort = 'latest';
let currentModalJob = null;

// ===== RENDER =====
function renderJobs(list) {
  const grid = document.getElementById('jobsGrid');
  document.getElementById('resultCount').textContent = list.length;
  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray-400);"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px;display:block;"><path stroke-linecap="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg><p style="font-size:16px;font-weight:600;margin-bottom:4px;">검색 결과가 없습니다</p><p style="font-size:14px;">다른 키워드로 검색해보세요</p></div>';
    return;
  }
  grid.innerHTML = list.map(job => {
    const isBookmarked = bookmarks.includes(job.id);
    const isUrgent = job.daysLeft <= 7;
    const textColor = job.color === '#fee500' || job.color === '#ffffff' ? '#000' : '#fff';
    return `
    <div class="job-card" onclick="openModal(${job.id})">
      <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="event.stopPropagation(); toggleBookmark(${job.id}, this)" title="저장">
        <svg fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>
      </button>
      <div class="job-card-header">
        <div class="company-logo" style="background:${job.color};color:${textColor}">${job.initial}</div>
        <div class="job-card-info">
          <div class="company-name">${job.company}</div>
          <div class="job-title">${job.title}</div>
        </div>
      </div>
      <div class="job-meta">
        <span class="meta-tag meta-location"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>${job.location}</span>
        <span class="meta-tag meta-career">${job.career}</span>
        <span class="meta-tag meta-salary">${job.salaryText}</span>
      </div>
      <div class="tech-tags">${job.techs.map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>
      <div class="job-footer">
        <span class="deadline ${isUrgent ? 'urgent' : ''}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          ${isUrgent ? 'D-' + job.daysLeft : '~' + job.deadline}
        </span>
        <button class="apply-btn-small" onclick="event.stopPropagation(); openModal(${job.id})">상세보기</button>
      </div>
    </div>`;
  }).join('');
}

// ===== SORT =====
function sortJobs(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function getSorted(list) {
  const sorted = [...list];
  if (currentSort === 'salary') sorted.sort((a, b) => b.salary - a.salary);
  else if (currentSort === 'deadline') sorted.sort((a, b) => a.daysLeft - b.daysLeft);
  else sorted.sort((a, b) => b.id - a.id);
  return sorted;
}

// ===== FILTER =====
function toggleFilter(el, type) {
  const cb = el.querySelector('input');
  setTimeout(() => {
    el.classList.toggle('active', cb.checked);
    applyFilters();
  }, 0);
}

function applyFilters() {
  const keyword = document.getElementById('searchKeyword').value.toLowerCase();
  const location = document.getElementById('searchLocation').value.toLowerCase();
  const fields = getChecked('.filter-section:nth-child(1) input');
  const careers = getChecked('.filter-section:nth-child(2) input');
  const types = getChecked('.filter-section:nth-child(3) input');
  const locations = getChecked('.filter-section:nth-child(4) input');

  let filtered = jobs.filter(j => {
    if (keyword && !j.title.toLowerCase().includes(keyword) && !j.company.toLowerCase().includes(keyword) && !j.techs.some(t => t.toLowerCase().includes(keyword)) && !j.field.toLowerCase().includes(keyword)) return false;
    if (location && !j.location.toLowerCase().includes(location)) return false;
    if (fields.length && !fields.some(f => j.field.includes(f) || j.title.includes(f))) return false;
    if (careers.length && !careers.includes(j.career)) return false;
    if (types.length && !types.includes(j.type)) return false;
    if (locations.length && !locations.some(l => j.location.includes(l))) return false;
    const salMin = parseInt(document.getElementById('salaryMin').value);
    const salMax = parseInt(document.getElementById('salaryMax').value);
    if (salMin && j.salary < salMin) return false;
    if (salMax && j.salary > salMax) return false;
    return true;
  });

  renderJobs(getSorted(filtered));
}

function getChecked(sel) {
  return [...document.querySelectorAll(sel)].filter(c => c.checked).map(c => c.value);
}

function resetFilters() {
  document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(c => { c.checked = false; });
  document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
  document.getElementById('searchKeyword').value = '';
  document.getElementById('searchLocation').value = '';
  document.getElementById('salaryMin').value = '';
  document.getElementById('salaryMax').value = '';
  currentSort = 'latest';
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.sort-btn[data-sort="latest"]').classList.add('active');
  renderJobs(getSorted(jobs));
}

// ===== SEARCH =====
function performSearch() { applyFilters(); }
function quickSearch(kw) {
  document.getElementById('searchKeyword').value = kw;
  applyFilters();
}

// ===== BOOKMARK =====
function toggleBookmark(id, btn) {
  const idx = bookmarks.indexOf(id);
  if (idx === -1) { bookmarks.push(id); showToast('채용공고를 저장했습니다'); }
  else { bookmarks.splice(idx, 1); showToast('저장을 취소했습니다'); }
  localStorage.setItem('jf_bookmarks', JSON.stringify(bookmarks));
  applyFilters();
}

function toggleModalBookmark() {
  if (!currentModalJob) return;
  toggleBookmark(currentModalJob.id);
  updateModalBookmark();
}

function updateModalBookmark() {
  const btn = document.getElementById('modalBookmarkBtn');
  const isB = bookmarks.includes(currentModalJob.id);
  btn.classList.toggle('active', isB);
  btn.innerHTML = `<svg fill="${isB ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"/></svg>${isB ? '저장됨' : '저장'}`;
}

      <div class="modal-section-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.746 3.746 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.746 3.746 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z"/></svg>자격요건</div>
      <ul>${job.requirements.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/></svg>우대사항</div>
      <ul>${job.preferred.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>복지 및 혜택</div>

      <div class="modal-section-title"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/></svg>기술 스택</div>

  updateModalBookmark();
  const overlay = document.getElementById('modalOverlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('show'));
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && e.type === 'click') return;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('show');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
  document.body.style.overflow = '';
  currentModalJob = null;
}

function applyJob() {
  if (currentModalJob) {
    showToast(`${currentModalJob.company}에 지원이 완료되었습니다!`);
    closeModal();
  }
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== SIDEBAR MOBILE =====
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ===== MOBILE NAV =====
function toggleMobileNav() {
  document.getElementById('mobileNav').classList.toggle('show');
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('searchKeyword').addEventListener('keydown', e => {
  if (e.key === 'Enter') performSearch();
});
document.getElementById('searchLocation').addEventListener('keydown', e => {
  if (e.key === 'Enter') performSearch();
});

// ===== INIT =====
renderJobs(getSorted(jobs));
</script>
</body>
</html>
