<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓플로 - 우리 동네 중고거래</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#FF6F0F;
  --primary-light:#FFF3EB;
  --primary-dark:#E5600A;
  --bg:#FAFAFA;
  --white:#FFFFFF;
  --gray-50:#F9FAFB;
  --gray-100:#F3F4F6;
  --gray-200:#E5E7EB;
  --gray-300:#D1D5DB;
  --gray-400:#9CA3AF;
  --gray-500:#6B7280;
  --gray-600:#4B5563;
  --gray-700:#374151;
  --gray-800:#1F2937;
  --gray-900:#111827;
  --red:#EF4444;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --shadow-xl:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04);
  --radius:12px;
  --radius-lg:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--gray-800);line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;outline:none}
img{display:block;max-width:100%}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px}
.header-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:22px;font-weight:800;color:var(--primary);flex-shrink:0;letter-spacing:-.5px}
.logo span{color:var(--gray-800)}
.header-location{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:var(--gray-700);cursor:pointer;flex-shrink:0;padding:6px 10px;border-radius:8px;transition:background .2s}
.header-location:hover{background:var(--gray-100)}
.header-location svg{width:16px;height:16px}
.search-bar{flex:1;max-width:420px;position:relative}
.search-bar input{width:100%;height:40px;border:1.5px solid var(--gray-200);border-radius:10px;padding:0 40px 0 14px;font-size:14px;background:var(--gray-50);transition:border-color .2s,background .2s}
.search-bar input:focus{border-color:var(--primary);background:var(--white)}
.search-bar button{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--gray-400);padding:4px}
.header-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.header-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--gray-600);transition:background .2s,color .2s;position:relative}
.header-btn:hover{background:var(--gray-100);color:var(--gray-800)}
.header-btn .badge{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--white)}
.btn-write{background:var(--primary);color:var(--white)!important;font-size:13px;font-weight:600;padding:0 16px;height:38px;border-radius:10px;display:flex;align-items:center;gap:6px;transition:background .2s;white-space:nowrap}
.btn-write:hover{background:var(--primary-dark)}
.btn-write svg{width:16px;height:16px}

/* Categories */
.categories{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.categories-inner{max-width:1200px;margin:0 auto;display:flex;gap:6px;padding:12px 0}
.cat-btn{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:500;color:var(--gray-600);background:var(--gray-100);transition:all .2s;white-space:nowrap;flex-shrink:0}
.cat-btn:hover{background:var(--gray-200);color:var(--gray-800)}
.cat-btn.active{background:var(--primary);color:var(--white)}

/* Product Grid */
.main{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:20px;font-weight:700;color:var(--gray-900)}
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

/* Product Card */
.product-card{background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray-200);transition:transform .2s,box-shadow .2s;cursor:pointer}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card-img{position:relative;padding-top:100%;overflow:hidden;background:var(--gray-100)}
.card-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.product-card:hover .card-img img{transform:scale(1.05)}
.card-status{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;color:var(--white)}
.card-status.selling{background:var(--primary)}
.card-status.reserved{background:var(--gray-500)}
.card-status.sold{background:var(--gray-400)}
.card-like{position:absolute;top:10px;right:10px;width:34px;height:34px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.card-like:hover{background:var(--white);transform:scale(1.1)}
.card-like.liked svg{fill:var(--red);color:var(--red)}
.card-body{padding:14px}
.card-title{font-size:15px;font-weight:500;color:var(--gray-800);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.card-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400);margin-bottom:8px}
.card-meta span:not(:last-child)::after{content:'·';margin-left:6px}
.card-price{font-size:17px;font-weight:700;color:var(--gray-900)}
.card-stats{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100)}
.card-stat{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--gray-400)}
.card-stat svg{width:14px;height:14px}

/* Modal Overlay */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .3s}
.modal-overlay.show{display:flex;opacity:1}

/* Detail Modal */
.detail-modal{background:var(--white);border-radius:var(--radius-lg);max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s}
.modal-overlay.show .detail-modal{transform:translateY(0)}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;color:var(--gray-600);transition:background .2s}
.modal-close:hover{background:var(--white)}
.detail-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--gray-100)}
.detail-content{padding:24px}
.detail-seller{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--gray-100);margin-bottom:16px}
.seller-avatar{width:44px;height:44px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--primary)}
.seller-info{flex:1}
.seller-name{font-size:15px;font-weight:600;color:var(--gray-800)}
.seller-location{font-size:13px;color:var(--gray-400)}
.detail-title{font-size:22px;font-weight:700;color:var(--gray-900);margin-bottom:8px}
.detail-meta{font-size:13px;color:var(--gray-400);margin-bottom:16px}
.detail-price{font-size:26px;font-weight:800;color:var(--gray-900);margin-bottom:20px}
.detail-desc{font-size:15px;color:var(--gray-600);line-height:1.7;margin-bottom:24px;white-space:pre-line}
.detail-stats{display:flex;gap:16px;font-size:13px;color:var(--gray-400);margin-bottom:24px}
.detail-actions{display:flex;gap:10px}
.btn-like-lg{width:52px;height:52px;border:1.5px solid var(--gray-200);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:all .2s;flex-shrink:0}
.btn-like-lg:hover{border-color:var(--red);color:var(--red)}
.btn-like-lg.liked{border-color:var(--red);color:var(--red)}
.btn-like-lg.liked svg{fill:var(--red)}
.btn-chat{flex:1;height:52px;background:var(--primary);color:var(--white);font-size:16px;font-weight:700;border-radius:var(--radius);transition:background .2s}
.btn-chat:hover{background:var(--primary-dark)}

/* Write Modal */
.write-modal{background:var(--white);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.write-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--gray-200)}
.write-header h2{font-size:18px;font-weight:700}
.write-body{padding:24px}
.write-upload{border:2px dashed var(--gray-300);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:20px}
.write-upload:hover{border-color:var(--primary);background:var(--primary-light)}
.write-upload svg{width:40px;height:40px;color:var(--gray-400);margin-bottom:8px}
.write-upload p{font-size:14px;color:var(--gray-500)}
.write-upload span{font-size:12px;color:var(--gray-400)}
.write-preview{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.write-preview-item{width:80px;height:80px;border-radius:8px;overflow:hidden;position:relative}
.write-preview-item img{width:100%;height:100%;object-fit:cover}
.write-preview-item .remove{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:12px 14px;font-size:14px;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:120px}
.price-input{position:relative}
.price-input input{padding-right:30px}
.price-input span{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gray-400)}
.btn-submit{width:100%;height:52px;background:var(--primary);color:var(--white);font-size:16px;font-weight:700;border-radius:var(--radius);transition:background .2s;margin-top:8px}
.btn-submit:hover{background:var(--primary-dark)}

/* Location Modal */
.location-modal{background:var(--white);border-radius:var(--radius-lg);max-width:400px;width:100%;padding:24px;position:relative}
.location-modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.location-list{display:flex;flex-direction:column;gap:4px}
.location-item{padding:12px 14px;border-radius:10px;font-size:15px;color:var(--gray-700);transition:background .2s;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.location-item:hover{background:var(--gray-100)}
.location-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.location-item.active::after{content:'✓';font-weight:700}

/* Chat Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray-800);color:var(--white);padding:14px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:300;opacity:0;transition:all .4s ease;pointer-events:none;box-shadow:var(--shadow-xl)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Responsive */
@media(max-width:1024px){
  .product-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .search-bar{max-width:200px}
  .header-location span.loc-text{display:none}
  .detail-modal{max-height:100vh;border-radius:0}
}
@media(max-width:480px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .header-inner{gap:8px}
  .search-bar{max-width:none;flex:1}
  .header-actions .btn-write span{display:none}
  .btn-write{padding:0 10px}
  .card-body{padding:10px}
  .card-title{font-size:13px}
  .card-price{font-size:15px}
  .card-stats{gap:6px;margin-top:6px;padding-top:6px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="logo">마켓<span>플로</span></a>
    <button class="header-location" id="locationBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span class="loc-text" id="currentLocation">서초구 반포동</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="search-bar">
      <input type="text" placeholder="동네에서 검색" id="searchInput">
      <button>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
    </div>
    <div class="header-actions">
      <button class="header-btn" title="채팅">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="badge"></span>
      </button>
      <button class="header-btn" title="알림">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
      <button class="btn-write" id="writeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>글쓰기</span>
      </button>
    </div>
  </div>
</header>

<!-- Categories -->
<nav class="categories">
  <div class="categories-inner" id="categoryNav">
    <button class="cat-btn active" data-cat="all">전체</button>
    <button class="cat-btn" data-cat="digital">디지털기기</button>
    <button class="cat-btn" data-cat="furniture">가구/인테리어</button>
    <button class="cat-btn" data-cat="clothing">의류/잡화</button>
    <button class="cat-btn" data-cat="living">생활/주방</button>
    <button class="cat-btn" data-cat="sports">스포츠/레저</button>
    <button class="cat-btn" data-cat="books">도서/티켓</button>
  </div>
</nav>

<!-- Main Content -->
<main class="main">
  <div class="section-header">
    <h2 class="section-title" id="sectionTitle">서초구 반포동 중고거래</h2>
  </div>
  <div class="product-grid" id="productGrid"></div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailOverlay">
  <div class="detail-modal">
    <button class="modal-close" id="detailClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="detail-img" id="detailImg" src="" alt="">
    <div class="detail-content">
      <div class="detail-seller">
        <div class="seller-avatar" id="detailAvatar"></div>
        <div class="seller-info">
          <div class="seller-name" id="detailSeller"></div>
          <div class="seller-location" id="detailSellerLoc"></div>
        </div>
      </div>
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-price" id="detailPrice"></div>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-stats" id="detailStats"></div>
      <div class="detail-actions">
        <button class="btn-like-lg" id="detailLikeBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <button class="btn-chat" id="detailChatBtn">채팅으로 거래하기</button>
      </div>
    </div>
  </div>
</div>

<!-- Write Modal -->
<div class="modal-overlay" id="writeOverlay">
  <div class="write-modal">
    <div class="write-header">
      <button id="writeClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2>내 물건 팔기</h2>
      <button class="btn-submit" style="width:auto;height:36px;font-size:14px;padding:0 20px;margin:0" id="submitBtn">완료</button>
    </div>
    <div class="write-body">
      <div class="write-upload" id="uploadArea">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p>사진을 올려주세요</p>
        <span>최대 10장까지 업로드 가능</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="write-preview" id="previewContainer"></div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" placeholder="제목을 입력하세요" id="writeTitle">
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select id="writeCat">
          <option value="">카테고리 선택</option>
          <option value="digital">디지털기기</option>
          <option value="furniture">가구/인테리어</option>
          <option value="clothing">의류/잡화</option>
          <option value="living">생활/주방</option>
          <option value="sports">스포츠/레저</option>
          <option value="books">도서/티켓</option>
        </select>
      </div>
      <div class="form-group">
        <label>가격</label>
        <div class="price-input">
          <input type="text" placeholder="가격을 입력하세요" id="writePrice">
          <span>원</span>
        </div>
      </div>
      <div class="form-group">
        <label>자세한 설명</label>
        <textarea placeholder="물건에 대한 설명을 작성해주세요.&#10;거래 방법, 상태 등을 자세히 적어주시면 거래가 빨라요!" id="writeDesc"></textarea>
      </div>
      <button class="btn-submit" id="submitBtn2">작성 완료</button>
    </div>
  </div>
</div>

<!-- Location Modal -->
<div class="modal-overlay" id="locationOverlay">
  <div class="location-modal">
    <button class="modal-close" id="locationClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>동네 설정</h2>
    <div class="location-list" id="locationList">
      <div class="location-item active" data-loc="서초구 반포동">서초구 반포동</div>
      <div class="location-item" data-loc="강남구 역삼동">강남구 역삼동</div>
      <div class="location-item" data-loc="송파구 잠실동">송파구 잠실동</div>
      <div class="location-item" data-loc="마포구 합정동">마포구 합정동</div>
      <div class="location-item" data-loc="용산구 이태원동">용산구 이태원동</div>
      <div class="location-item" data-loc="영등포구 여의도동">영등포구 여의도동</div>
    </div>
  </div>

const catNames = {all:'전체',digital:'디지털기기',furniture:'가구/인테리어',clothing:'의류/잡화',living:'생활/주방',sports:'스포츠/레저',books:'도서/티켓'};
let currentCat = 'all';
let likedItems = new Set();

// Format price
function formatPrice(n){
  if(n>=10000) return (n/10000).toLocaleString()+'만원';
  return n.toLocaleString()+'원';
}

// Render products
function renderProducts(cat, query=''){
  const grid = document.getElementById('productGrid');
  let filtered = cat==='all' ? [...products] : products.filter(p=>p.cat===cat);
  if(query){
    const q = query.toLowerCase();
    filtered = filtered.filter(p=>p.title.toLowerCase().includes(q));
  }
  grid.innerHTML = filtered.map(p=>`
    <div class="product-card" onclick="openDetail(${p.id})">
      <div class="card-img">
        <img src="${p.img}" alt="${p.title}" loading="lazy">
        ${p.status==='reserved'?'<span class="card-status reserved">예약중</span>':''}
        ${p.status==='sold'?'<span class="card-status sold">거래완료</span>':''}
        <button class="card-like ${likedItems.has(p.id)?'liked':''}" onclick="event.stopPropagation();toggleLike(${p.id})">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${likedItems.has(p.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>

        <div class="card-stats">
          <span class="card-stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            ${p.likes + (likedItems.has(p.id)?1:0)}
          </span>
          <span class="card-stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            ${p.chats}
          </span>
        </div>
      </div>
    </div>

}

// Toggle like
function toggleLike(id){
  if(likedItems.has(id)) likedItems.delete(id);
  else likedItems.add(id);
  renderProducts(currentCat, document.getElementById('searchInput').value);
}

// Open detail modal
function openDetail(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('detailImg').src = p.img;
  document.getElementById('detailImg').alt = p.title;
  document.getElementById('detailAvatar').textContent = p.seller[0];
  document.getElementById('detailSeller').textContent = p.seller;
  document.getElementById('detailSellerLoc').textContent = p.location;
  document.getElementById('detailTitle').textContent = p.title;
  document.getElementById('detailMeta').textContent = `${catNames[p.cat]} · ${p.time}`;
  document.getElementById('detailPrice').textContent = formatPrice(p.price);
  document.getElementById('detailDesc').textContent = p.desc;
  document.getElementById('detailStats').innerHTML = `<span>관심 ${p.likes+(likedItems.has(p.id)?1:0)}</span><span>채팅 ${p.chats}</span><span>조회 ${p.views}</span>`;
  const likeBtn = document.getElementById('detailLikeBtn');
  likeBtn.className = 'btn-like-lg'+(likedItems.has(id)?' liked':'');
  likeBtn.querySelector('svg').setAttribute('fill', likedItems.has(id)?'currentColor':'none');
  likeBtn.onclick = ()=>{
    toggleLike(id);
    openDetail(id);
  };
  document.getElementById('detailChatBtn').onclick = ()=>{
    closeModal('detailOverlay');
    showToast(p.seller+'님에게 채팅을 보냈습니다 💬');
  };
  openModal('detailOverlay');
}

// Category click
document.getElementById('categoryNav').addEventListener('click', e=>{
  const btn = e.target.closest('.cat-btn');
  if(!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderProducts(currentCat, document.getElementById('searchInput').value);
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    renderProducts(currentCat, e.target.value);
  }, 300);
});

// Modal helpers
function openModal(id){
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(()=>el.classList.add('show'));
  document.body.style.overflow = 'hidden';
}
function closeModal(id){
  const el = document.getElementById(id);
  el.classList.remove('show');
  setTimeout(()=>{el.style.display='none'}, 300);
  document.body.style.overflow = '';
}

// Close modals on overlay click
['detailOverlay','writeOverlay','locationOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeModal(id);
  });
});

// Close buttons
document.getElementById('detailClose').onclick = ()=>closeModal('detailOverlay');
document.getElementById('writeClose').onclick = ()=>closeModal('writeOverlay');
document.getElementById('locationClose').onclick = ()=>closeModal('locationOverlay');

// Write modal
document.getElementById('writeBtn').onclick = ()=>openModal('writeOverlay');

// File upload
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
let uploadedFiles = [];

uploadArea.onclick = ()=>fileInput.click();
fileInput.onchange = e=>{
  const files = Array.from(e.target.files);
  files.forEach(f=>{
    if(uploadedFiles.length>=10) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      uploadedFiles.push(ev.target.result);
      renderPreviews();
    };
    reader.readAsDataURL(f);
  });
};

function renderPreviews(){
  previewContainer.innerHTML = uploadedFiles.map((src,i)=>`
    <div class="write-preview-item">
      <img src="${src}" alt="미리보기">
      <button class="remove" onclick="removePreview(${i})">✕</button>
    </div>
  `).join('');
}
function removePreview(i){
  uploadedFiles.splice(i,1);
  renderPreviews();
}

// Submit write
function handleSubmit(){
  const title = document.getElementById('writeTitle').value.trim();
  const cat = document.getElementById('writeCat').value;
  const price = document.getElementById('writePrice').value.trim();
  const desc = document.getElementById('writeDesc').value.trim();
  if(!title||!cat||!price){
    showToast('제목, 카테고리, 가격을 입력해주세요');
    return;
  }
  closeModal('writeOverlay');
  showToast('게시글이 등록되었습니다!');
  // Reset form
  document.getElementById('writeTitle').value='';
  document.getElementById('writeCat').value='';
  document.getElementById('writePrice').value='';
  document.getElementById('writeDesc').value='';
  uploadedFiles=[];
  previewContainer.innerHTML='';
}
document.getElementById('submitBtn').onclick = handleSubmit;
document.getElementById('submitBtn2').onclick = handleSubmit;

// Price input formatting
document.getElementById('writePrice').addEventListener('input', e=>{
  let v = e.target.value.replace(/[^\d]/g,'');
  e.target.value = v ? Number(v).toLocaleString() : '';
});

// Location modal
document.getElementById('locationBtn').onclick = ()=>openModal('locationOverlay');
document.getElementById('locationList').addEventListener('click', e=>{
  const item = e.target.closest('.location-item');
  if(!item) return;
  document.querySelectorAll('.location-item').forEach(i=>i.classList.remove('active'));
  item.classList.add('active');
  const loc = item.dataset.loc;
  document.getElementById('currentLocation').textContent = loc;
  document.getElementById('sectionTitle').textContent = loc+' 중고거래';
  closeModal('locationOverlay');
});

// Toast
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ESC to close modals
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    ['detailOverlay','writeOverlay','locationOverlay'].forEach(id=>{
      if(document.getElementById(id).classList.contains('show')) closeModal(id);
    });
  }
});

// Init
renderProducts('all');
