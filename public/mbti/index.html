<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 성격 유형 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#f8e8ff 0%,#e8f0ff 30%,#e8fff0 60%,#fff8e8 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:600px;width:100%;position:relative}

/* 인트로 */
.screen{display:none;animation:fadeUp .5s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.intro{text-align:center;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-radius:28px;padding:48px 32px;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.intro-icon{font-size:64px;margin-bottom:16px}
.intro h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.intro p{color:#64748b;font-size:15px;line-height:1.6;margin-bottom:32px}
.intro .sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.btn-start{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;padding:16px 48px;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.4)}

/* 질문 */
.question-card{background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-radius:28px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.progress-wrap{margin-bottom:28px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-info span{font-size:13px;font-weight:600;color:#7c3aed}
.progress-bar{height:8px;background:#e8e0f0;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb,#06b6d4);border-radius:99px;transition:width .4s ease}
.q-number{font-size:13px;font-weight:700;color:#06b6d4;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:19px;font-weight:700;color:#1e293b;line-height:1.5;margin-bottom:28px;min-height:60px}
.options{display:flex;flex-direction:column;gap:12px}
.opt-btn{background:rgba(255,255,255,.7);border:2px solid #e2e8f0;border-radius:16px;padding:16px 20px;font-size:15px;font-weight:500;color:#334155;cursor:pointer;transition:all .25s;text-align:left;font-family:'Inter',sans-serif;line-height:1.4}
.opt-btn:hover{border-color:#7c3aed;background:rgba(124,58,237,.06);transform:translateX(4px)}
.opt-btn:active{transform:scale(.98)}

/* 로딩 */
.loading{text-align:center;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-radius:28px;padding:60px 32px;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.spinner{width:56px;height:56px;border:4px solid #e8e0f0;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:16px;font-weight:600;color:#475569}
.loading .dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* 결과 */
.result{background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-radius:28px;padding:40px 28px;box-shadow:0 8px 40px rgba(0,0,0,.06);text-align:center}
.result-badge{display:inline-block;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:36px;font-weight:900;letter-spacing:3px;padding:16px 36px;border-radius:20px;margin-bottom:16px;box-shadow:0 4px 24px rgba(124,58,237,.3)}
.result-title{font-size:22px;font-weight:800;color:#1e293b;margin-bottom:6px}
.result-subtitle{font-size:14px;color:#7c3aed;font-weight:600;margin-bottom:24px}
.result-section{text-align:left;background:rgba(248,245,255,.6);border-radius:16px;padding:20px;margin-bottom:16px}
.result-section h3{font-size:14px;font-weight:700;color:#7c3aed;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.result-section p{font-size:14px;color:#475569;line-height:1.7}
.result-section ul{list-style:none;padding:0}
.result-section ul li{font-size:14px;color:#475569;padding:4px 0;padding-left:16px;position:relative}
.result-section ul li::before{content:'';position:absolute;left:0;top:12px;width:6px;height:6px;background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:50%}
.tag-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(37,99,235,.1));color:#5b21b6;font-size:13px;font-weight:600;padding:6px 14px;border-radius:99px}
.btn-group{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.btn-share{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;padding:14px 28px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(124,58,237,.25)}
.btn-share:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.35)}
.btn-retry{background:rgba(255,255,255,.8);color:#7c3aed;border:2px solid #7c3aed;padding:14px 28px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.btn-retry:hover{background:#7c3aed;color:#fff}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:all .4s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .intro{padding:36px 20px}
  .intro h1{font-size:24px}
  .question-card{padding:28px 20px}
  .q-text{font-size:17px}
  .result{padding:32px 20px}
  .result-badge{font-size:30px;padding:14px 28px}
  .btn-group{flex-direction:column}
  .btn-share,.btn-retry{width:100%}
}
</style>
</head>
<body>

<div class="container">
  <!-- 인트로 -->
  <div class="screen active" id="intro-screen">
    <div class="intro">
      <div class="intro-icon">🧠</div>
      <h1>MBTI 성격 유형 테스트</h1>
      <p>12개의 질문으로 알아보는 나의 성격 유형<br>직관적으로 끌리는 답을 골라주세요!</p>
      <div class="sub">소요 시간 약 2~3분 · 총 12문항</div>
      <button class="btn-start" onclick="startTest()">테스트 시작하기</button>
    </div>
  </div>

  <!-- 질문 -->
  <div class="screen" id="question-screen">
    <div class="question-card">
      <div class="progress-wrap">
        <div class="progress-info">
          <span id="progress-label">1 / 12</span>
          <span id="progress-pct">8%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:8%"></div></div>
      </div>
      <div class="q-number" id="q-number">Question 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="screen" id="loading-screen">
    <div class="loading">
      <div class="spinner"></div>
      <p>결과를 분석하고 있어요<span class="dots"></span></p>
    </div>
  </div>

  <!-- 결과 -->
  <div class="screen" id="result-screen">
    <div class="result">
      <div class="result-badge" id="r-type"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-subtitle" id="r-subtitle"></div>
      <div class="result-section" id="r-desc-sec">
        <h3>📖 성격 설명</h3>
        <p id="r-desc"></p>
      </div>
      <div class="result-section" id="r-traits-sec">
        <h3>✨ 주요 특징</h3>
        <ul id="r-traits"></ul>
      </div>
      <div class="result-section" id="r-match-sec">
        <h3>💕 잘 맞는 유형</h3>
        <div class="tag-wrap" id="r-match"></div>
      </div>
      <div class="result-section" id="r-job-sec">
        <h3>💼 추천 직업</h3>
        <div class="tag-wrap" id="r-jobs"></div>
      </div>
      <div class="btn-group">
        <button class="btn-share" onclick="shareResult()">결과 공유하기</button>
        <button class="btn-retry" onclick="retry()">다시 하기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">링크가 복사되었습니다!</div>

<script>
const questions = [
  // E/I (0,1,2)
  { text:"주말에 에너지를 충전하는 방법은?", dimension:"EI",
    a:{label:"친구들과 모여서 수다 떨기",val:"E"},
    b:{label:"집에서 혼자 조용히 쉬기",val:"I"}},
  { text:"새로운 모임에 갔을 때 나는?", dimension:"EI",
    a:{label:"먼저 다가가서 말을 건다",val:"E"},
    b:{label:"누가 말 걸어줄 때까지 기다린다",val:"I"}},
  { text:"스트레스를 받으면 어떻게 하나요?", dimension:"EI",
    a:{label:"사람들을 만나서 이야기한다",val:"E"},
    b:{label:"혼자만의 시간을 갖는다",val:"I"}},

  // S/N (3,4,5)
  { text:"여행 계획을 세울 때 나는?", dimension:"SN",
    a:{label:"구체적인 일정과 장소를 정한다",val:"S"},
    b:{label:"대략적인 방향만 잡고 즉흥적으로",val:"N"}},
  { text:"일할 때 더 중요하게 생각하는 것은?", dimension:"SN",
    a:{label:"검증된 방법으로 확실하게",val:"S"},
    b:{label:"새로운 아이디어로 창의적으로",val:"N"}},
  { text:"대화할 때 나는 주로?", dimension:"SN",
    a:{label:"구체적인 사실과 경험을 이야기한다",val:"S"},
    b:{label:"가능성과 상상에 대해 이야기한다",val:"N"}},

  // T/F (6,7,8)
  { text:"친구가 고민을 이야기할 때 나는?", dimension:"TF",
    a:{label:"해결책과 조언을 제시한다",val:"T"},
    b:{label:"공감하고 감정을 들어준다",val:"F"}},
  { text:"중요한 결정을 내릴 때 기준은?", dimension:"TF",
    a:{label:"논리적 분석과 객관적 사실",val:"T"},
    b:{label:"내 감정과 주변 사람들의 영향",val:"F"}},
  { text:"팀 프로젝트에서 갈등이 생기면?", dimension:"TF",
    a:{label:"논리적으로 옳고 그름을 따진다",val:"T"},
    b:{label:"서로의 감정을 먼저 살핀다",val:"F"}},

  // J/P (9,10,11)
  { text:"약속 시간에 대한 나의 태도는?", dimension:"JP",
    a:{label:"항상 미리 도착하려고 한다",val:"J"},
    b:{label:"시간에 맞춰 유연하게 움직인다",val:"P"}},
  { text:"하루 일과를 보내는 스타일은?", dimension:"JP",
    a:{label:"계획표대로 체계적으로",val:"J"},
    b:{label:"그때그때 기분에 따라",val:"P"}},
  { text:"시험(마감) 전날 나는?", dimension:"JP",
    a:{label:"이미 준비를 끝내놓은 상태",val:"J"},
    b:{label:"막판 스퍼트를 올리는 중",val:"P"}}
];

const mbtiData = {
  ISTJ:{title:"청렴결백한 논리주의자",subtitle:"신뢰할 수 있는 현실주의자",desc:"책임감이 강하고 성실하며, 한번 맡은 일은 끝까지 해내는 사람입니다. 체계적이고 꼼꼼하며, 전통과 규칙을 중시합니다. 조용하지만 내면이 단단하고, 사실에 기반한 판단을 내립니다.",traits:["뛰어난 집중력과 인내심","체계적이고 조직적인 업무 처리","약속과 규칙을 철저히 지킴","현실적이고 실용적인 사고"],match:["ESFP","ESTP"],jobs:["회계사","공무원","감사관","프로젝트 매니저","데이터 분석가"]},
  ISFJ:{title:"용감한 수호자",subtitle:"헌신적인 배려자",desc:"따뜻하고 헌신적이며, 주변 사람들을 세심하게 챙기는 사람입니다. 겸손하고 책임감이 강하며, 조화로운 환경을 만들기 위해 노력합니다.",traits:["뛰어난 관찰력과 기억력","타인의 감정에 민감한 공감 능력","묵묵히 헌신하는 성실함","안정적이고 따뜻한 분위기 조성"],match:["ESFP","ENTP"],jobs:["간호사","사회복지사","초등교사","상담사","사서"]},
  INFJ:{title:"선의의 옹호자",subtitle:"통찰력 있는 이상주의자",desc:"깊은 통찰력과 직관을 가진 이상주의자입니다. 조용하지만 강한 신념을 가지고 있으며, 타인을 돕고 세상을 더 나은 곳으로 만들고자 합니다.",traits:["뛰어난 직관과 통찰력","깊은 공감 능력과 이해심","창의적이면서 체계적인 사고","강한 내면의 가치관과 신념"],match:["ENFP","ENTP"],jobs:["심리상담사","작가","교수","비영리단체 활동가","UX 디자이너"]},
  INTJ:{title:"용의주도한 전략가",subtitle:"독립적인 완벽주의자",desc:"전략적 사고와 높은 자기 확신을 가진 사람입니다. 독립적이고 분석적이며, 지식과 능력 향상에 끊임없이 노력합니다.",traits:["장기적 비전과 전략적 사고","높은 자기 기준과 완벽주의","독립적이고 결단력 있는 리더십","복잡한 문제를 체계적으로 해결"],match:["ENFP","ENTP"],jobs:["경영 컨설턴트","소프트웨어 아키텍트","과학자","투자 분석가","전략 기획자"]},
  ISTP:{title:"만능 재주꾼",subtitle:"논리적인 실용주의자",desc:"조용하고 분석적이며, 논리적인 사고로 문제를 해결하는 사람입니다. 실용적이고 적응력이 뛰어나며, 기계나 도구를 다루는 데 능숙합니다.",traits:["뛰어난 문제 해결 능력","위기 상황에서 침착한 대처","실용적이고 효율적인 접근","강한 독립심과 자유로운 영혼"],match:["ESFJ","ESTJ"],jobs:["엔지니어","파일럿","응급 구조사","포렌식 분석가","셰프"]},
  ISFP:{title:"호기심 많은 예술가",subtitle:"감성적인 모험가",desc:"온화하고 감성적이며, 현재의 순간을 즐기는 사람입니다. 예술적 감각이 뛰어나고, 자신만의 가치관에 따라 조용히 행동합니다.",traits:["뛰어난 미적 감각과 예술성","유연하고 개방적인 태도","현재를 즐기는 삶의 자세","진정성 있는 따뜻한 마음"],match:["ENFJ","ESFJ","ESTJ"],jobs:["디자이너","사진작가","플로리스트","음악가","물리치료사"]},
  INFP:{title:"열정적인 중재자",subtitle:"이상주의적 몽상가",desc:"이상주의적이고 창의적이며, 내면에 깊은 감정의 세계를 가진 사람입니다. 진정성을 중시하고, 자신의 가치관에 따라 살아가려 합니다.",traits:["풍부한 상상력과 창의성","강한 공감 능력과 이해심","진정성 있는 자기표현","이상을 향한 열정과 헌신"],match:["ENFJ","ENTJ"],jobs:["작가","심리상담사","그래픽 디자이너","영화감독","사회운동가"]},
  INTP:{title:"논리적인 사색가",subtitle:"호기심 많은 분석가",desc:"논리적이고 분석적이며, 지적 호기심이 매우 강한 사람입니다. 독창적인 아이디어를 탐구하고, 복잡한 이론과 개념을 이해하는 것을 즐깁니다.",traits:["끝없는 지적 호기심","독창적이고 혁신적인 사고","논리적이고 객관적인 분석력","복잡한 문제를 풀어내는 능력"],match:["ENTJ","ESTJ"],jobs:["소프트웨어 개발자","데이터 과학자","철학자","수학자","게임 디자이너"]},
  ESTP:{title:"모험을 즐기는 사업가",subtitle:"에너지 넘치는 행동파",desc:"에너지가 넘치고 행동력이 강한 현실주의자입니다. 순간의 기회를 포착하는 능력이 뛰어나며, 어떤 상황에서도 적응력이 좋습니다.",traits:["뛰어난 관찰력과 순발력","대담하고 행동력 있는 리더십","실용적이고 현실적인 문제 해결","사교적이고 유머러스한 매력"],match:["ISFJ","ISTJ"],jobs:["기업가","영업 매니저","운동선수","소방관","마케터"]},
  ESFP:{title:"자유로운 영혼의 연예인",subtitle:"낙천적인 엔터테이너",desc:"밝고 에너지가 넘치며, 주변 사람들에게 즐거움을 주는 사람입니다. 현재의 순간을 최대한 즐기며, 새로운 경험을 사랑합니다.",traits:["타고난 엔터테이너 기질","뛰어난 대인관계 능력","긍정적이고 밝은 에너지","유연하고 적응력 있는 태도"],match:["ISFJ","ISTJ"],jobs:["이벤트 플래너","배우","여행 가이드","PR 전문가","피트니스 트레이너"]},
  ENFP:{title:"재기발랄한 활동가",subtitle:"열정적인 영감의 원천",desc:"열정적이고 창의적이며, 가능성으로 가득한 세상을 보는 사람입니다. 새로운 아이디어와 사람들에게 끊임없이 영감을 받고 줍니다.",traits:["넘치는 열정과 에너지","뛰어난 창의력과 상상력","따뜻하고 진심 어린 소통","다양한 가능성을 탐구하는 호기심"],match:["INFJ","INTJ"],jobs:["크리에이티브 디렉터","저널리스트","스타트업 창업자","코치","콘텐츠 크리에이터"]},
  ENTP:{title:"뜨거운 논쟁을 즐기는 변론가",subtitle:"혁신적인 발명가",desc:"지적이고 호기심이 많으며, 도전적인 토론을 즐기는 사람입니다. 기존의 틀을 깨는 혁신적인 아이디어를 끊임없이 만들어냅니다.",traits:["날카로운 지적 능력과 재치","기존 관념에 도전하는 혁신성","뛰어난 토론 및 설득 능력","빠른 상황 판단과 적응력"],match:["INFJ","INTJ"],jobs:["변호사","기업가","프로덕트 매니저","마케팅 전략가","발명가"]},
  ESTJ:{title:"엄격한 관리자",subtitle:"믿음직한 조직가",desc:"체계적이고 실용적이며, 책임감이 강한 리더입니다. 규칙과 질서를 중시하고, 조직을 효율적으로 운영하는 능력이 뛰어납니다.",traits:["강한 리더십과 결단력","체계적이고 효율적인 조직 운영","높은 책임감과 신뢰성","명확한 원칙과 기준"],match:["ISFP","ISTP","INTP"],jobs:["경영자","판사","군인","재무 관리자","프로젝트 디렉터"]},
  ESFJ:{title:"사교적인 외교관",subtitle:"따뜻한 돌봄이",desc:"따뜻하고 사교적이며, 다른 사람들을 돕는 것에서 보람을 느끼는 사람입니다. 조화와 협력을 중시하고, 모든 사람이 편안하게 느끼도록 배려합니다.",traits:["뛰어난 대인관계 능력","세심한 배려와 헌신","조화로운 분위기 조성","실용적이고 체계적인 돌봄"],match:["ISFP","ISTP"],jobs:["인사 담당자","간호사","교사","호텔 매니저","이벤트 코디네이터"]},
  ENFJ:{title:"정의로운 사회운동가",subtitle:"카리스마 넘치는 리더",desc:"카리스마 있고 영감을 주는 리더입니다. 타인의 성장을 돕는 것에 진심이며, 공동의 목표를 위해 사람들을 하나로 모으는 능력이 탁월합니다.",traits:["타고난 리더십과 카리스마","깊은 공감 능력과 통찰력","타인의 잠재력을 이끌어내는 힘","비전을 제시하고 영감을 주는 소통"],match:["INFP","ISFP"],jobs:["CEO","교육자","정치인","HR 디렉터","라이프 코치"]},
  ENTJ:{title:"대담한 통솔자",subtitle:"전략적 지휘관",desc:"강한 의지와 전략적 사고를 가진 타고난 리더입니다. 효율성을 추구하고, 큰 그림을 보며 목표를 향해 거침없이 나아갑니다.",traits:["강력한 리더십과 추진력","전략적 사고와 장기 비전","높은 자기 확신과 결단력","효율적인 조직 운영 능력"],match:["INFP","INTP"],jobs:["경영자","변호사","벤처 캐피탈리스트","대학교수","정치인"]}
};

let current = 0;
const scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest(){ current=0; Object.keys(scores).forEach(k=>scores[k]=0); showQuestion(); show('question-screen'); }

function showQuestion(){
  const q=questions[current];
  const pct=Math.round(((current)/12)*100);
  document.getElementById('progress-label').textContent=`${current+1} / 12`;
  document.getElementById('progress-pct').textContent=`${pct}%`;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('q-number').textContent=`Question ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent=q.text;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  const order=Math.random()>0.5?['a','b']:['b','a'];
  order.forEach(key=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=q[key].label;
    btn.onclick=()=>answer(q[key].val);
    opts.appendChild(btn);
  });
}

function answer(val){
  scores[val]++;
  current++;
  if(current<12){showQuestion();}
  else{
    show('loading-screen');
    setTimeout(()=>showResult(),1800);
  }
}

function getType(){
  return (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
}

function showResult(){
  const type=getType();
  const d=mbtiData[type];
  document.getElementById('r-type').textContent=type;
  document.getElementById('r-title').textContent=d.title;
  document.getElementById('r-subtitle').textContent=d.subtitle;
  document.getElementById('r-desc').textContent=d.desc;
  const traitsList=document.getElementById('r-traits');
  traitsList.innerHTML='';
  d.traits.forEach(t=>{const li=document.createElement('li');li.textContent=t;traitsList.appendChild(li);});
  const matchWrap=document.getElementById('r-match');
  matchWrap.innerHTML='';
  d.match.forEach(m=>{const span=document.createElement('span');span.className='tag';span.textContent=m;matchWrap.appendChild(span);});
  const jobsWrap=document.getElementById('r-jobs');
  jobsWrap.innerHTML='';
  d.jobs.forEach(j=>{const span=document.createElement('span');span.className='tag';span.textContent=j;jobsWrap.appendChild(span);});
  show('result-screen');
}

function shareResult(){
  const type=getType();
  const d=mbtiData[type];
  const text=`나의 MBTI는 ${type} - ${d.title}! 🧠\n`;
  if(navigator.share){
    navigator.share({title:'MBTI 성격 유형 테스트 결과',text:text,url:location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text+location.href).then(()=>{
      const toast=document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),2500);
    });
  }
}

function retry(){ show('intro-screen'); }
</script>
