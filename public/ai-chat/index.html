<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat — 스마트 어시스턴트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0d0d0d;
  --bg-secondary: #171717;
  --bg-tertiary: #212121;
  --bg-hover: #2a2a2a;
  --bg-active: #343434;
  --surface: #1e1e1e;
  --surface-raised: #262626;
  --border: #2e2e2e;
  --border-light: #3a3a3a;
  --text-primary: #ececec;
  --text-secondary: #a0a0a0;
  --text-tertiary: #6b6b6b;
  --accent: #7c6aef;
  --accent-hover: #6b58e0;
  --accent-glow: rgba(124, 106, 239, 0.25);
  --user-bubble: #2b2b40;
  --ai-bubble: transparent;
  --success: #34d399;
  --scrollbar-thumb: #3a3a3a;
  --scrollbar-track: transparent;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 20px var(--accent-glow);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 350ms cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-width: 280px;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

/* Layout */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* Sidebar Overlay (mobile) */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 90;
  opacity: 0;
  transition: opacity var(--transition-normal);
}
.sidebar-overlay.active {
  display: block;
  opacity: 1;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
}

.sidebar-header {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0;
}

.brand-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: var(--shadow-glow);
}

.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.new-chat-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 1px dashed var(--border-light);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.new-chat-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--text-primary);
  box-shadow: var(--shadow-glow);
}
.new-chat-btn svg { flex-shrink: 0; }

.sidebar-conversations {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.conv-group-label {
  padding: 8px 10px 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conv-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.conv-item.active {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.conv-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.conv-item svg { flex-shrink: 0; opacity: 0.5; }
.conv-item-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-item .delete-btn {
  display: none;
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 2px;
  border-radius: 4px;
  transition: all var(--transition-fast);
}
.conv-item:hover .delete-btn { display: flex; }
.conv-item .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}

.user-info {
  overflow: hidden;
}
.user-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-plan {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* Main Content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  background: var(--bg-primary);
}

/* Top Bar */
.topbar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,13,13,0.8);
  backdrop-filter: blur(12px);
  gap: 12px;
  min-height: 56px;
  z-index: 10;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
}
.menu-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

.topbar-model {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: default;
}
.model-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 6px rgba(52,211,153,0.5);
}

.topbar-spacer { flex: 1; }

.topbar-actions {
  display: flex;
  gap: 4px;
}

.topbar-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}
.topbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Messages Area */
.messages-container {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.messages-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 20px 100px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Welcome Screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-logo {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--accent), #a78bfa, #c084fc);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-glow), var(--shadow-lg);
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: var(--shadow-glow), var(--shadow-lg); }
  50% { box-shadow: 0 0 40px var(--accent-glow), var(--shadow-lg); }
}

.welcome h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.welcome p {
  color: var(--text-tertiary);
  font-size: 14px;
  max-width: 400px;
  line-height: 1.6;
}

.welcome-suggestions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 32px;
  width: 100%;
  max-width: 560px;
}

.suggestion-card {
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  cursor: pointer;
  text-align: left;
  transition: all var(--transition-normal);
  font-family: inherit;
  color: var(--text-primary);
}
.suggestion-card:hover {
  border-color: var(--border-light);
  background: var(--surface-raised);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.suggestion-title {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}
.suggestion-desc {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.4;
}

/* Message */
.message {
  display: flex;
  gap: 14px;
  padding: 20px 0;
  animation: msgIn 0.35s ease-out;
  position: relative;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message + .message { border-top: 1px solid rgba(255,255,255,0.04); }

.message-avatar {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.message.user .message-avatar {
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: #fff;
  font-weight: 600;
  font-size: 12px;
}

.message.ai .message-avatar {
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  box-shadow: 0 0 12px var(--accent-glow);
}

.message-content {
  flex: 1;
  min-width: 0;
}

.message-sender {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.message-sender .timestamp {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-tertiary);
}

.message-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
  word-wrap: break-word;
}

.message-text p + p { margin-top: 12px; }

.message-text code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
}

.message-text pre {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 10px 0;
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.5;
}

.message-text pre code {
  background: none;
  padding: 0;
}

.message-actions {
  display: flex;
  gap: 2px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.message:hover .message-actions { opacity: 1; }

.msg-action-btn {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition-fast);
}
.msg-action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

/* Typing Indicator */
.typing-indicator {
  display: none;
  gap: 14px;
  padding: 20px 0;
  animation: msgIn 0.3s ease-out;
}
.typing-indicator.active { display: flex; }

.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 0;
}
.typing-dots span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-tertiary);
  animation: typingBounce 1.4s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* Input Area */
.input-area {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 20px 20px;
  background: linear-gradient(to top, var(--bg-primary) 70%, transparent);
}

.input-wrapper {
  max-width: 760px;
  margin: 0 auto;
  position: relative;
}

.input-box {
  display: flex;
  align-items: flex-end;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 8px 8px 8px 18px;
  transition: all var(--transition-normal);
  box-shadow: var(--shadow-md);
}
.input-box:focus-within {
  border-color: var(--accent);
  box-shadow: var(--shadow-glow), var(--shadow-md);
}

.input-box textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 150px;
  padding: 6px 0;
  min-height: 24px;
}
.input-box textarea::placeholder {
  color: var(--text-tertiary);
}

.input-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  padding-bottom: 2px;
}

.input-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: all var(--transition-fast);
  background: transparent;
  color: var(--text-tertiary);
}
.input-btn:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.send-btn {
  background: var(--accent) !important;
  color: #fff !important;
  opacity: 0.4;
  transition: all var(--transition-fast);
}
.send-btn.active {
  opacity: 1;
  box-shadow: var(--shadow-glow);
}
.send-btn.active:hover {
  background: var(--accent-hover) !important;
  transform: scale(1.05);
}

.input-hint {
  text-align: center;
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-tertiary);
}

/* File attachment badge */
.file-badge {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 8px;
  background: var(--bg-tertiary);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  max-width: fit-content;
}
.file-badge.active { display: inline-flex; }
.file-badge .remove-file {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 0;
  display: flex;
  font-size: 14px;
  line-height: 1;
}
.file-badge .remove-file:hover { color: #ef4444; }

/* Responsive */
@media (max-width: 768px) {
  :root { --sidebar-width: 300px; }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    box-shadow: none;
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }

  .menu-toggle { display: flex; }

  .welcome-suggestions {
    grid-template-columns: 1fr;
  }

  .messages-inner { padding: 16px 14px 100px; }
  .input-area { padding: 12px 14px 16px; }
}

@media (max-width: 480px) {
  .welcome h1 { font-size: 22px; }
  .topbar-model span { display: none; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <span class="brand-name">AI Chat</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 대화 시작
      </button>
    </div>

    <div class="sidebar-conversations" id="convList">
      <!-- Populated by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar">나</div>
      <div class="user-info">
        <div class="user-name">사용자</div>
        <div class="user-plan">무료 플랜</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-model">
        <span class="model-dot"></span>
        <span>AI Assistant v2.0</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button class="topbar-btn" title="대화 공유">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="messages-inner" id="messagesInner">
        <!-- Welcome or messages -->
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <div class="file-badge" id="fileBadge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="fileName">파일명.txt</span>
          <button class="remove-file" id="removeFile">&times;</button>
        </div>
        <div class="input-box">
          <textarea id="messageInput" rows="1" placeholder="메시지를 입력하세요..." autofocus></textarea>
          <div class="input-actions">
            <button class="input-btn" id="attachBtn" title="파일 첨부">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="input-btn send-btn" id="sendBtn" title="전송 (Enter)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
      </div>
    </div>
  </main>
</div>

<input type="file" id="fileInput" hidden>

<script>
(function() {
  // Elements
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const menuToggle = document.getElementById('menuToggle');
  const newChatBtn = document.getElementById('newChatBtn');
  const convList = document.getElementById('convList');
  const messagesContainer = document.getElementById('messagesContainer');
  const messagesInner = document.getElementById('messagesInner');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const fileBadge = document.getElementById('fileBadge');
  const fileNameEl = document.getElementById('fileName');
  const removeFileBtn = document.getElementById('removeFile');

  // State
  let conversations = [];
  let activeConvId = null;
  let attachedFile = null;

  // AI Responses
  const aiResponses = [
    "좋은 질문이네요! 이 주제에 대해 자세히 설명드리겠습니다.\n\n핵심적으로 말씀드리자면, 이 개념은 여러 요소가 복합적으로 작용하는 결과입니다. 먼저 기본 원리를 이해하는 것이 중요합니다.\n\n추가로 궁금한 점이 있으시면 언제든 물어보세요!",
    "네, 이해했습니다. 다음과 같이 정리해 드릴게요.\n\n**첫째**, 현재 상황을 정확히 파악하는 것이 중요합니다.\n**둘째**, 목표를 명확히 설정해야 합니다.\n**셋째**, 단계별로 접근하면 효과적입니다.\n\n더 구체적인 도움이 필요하시면 말씀해 주세요.",
    "흥미로운 관점이시네요! 제가 알고 있는 정보를 바탕으로 답변드리겠습니다.\n\n이 분야는 최근 많은 발전이 있었으며, 특히 다음과 같은 트렌드가 주목받고 있습니다:\n\n1. 자동화와 효율성 향상\n2. 사용자 경험 중심 설계\n3. 데이터 기반 의사결정\n\n각 항목에 대해 더 깊이 알아보시겠어요?",
    "물론이죠! 코드 예시와 함께 설명드리겠습니다.\n\n```javascript\nfunction solution(input) {\n  // 입력값 처리\n  const result = input.map(item => {\n    return transform(item);\n  });\n  return result;\n}\n```\n\n위 코드에서 핵심은 `transform` 함수의 로직입니다. 이 부분을 상황에 맞게 수정하시면 됩니다.",
    "이 문제를 해결하기 위한 몇 가지 방법을 제안드립니다.\n\n**방법 1: 직접적인 접근**\n가장 간단하지만, 대규모 데이터에서는 성능 이슈가 있을 수 있습니다.\n\n**방법 2: 최적화된 접근**\n초기 설정이 더 필요하지만, 장기적으로 더 효율적입니다.\n\n상황에 따라 적합한 방법이 다를 수 있으니, 구체적인 조건을 알려주시면 더 정확한 추천을 드릴 수 있습니다.",
    "좋은 아이디어입니다! 다만 몇 가지 고려해야 할 사항이 있습니다.\n\n**장점:**\n- 구현이 비교적 간단합니다\n- 유지보수가 용이합니다\n- 확장성이 좋습니다\n\n**주의사항:**\n- 보안 측면을 반드시 확인하세요\n- 에러 처리를 꼼꼼히 해주세요\n- 테스트 코드를 작성하는 것을 권장합니다\n\n시작하는 데 도움이 필요하시면 말씀해 주세요!",
    "아, 그 부분에 대해 도움을 드릴 수 있습니다.\n\n가장 먼저 확인해볼 것은 환경 설정입니다. 종종 이런 문제는 설정 파일의 작은 오류에서 비롯되는 경우가 많습니다.\n\n다음 단계를 따라해 보세요:\n1. 설정 파일을 확인합니다\n2. 로그를 살펴봅니다\n3. 의존성 버전을 체크합니다\n\n여전히 해결되지 않으면 에러 메시지를 공유해 주세요.",
    "말씀하신 내용을 정리해보면, 핵심 목표는 효율적인 워크플로우 구축인 것 같습니다.\n\n이를 위해 추천드리는 접근 방식은:\n\n1. **현재 프로세스 분석** — 병목 지점 파악\n2. **우선순위 설정** — 임팩트 대비 노력 평가\n3. **점진적 개선** — 한 번에 하나씩 변경\n4. **결과 측정** — 개선 효과 정량화\n\n이 프레임워크를 적용하면 체계적으로 개선할 수 있습니다."
  ];

  const defaultConversations = [
    { id: 'demo-1', title: '리액트 컴포넌트 최적화 방법', messages: [
      { role: 'user', text: '리액트에서 컴포넌트를 최적화하는 방법을 알려주세요.', time: '어제' },
      { role: 'ai', text: '리액트 컴포넌트 최적화에는 여러 방법이 있습니다.\n\n**1. React.memo 사용**\n불필요한 리렌더링을 방지합니다.\n\n**2. useMemo / useCallback**\n비용이 큰 계산이나 함수 참조를 메모이제이션합니다.\n\n**3. 코드 스플리팅**\n`React.lazy`와 `Suspense`를 활용하세요.\n\n상황에 맞는 최적화 전략을 선택하는 것이 중요합니다!', time: '어제' }
    ]},
    { id: 'demo-2', title: 'Python 웹 스크래핑 가이드', messages: [
      { role: 'user', text: 'Python으로 웹 스크래핑하는 방법을 알려주세요.', time: '3일 전' },
      { role: 'ai', text: 'Python 웹 스크래핑은 `BeautifulSoup`과 `requests` 라이브러리로 시작할 수 있습니다.\n\n```python\nimport requests\nfrom bs4 import BeautifulSoup\n\nurl = "https://example.com"\nresponse = requests.get(url)\nsoup = BeautifulSoup(response.text, "html.parser")\n```\n\n동적 페이지는 `Selenium`을 추천합니다. 항상 `robots.txt`를 확인하세요!', time: '3일 전' }
    ]},
    { id: 'demo-3', title: 'Git 브랜치 전략 추천', messages: [], time: '1주 전' },
  ];

  // Init
  function init() {
    conversations = JSON.parse(JSON.stringify(defaultConversations));
    renderConversationList();
    showWelcome();
  }

  // Sidebar toggle
  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('active');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('active');
  }

  menuToggle.addEventListener('click', openSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // Render conversation list
  function renderConversationList() {
    convList.innerHTML = '';

    const today = conversations.filter(c => !c.time || c.time === '오늘');
    const yesterday = conversations.filter(c => c.time === '어제' || (c.messages && c.messages.length > 0 && c.messages[0].time === '어제'));
    const older = conversations.filter(c => c.time === '1주 전' || c.time === '3일 전' || (c.messages && c.messages.length > 0 && c.messages[0].time === '3일 전'));

    function addGroup(label, items) {
      if (items.length === 0) return;
      const lbl = document.createElement('div');
      lbl.className = 'conv-group-label';
      lbl.textContent = label;
      convList.appendChild(lbl);
      items.forEach(c => {
        const el = document.createElement('div');
        el.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
        el.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="conv-item-text">${c.title}</span>
          <button class="delete-btn" data-id="${c.id}" title="삭제">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        `;
        el.addEventListener('click', (e) => {
          if (e.target.closest('.delete-btn')) return;
          loadConversation(c.id);
          closeSidebar();
        });
        const delBtn = el.querySelector('.delete-btn');
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteConversation(c.id);
        });
        convList.appendChild(el);
      });
    }

    const activeConv = conversations.find(c => c.id === activeConvId);
    const todayItems = conversations.filter(c => c.id === activeConvId && !defaultConversations.find(d => d.id === c.id));

    addGroup('오늘', todayItems);
    addGroup('이전 대화', conversations.filter(c => !todayItems.includes(c)));
  }

  // Show welcome
  function showWelcome() {
    activeConvId = null;
    renderConversationList();
    messagesInner.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h1>무엇을 도와드릴까요?</h1>
        <p>질문, 글쓰기, 코딩, 분석 등 다양한 작업을 도와드립니다.</p>
        <div class="welcome-suggestions">
          <button class="suggestion-card" data-msg="웹 개발 프로젝트를 시작하려고 합니다. 어떤 기술 스택을 추천하시나요?">
            <div class="suggestion-title">기술 스택 추천</div>
            <div class="suggestion-desc">웹 프로젝트에 적합한 기술 조합</div>
          </button>
          <button class="suggestion-card" data-msg="JavaScript에서 비동기 처리를 효율적으로 하는 방법을 알려주세요.">
            <div class="suggestion-title">비동기 처리 가이드</div>
            <div class="suggestion-desc">JS 비동기 패턴 총정리</div>
          </button>
          <button class="suggestion-card" data-msg="코드 리뷰를 잘 하는 방법과 체크리스트를 만들어 주세요.">
            <div class="suggestion-title">코드 리뷰 체크리스트</div>
            <div class="suggestion-desc">효과적인 코드 리뷰 가이드</div>
          </button>
          <button class="suggestion-card" data-msg="개발자 포트폴리오 사이트를 만들 때 포함해야 할 핵심 요소가 뭔가요?">
            <div class="suggestion-title">포트폴리오 구성 팁</div>
            <div class="suggestion-desc">임팩트 있는 포트폴리오 만들기</div>
          </button>
        </div>
      </div>
    `;
    messagesInner.querySelectorAll('.suggestion-card').forEach(card => {
      card.addEventListener('click', () => {
        messageInput.value = card.dataset.msg;
        autoResize();
        updateSendBtn();
        sendMessage();
      });
    });
  }

  // Load conversation
  function loadConversation(id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    activeConvId = id;
    renderConversationList();
    renderMessages(conv.messages);
  }

  // Render messages
  function renderMessages(messages) {
    messagesInner.innerHTML = '';
    messages.forEach(msg => {
      appendMessageDOM(msg.role, msg.text, msg.time, false);
    });
    scrollToBottom();
  }

  function appendMessageDOM(role, text, time, animate) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none';

    const avatarContent = role === 'user'
      ? '나'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';

    const senderName = role === 'user' ? '나' : 'AI 어시스턴트';
    const timeStr = time || formatTime();

    // Format text with basic markdown
    const formattedText = formatText(text);

    div.innerHTML = `
      <div class="message-avatar">${avatarContent}</div>
      <div class="message-content">
        <div class="message-sender">${senderName} <span class="timestamp">${timeStr}</span></div>
        <div class="message-text">${formattedText}</div>
        <div class="message-actions">
          <button class="msg-action-btn" onclick="copyText(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            복사
          </button>
        </div>
      </div>
    `;

    messagesInner.appendChild(div);
  }

  function formatText(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Paragraphs
    text = text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    return text;
  }

  function formatTime() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const period = h < 12 ? '오전' : '오후';
    const hour12 = h % 12 || 12;
    return `${period} ${hour12}:${m}`;
  }

  // Send message
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    // Create new conversation if needed
    if (!activeConvId) {
      const id = 'conv-' + Date.now();
      const title = text.length > 30 ? text.substring(0, 30) + '...' : text;
      conversations.unshift({ id, title, messages: [] });
      activeConvId = id;
      messagesInner.innerHTML = '';
      renderConversationList();
    }

    const conv = conversations.find(c => c.id === activeConvId);
    const userMsg = { role: 'user', text, time: formatTime() };
    conv.messages.push(userMsg);
    appendMessageDOM('user', text, userMsg.time, true);

    // Clear input
    messageInput.value = '';
    autoResize();
    updateSendBtn();
    clearAttachment();
    scrollToBottom();

    // Show typing indicator
    showTyping();

    // Simulate AI response
    const delay = 1000 + Math.random() * 2000;
    setTimeout(() => {
      hideTyping();
      const responseText = aiResponses[Math.floor(Math.random() * aiResponses.length)];
      const aiMsg = { role: 'ai', text: responseText, time: formatTime() };
      conv.messages.push(aiMsg);
      appendMessageDOM('ai', responseText, aiMsg.time, true);
      scrollToBottom();
    }, delay);
  }

  // Typing indicator
  function showTyping() {
    let typingEl = document.getElementById('typingIndicator');
    if (!typingEl) {
      typingEl = document.createElement('div');
      typingEl.id = 'typingIndicator';
      typingEl.className = 'typing-indicator';
      typingEl.innerHTML = `
        <div class="message-avatar" style="background: linear-gradient(135deg, var(--accent), #a78bfa); box-shadow: 0 0 12px var(--accent-glow);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="message-content">
          <div class="message-sender">AI 어시스턴트</div>
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      `;
      messagesInner.appendChild(typingEl);
    }
    typingEl.classList.add('active');
    scrollToBottom();
  }

  function hideTyping() {
    const typingEl = document.getElementById('typingIndicator');
    if (typingEl) typingEl.remove();
  }

  // Delete conversation
  function deleteConversation(id) {
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
      showWelcome();
    }
    renderConversationList();
  }

  // New chat
  newChatBtn.addEventListener('click', () => {
    showWelcome();
    messageInput.focus();
    closeSidebar();
  });

  // Send
  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto resize textarea
  function autoResize() {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
  }
  messageInput.addEventListener('input', () => {
    autoResize();
    updateSendBtn();
  });

  function updateSendBtn() {
    sendBtn.classList.toggle('active', messageInput.value.trim().length > 0);
  }

  // File attachment
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      attachedFile = fileInput.files[0];
      fileNameEl.textContent = attachedFile.name;
      fileBadge.classList.add('active');
    }
  });
  removeFileBtn.addEventListener('click', clearAttachment);

  function clearAttachment() {
    attachedFile = null;
    fileInput.value = '';
    fileBadge.classList.remove('active');
  }

  // Scroll
  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
  }

  // Copy
  window.copyText = function(btn) {
    const msgText = btn.closest('.message-content').querySelector('.message-text').textContent;
    navigator.clipboard.writeText(msgText).then(() => {
      const original = btn.innerHTML;
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        복사됨!
      `;
      setTimeout(() => { btn.innerHTML = original; }, 1500);
    });
  };

  init();
})();
</script>
</body>
</html>
