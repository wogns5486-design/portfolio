<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsFlow — 뉴스·블로그 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
   ═══════════════════════════════════════ */
:root {
  --font-sans: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
  --max-w: 1320px;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --shadow-xl: 0 20px 60px rgba(0,0,0,.18);
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

/* Light theme */
[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fc;
  --bg-tertiary: #f0f2f7;
  --bg-card: #ffffff;
  --bg-card-hover: #f8f9fc;
  --bg-nav: rgba(255,255,255,.85);
  --bg-modal: #ffffff;
  --bg-overlay: rgba(0,0,0,.55);
  --bg-input: #f0f2f7;
  --bg-badge: #eef1f6;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --text-inverse: #ffffff;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-light: #eff6ff;
  --accent-red: #ef4444;
  --accent-green: #22c55e;
  --accent-orange: #f59e0b;
  --accent-purple: #8b5cf6;
  --accent-pink: #ec4899;
  --accent-teal: #14b8a6;
  --gradient-hero: linear-gradient(135deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.25) 100%);
  --scrollbar-thumb: #cbd5e1;
  --tag-bg: #f1f5f9;
  --tag-text: #475569;
  --tag-hover-bg: #e2e8f0;
}

/* Dark theme */
[data-theme="dark"] {
  --bg-primary: #0b0f1a;
  --bg-secondary: #111827;
  --bg-tertiary: #1e293b;
  --bg-card: #151c2c;
  --bg-card-hover: #1a2236;
  --bg-nav: rgba(11,15,26,.9);
  --bg-modal: #151c2c;
  --bg-overlay: rgba(0,0,0,.75);
  --bg-input: #1e293b;
  --bg-badge: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-tertiary: #64748b;
  --text-inverse: #ffffff;
  --border: #1e293b;
  --border-light: #1e293b;
  --accent: #60a5fa;
  --accent-hover: #93bbfd;
  --accent-light: rgba(96,165,250,.12);
  --accent-red: #f87171;
  --accent-green: #4ade80;
  --accent-orange: #fbbf24;
  --accent-purple: #a78bfa;
  --accent-pink: #f472b6;
  --accent-teal: #2dd4bf;
  --gradient-hero: linear-gradient(135deg, rgba(0,0,0,.7) 0%, rgba(0,0,0,.4) 100%);
  --scrollbar-thumb: #334155;
  --tag-bg: #1e293b;
  --tag-text: #94a3b8;
  --tag-hover-bg: #334155;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.2);
  --shadow-md: 0 4px 16px rgba(0,0,0,.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.4);
  --shadow-xl: 0 20px 60px rgba(0,0,0,.5);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-secondary);
  color: var(--text-primary);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

img { display:block; max-width:100%; }
a { text-decoration:none; color:inherit; }
button { border:none; background:none; cursor:pointer; font-family:inherit; }
ul { list-style:none; }

/* ═══════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--bg-nav);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition), border var(--transition);
}

.nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 68px;
  gap: 32px;
}

.nav-logo {
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
}

.nav-categories {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-categories::-webkit-scrollbar { display:none; }

.nav-cat-btn {
  padding: 7px 16px;
  border-radius: 100px;
  font-size: .875rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all var(--transition);
}
.nav-cat-btn:hover,
.nav-cat-btn.active {
  background: var(--accent);
  color: var(--text-inverse);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
  flex-shrink: 0;
}

.search-box {
  position: relative;
  width: 220px;
}
.search-box input {
  width: 100%;
  padding: 9px 16px 9px 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: .875rem;
  color: var(--text-primary);
  outline: none;
  transition: all var(--transition);
  font-family: var(--font-sans);
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.search-box input::placeholder { color: var(--text-tertiary); }
.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-tertiary);
}

.theme-toggle {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-input);
  border: 1px solid var(--border);
  transition: all var(--transition);
  color: var(--text-secondary);
}
.theme-toggle:hover {
  background: var(--accent);
  color: var(--text-inverse);
  border-color: var(--accent);
}
.theme-toggle svg { width: 20px; height: 20px; }

.mobile-menu-btn {
  display: none;
  width: 42px; height: 42px;
  border-radius: 12px;
  align-items: center;
  justify-content: center;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

/* ═══════════════════════════════════════
   HERO SECTION
   ═══════════════════════════════════════ */
.hero {
  margin-top: 68px;
  padding: 32px 24px;
  max-width: var(--max-w);
  margin-left: auto;
  margin-right: auto;
}

.hero-card {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  height: 520px;
  transition: transform var(--transition), box-shadow var(--transition);
}
.hero-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }

.hero-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: var(--gradient-hero);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 48px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  background: var(--accent);
  color: #fff;
  font-size: .8rem;
  font-weight: 600;
  width: fit-content;
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.hero-title {
  font-size: 2.5rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.25;
  margin-bottom: 14px;
  letter-spacing: -.02em;
  max-width: 700px;
}

.hero-summary {
  font-size: 1.1rem;
  color: rgba(255,255,255,.82);
  max-width: 600px;
  line-height: 1.7;
  margin-bottom: 20px;
}

.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  color: rgba(255,255,255,.7);
  font-size: .875rem;
}
.hero-meta span { display: flex; align-items: center; gap: 5px; }

/* ═══════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════ */
.main-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 36px;
}

/* ═══════════════════════════════════════
   FILTER BAR
   ═══════════════════════════════════════ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.filter-bar .section-title {
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -.02em;
  margin-right: 12px;
}
.filter-btn {
  padding: 7px 18px;
  border-radius: 100px;
  font-size: .85rem;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-card);
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ═══════════════════════════════════════
   ARTICLE CARDS GRID
   ═══════════════════════════════════════ */
.articles-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

.article-card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
}
.article-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent);
}

.article-thumb {
  position: relative;
  height: 200px;
  overflow: hidden;
}
.article-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s ease;
}
.article-card:hover .article-thumb img { transform: scale(1.06); }

.article-category {
  position: absolute;
  top: 14px; left: 14px;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: .75rem;
  font-weight: 600;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.cat-정치 { background: #ef4444; }
.cat-경제 { background: #f59e0b; }
.cat-사회 { background: #22c55e; }
.cat-IT { background: #3b82f6; }
.cat-문화 { background: #8b5cf6; }
.cat-스포츠 { background: #ec4899; }

.article-body {
  padding: 20px;
}

.article-title {
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 8px;
  letter-spacing: -.01em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.article-summary {
  font-size: .875rem;
  color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 16px;
}

.article-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .8rem;
  color: var(--text-tertiary);
}
.article-meta-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.article-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  color: var(--text-secondary);
}
.author-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  font-weight: 700;
  color: var(--accent);
}
.article-date { color: var(--text-tertiary); }
.article-read-time {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--text-tertiary);
}

/* ═══════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════ */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.sidebar-section {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 24px;
  transition: background var(--transition), border var(--transition);
}

.sidebar-title {
  font-size: 1.1rem;
  font-weight: 800;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -.01em;
}
.sidebar-title svg { color: var(--accent); }

.trending-item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: all var(--transition);
}
.trending-item:last-child { border-bottom: none; padding-bottom: 0; }
.trending-item:first-child { padding-top: 0; }
.trending-item:hover .trending-title { color: var(--accent); }

.trending-rank {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
  min-width: 32px;
  line-height: 1;
  padding-top: 2px;
}

.trending-content { flex: 1; min-width: 0; }
.trending-title {
  font-size: .9rem;
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 4px;
  transition: color var(--transition);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.trending-meta {
  font-size: .78rem;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tag-item {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: .82rem;
  font-weight: 500;
  background: var(--tag-bg);
  color: var(--tag-text);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
}
.tag-item:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Newsletter */
.newsletter-box {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
  border: none;
  color: #fff;
}
.newsletter-box .sidebar-title { color: #fff; }
.newsletter-box .sidebar-title svg { color: #fff; }
.newsletter-box p { font-size: .9rem; opacity: .9; margin-bottom: 14px; line-height: 1.6; }
.newsletter-input {
  display: flex;
  gap: 8px;
}
.newsletter-input input {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: .875rem;
  font-family: var(--font-sans);
  outline: none;
}
.newsletter-input button {
  padding: 10px 20px;
  background: rgba(255,255,255,.2);
  color: #fff;
  font-weight: 600;
  font-size: .85rem;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
  backdrop-filter: blur(10px);
}
.newsletter-input button:hover { background: rgba(255,255,255,.35); }

/* ═══════════════════════════════════════
   MODAL
   ═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: var(--bg-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all .3s ease;
  padding: 24px;
}
.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-modal);
  border-radius: var(--radius-lg);
  max-width: 780px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(30px) scale(.97);
  transition: transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow: var(--shadow-xl);
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-hero {
  position: relative;
  height: 380px;
}
.modal-hero img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.modal-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 60%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 36px;
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(10px);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  z-index: 10;
}
.modal-close:hover { background: rgba(0,0,0,.7); }
.modal-close svg { width: 20px; height: 20px; }

.modal-badge {
  display: inline-flex;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: .78rem;
  font-weight: 600;
  color: #fff;
  width: fit-content;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.modal-title {
  font-size: 1.8rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
  letter-spacing: -.02em;
}

.modal-content {
  padding: 32px 36px;
}

.modal-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  font-size: .9rem;
  color: var(--text-secondary);
  flex-wrap: wrap;
}
.modal-meta span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-text {
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--text-primary);
}
.modal-text p { margin-bottom: 20px; }
.modal-text p:last-child { margin-bottom: 0; }

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.modal-action-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: 100px;
  font-size: .9rem;
  font-weight: 600;
  transition: all var(--transition);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.modal-action-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.modal-action-btn.liked {
  background: var(--accent-red);
  color: #fff;
  border-color: var(--accent-red);
}
.modal-action-btn svg { width: 18px; height: 18px; }

/* ═══════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════ */
footer {
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
  padding: 40px 24px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: .875rem;
  transition: background var(--transition), border var(--transition);
}
footer strong {
  color: var(--text-primary);
  font-weight: 700;
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 1100px) {
  .main-wrap {
    grid-template-columns: 1fr;
  }
  .sidebar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
}

@media (max-width: 860px) {
  .nav-categories { display: none; }
  .mobile-menu-btn { display: flex; }
  .hero-card { height: 400px; }
  .hero-title { font-size: 1.8rem; }
  .hero-overlay { padding: 28px; }
  .articles-grid { grid-template-columns: 1fr; }
  .search-box { width: 160px; }
  .sidebar { grid-template-columns: 1fr; }
}

@media (max-width: 560px) {
  .nav-inner { padding: 0 16px; gap: 12px; }
  .nav-logo { font-size: 1.25rem; }
  .search-box { width: 120px; }
  .hero { padding: 16px; }
  .hero-card { height: 340px; }
  .hero-title { font-size: 1.4rem; }

const tags = ["AI", "경제", "정치", "스포츠", "테크", "문화", "환경", "투자", "영화", "스타트업", "블록체인", "모빌리티", "헬스케어", "교육", "부동산", "메타버스"];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentFilter = "전체";
let searchQuery = "";
let likedArticles = new Set();

// ═══════════════════════════════════════
// THEME TOGGLE
// ═══════════════════════════════════════
const themeToggle = document.getElementById("themeToggle");
const sunIcon = document.getElementById("sunIcon");
const moonIcon = document.getElementById("moonIcon");

function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("newsflow-theme", theme);
  if (theme === "dark") {
    sunIcon.style.display = "none";
    moonIcon.style.display = "block";
  } else {
    sunIcon.style.display = "block";
    moonIcon.style.display = "none";
  }
}

themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  setTheme(current === "dark" ? "light" : "dark");
});

// init theme
const saved = localStorage.getItem("newsflow-theme");
if (saved) setTheme(saved);
else if (window.matchMedia("(prefers-color-scheme: dark)").matches) setTheme("dark");

// ═══════════════════════════════════════
// MOBILE MENU
// ═══════════════════════════════════════
document.getElementById("mobileMenuBtn").addEventListener("click", () => {
  document.getElementById("mobileCats").classList.toggle("open");
});

// ═══════════════════════════════════════
// RENDER HERO
// ═══════════════════════════════════════
function renderHero() {
  const a = articles[0];
  document.getElementById("heroSection").innerHTML = `
    <div class="hero-card" onclick="openModal(0)">
      <img src="${a.image}" alt="${a.title}">
      <div class="hero-overlay">
        <span class="hero-badge">${a.category} · 속보</span>
        <h1 class="hero-title">${a.title}</h1>
        <p class="hero-summary">${a.summary}</p>
        <div class="hero-meta">
          <span><strong>${a.author}</strong></span>
          <span>${a.date}</span>
          <span>📖 ${a.readTime} 읽기</span>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
// RENDER ARTICLES
// ═══════════════════════════════════════
function getFilteredArticles() {
  return articles.filter((a, i) => {
    if (i === 0) return false; // skip hero
    const catMatch = currentFilter === "전체" || a.category === currentFilter;
    const searchMatch = !searchQuery ||
      a.title.toLowerCase().includes(searchQuery) ||
      a.summary.toLowerCase().includes(searchQuery) ||
      a.tags.some(t => t.toLowerCase().includes(searchQuery));
    return catMatch && searchMatch;
  });
}

function renderArticles() {
  const grid = document.getElementById("articlesGrid");
  const filtered = getFilteredArticles();

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <h3>검색 결과가 없습니다</h3>
        <p>다른 키워드로 검색하거나 필터를 변경해보세요.</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <article class="article-card" onclick="openModal(${a.id})">
      <div class="article-thumb">
        <img src="${a.image}" alt="${a.title}" loading="lazy">
        <span class="article-category cat-${a.category}">${a.category}</span>
      </div>
      <div class="article-body">
        <h3 class="article-title">${a.title}</h3>
        <p class="article-summary">${a.summary}</p>
        <div class="article-meta">
          <div class="article-meta-left">
            <span class="article-author">
              <span class="author-avatar">${a.author[0]}</span>
              ${a.author}
            </span>
            <span class="article-date">${a.date}</span>
          </div>
          <span class="article-read-time">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${a.readTime}
          </span>
        </div>
      </div>
    </article>
  `).join("");
}

// ═══════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════
function renderTrending() {
  const top5 = articles.slice(0, 5);
  document.getElementById("trendingList").innerHTML = top5.map((a, i) => `
    <div class="trending-item" onclick="openModal(${a.id})">
      <span class="trending-rank">${i + 1}</span>
      <div class="trending-content">
        <div class="trending-title">${a.title}</div>
        <div class="trending-meta">
          <span>${a.category}</span>
          <span>·</span>
          <span>${a.date}</span>
        </div>
      </div>
    </div>
  `).join("");
}

function renderTags() {
  document.getElementById("tagCloud").innerHTML = tags.map(t =>
    `<span class="tag-item">${t}</span>`
  ).join("");
}

// ═══════════════════════════════════════
// CATEGORY FILTER
// ═══════════════════════════════════════
function setFilter(cat, source) {
  currentFilter = cat;

  // update nav buttons
  document.querySelectorAll(".nav-cat-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.cat === cat);
  });
  // update filter bar buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.cat === cat);
  });

  renderArticles();
  document.getElementById("mobileCats").classList.remove("open");
}

document.querySelectorAll(".nav-cat-btn, .filter-btn").forEach(btn => {
  btn.addEventListener("click", () => setFilter(btn.dataset.cat));
});

// SEARCH
// ═══════════════════════════════════════
document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderArticles();
});

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
const overlay = document.getElementById("modalOverlay");
const modal = document.getElementById("modal");

function openModal(id) {
  const a = articles[id];
  if (!a) return;

  const catClass = `cat-${a.category}`;
  const liked = likedArticles.has(id);

  document.getElementById("modalHero").innerHTML = `
    <button class="modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <img src="${a.image}" alt="${a.title}">
    <div class="modal-hero-overlay">
      <span class="modal-badge ${catClass}">${a.category}</span>
      <h2 class="modal-title">${a.title}</h2>
    </div>
  `;

  document.getElementById("modalContent").innerHTML = `
    <div class="modal-meta">
      <span><strong>${a.author}</strong></span>
      <span>${a.date}</span>
      <span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${a.readTime} 읽기
      </span>
      <span>${a.tags.map(t => '#' + t).join(' ')}</span>
    </div>
    <div class="modal-text">
      ${a.body.map(p => `<p>${p}</p>`).join("")}
    </div>
    <div class="modal-actions">
      <button class="modal-action-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${id}, this)">
        <svg viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        좋아요 ${liked ? '취소' : ''}
      </button>
      <button class="modal-action-btn" onclick="shareArticle(${id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        공유하기
      </button>
    </div>
  `;

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
}

overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

function toggleLike(id, btn) {
  if (likedArticles.has(id)) {
    likedArticles.delete(id);
    btn.classList.remove("liked");
    btn.querySelector("svg").setAttribute("fill", "none");
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 좋아요`;
  } else {
    likedArticles.add(id);
    btn.classList.add("liked");
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 좋아요 취소`;
  }
}

function shareArticle(id) {
  const a = articles[id];
  if (navigator.share) {
    navigator.share({ title: a.title, text: a.summary, url: window.location.href });
  } else {
    navigator.clipboard.writeText(a.title + " - " + window.location.href).then(() => {
      const toast = document.createElement("div");
      toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:var(--bg-primary);padding:12px 24px;border-radius:100px;font-size:.9rem;font-weight:500;z-index:3000;animation:fadeInUp .3s ease";
      toast.textContent = "링크가 클립보드에 복사되었습니다!";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    });
  }
}

// ═══════════════════════════════════════
// TAG CLICK
// ═══════════════════════════════════════
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("tag-item")) {
    const input = document.getElementById("searchInput");
    input.value = e.target.textContent;
    searchQuery = e.target.textContent.toLowerCase();
    setFilter("전체");
    renderArticles();
    window.scrollTo({ top: document.querySelector(".filter-bar").offsetTop - 90, behavior: "smooth" });
  }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderHero();
renderArticles();
renderTrending();
renderTags();
</script>
</body>
</html>
