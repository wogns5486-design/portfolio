<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무비타임 - 영화 리뷰 플랫폼</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0d0d0d;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-surface: #1c1c3a;
  --text-primary: #f0f0f0;
  --text-secondary: #a0a0b8;
  --text-muted: #6b6b80;
  --accent: #e63946;
  --accent-hover: #ff4d5a;
  --accent-glow: rgba(230, 57, 70, 0.3);
  --gold: #ffd700;
  --gold-dim: #b8960c;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 12px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.light-mode {
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-surface: #f0f0f3;
  --text-primary: #1a1a2e;
  --text-secondary: #555570;
  --text-muted: #8888a0;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.1);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

/* ===== HEADER ===== */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(13,13,13,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.light-mode header { background: rgba(255,255,255,0.85); }

.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 0 24px; height: 68px;
  display: flex; align-items: center; gap: 24px;
}

.logo {
  font-size: 1.5rem; font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0; cursor: default;
}
.logo svg { width: 28px; height: 28px; }

.search-box {
  flex: 1; max-width: 420px; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 16px 10px 42px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text-primary);
  font-size: 0.9rem; font-family: inherit;
  outline: none; transition: all var(--transition);
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--text-muted);
}

.header-actions {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}

.theme-toggle {
  width: 42px; height: 42px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  font-size: 1.2rem;
}
.theme-toggle:hover {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}

/* ===== GENRE FILTER ===== */
.genre-bar {
  max-width: 1400px; margin: 84px auto 0;
  padding: 16px 24px;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.genre-btn {
  padding: 8px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text-secondary);
  font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  font-family: inherit;
}
.genre-btn:hover { color: var(--text-primary); border-color: var(--accent); }
.genre-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
  box-shadow: 0 4px 16px var(--accent-glow);
}

/* ===== HERO ===== */
.hero {
  max-width: 1400px; margin: 20px auto;
  padding: 0 24px;
}
.hero-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  height: 420px;
  cursor: pointer;
  transition: transform var(--transition);
}
.hero-card:hover { transform: scale(1.005); }
.hero-card img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 48px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: #fff;
  padding: 6px 14px; border-radius: 50px;
  font-size: 0.75rem; font-weight: 700;
  width: fit-content; margin-bottom: 16px;
  text-transform: uppercase; letter-spacing: 1px;
}
.hero-title {
  font-size: 2.8rem; font-weight: 900;
  color: #fff; line-height: 1.2;
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.hero-meta {
  display: flex; align-items: center; gap: 16px;
  color: rgba(255,255,255,0.8); font-size: 0.95rem;
}
.hero-rating {
  display: flex; align-items: center; gap: 4px;
  color: var(--gold); font-weight: 700;
}

/* ===== SECTION ===== */
.section-header {
  max-width: 1400px; margin: 40px auto 20px;
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-title {
  font-size: 1.5rem; font-weight: 800;
}
.section-title span { color: var(--accent); }
.movie-count {
  color: var(--text-muted); font-size: 0.9rem;
}

/* ===== MOVIE GRID ===== */
.movie-grid {
  max-width: 1400px; margin: 0 auto;
  padding: 0 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

.movie-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.movie-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow), 0 0 40px var(--accent-glow);
  border-color: rgba(230,57,70,0.3);
}
.movie-card .poster-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}
.movie-card .poster-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.movie-card:hover .poster-wrap img { transform: scale(1.08); }

.card-rating {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  padding: 4px 10px; border-radius: 50px;
  display: flex; align-items: center; gap: 4px;
  font-size: 0.8rem; font-weight: 700;
  color: var(--gold);
}
.card-rating svg { width: 14px; height: 14px; fill: var(--gold); }

.card-genre-tag {
  position: absolute; top: 12px; left: 12px;
  background: var(--accent);
  color: #fff;
  padding: 3px 10px; border-radius: 50px;
  font-size: 0.7rem; font-weight: 600;
}

.card-body { padding: 16px; }
.card-title {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta {
  display: flex; align-items: center; justify-content: space-between;
  color: var(--text-muted); font-size: 0.8rem;
}
.card-stars {
  display: flex; gap: 2px;
}
.card-stars svg { width: 14px; height: 14px; }
.star-filled { fill: var(--gold); }
.star-empty { fill: var(--text-muted); opacity: 0.3; }

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: all 0.3s ease;
  padding: 24px;
}
.modal-backdrop.active { opacity: 1; visibility: visible; }

.modal {
  background: var(--bg-secondary);
  border-radius: 20px;
  width: 100%; max-width: 860px;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  transform: translateY(30px) scale(0.95);
  transition: transform 0.3s ease;
  position: relative;
}
.modal-backdrop.active .modal {
  transform: translateY(0) scale(1);
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 40px; height: 40px; z-index: 10;
  background: rgba(0,0,0,0.5);
  border: none; border-radius: 50%;
  color: #fff; font-size: 1.3rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.modal-close:hover { background: var(--accent); }

.modal-hero {
  position: relative; height: 300px;
  overflow: hidden;
}
.modal-hero img {
  width: 100%; height: 100%; object-fit: cover;
}
.modal-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, var(--bg-secondary) 0%, transparent 60%);
}

.modal-content {
  padding: 0 32px 32px;
  margin-top: -60px;
  position: relative;
}

.modal-top {
  display: flex; gap: 24px; margin-bottom: 24px;
}
.modal-poster {
  width: 160px; height: 240px; flex-shrink: 0;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  border: 2px solid var(--border);
}
.modal-poster img {
  width: 100%; height: 100%; object-fit: cover;
}
.modal-info { flex: 1; padding-top: 60px; }
.modal-title {
  font-size: 1.8rem; font-weight: 800;
  margin-bottom: 8px;
}
.modal-meta-row {
  display: flex; flex-wrap: wrap; gap: 12px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 12px;
}
.modal-meta-row span { display: flex; align-items: center; gap: 4px; }
.modal-rating-big {
  display: flex; align-items: center; gap: 8px;
  font-size: 1.5rem; font-weight: 800;
  color: var(--gold);
}
.modal-rating-big .stars { display: flex; gap: 3px; }
.modal-rating-big .stars svg { width: 22px; height: 22px; }

.modal-section { margin-bottom: 28px; }
.modal-section-title {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.modal-section-title::before {
  content: ''; width: 4px; height: 20px;
  background: var(--accent); border-radius: 2px;
}

.modal-synopsis {
  color: var(--text-secondary);
  font-size: 0.95rem; line-height: 1.8;
}

.modal-credits {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.credit-item label {
  display: block; font-size: 0.75rem;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px;
}
.credit-item span {
  font-size: 0.95rem; font-weight: 500;
}

/* Rating Distribution */
.rating-bars { display: flex; flex-direction: column; gap: 8px; }
.rating-bar-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85rem;
}
.rating-bar-label {
  width: 20px; text-align: right;
  color: var(--text-muted); font-weight: 600;
}
.rating-bar-track {
  flex: 1; height: 8px;
  background: var(--bg-surface);
  border-radius: 4px; overflow: hidden;
}
.rating-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 4px;
  transition: width 0.6s ease;
}
.rating-bar-count {
  width: 30px; color: var(--text-muted);
  font-size: 0.8rem;
}

/* Reviews */
.review-list { display: flex; flex-direction: column; gap: 16px; }
.review-item {
  background: var(--bg-surface);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
}
.review-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.review-user {
  display: flex; align-items: center; gap: 10px;
}
.review-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 0.85rem;
}
.review-name { font-weight: 600; font-size: 0.9rem; }
.review-date { color: var(--text-muted); font-size: 0.8rem; }
.review-stars { display: flex; gap: 2px; }
.review-stars svg { width: 14px; height: 14px; }
.review-text {
  color: var(--text-secondary);
  font-size: 0.9rem; line-height: 1.7;
}

/* Review Form */
.review-form {
  background: var(--bg-surface);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  margin-top: 16px;
}
.review-form h4 {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 12px;
}
.star-input {
  display: flex; gap: 6px; margin-bottom: 12px;
}
.star-input span {
  font-size: 1.5rem; cursor: pointer;
  color: var(--text-muted);
  transition: color 0.2s;
}
.star-input span.selected,
.star-input span:hover,
.star-input span:hover ~ span { color: var(--gold); }
.review-form textarea {
  width: 100%; min-height: 80px; padding: 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: inherit; font-size: 0.9rem;
  resize: vertical; outline: none;
  transition: border-color var(--transition);
}
.review-form textarea:focus {
  border-color: var(--accent);
}
.review-form textarea::placeholder { color: var(--text-muted); }
.review-form button {
  margin-top: 12px; padding: 10px 28px;
  background: var(--accent);
  border: none; border-radius: 50px;
  color: #fff; font-weight: 600;
  font-family: inherit; font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition);
}
.review-form button:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 20px var(--accent-glow);
}

/* ===== NO RESULTS ===== */
.no-results {
  text-align: center; padding: 80px 24px;
  color: var(--text-muted);
  max-width: 1400px; margin: 0 auto;
}
.no-results svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
.no-results p { font-size: 1.1rem; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-inner { padding: 0 16px; gap: 12px; }
  .logo { font-size: 1.2rem; }
  .search-box { max-width: none; }
  .hero-card { height: 280px; }
  .hero-overlay { padding: 24px; }
  .hero-title { font-size: 1.6rem; }
  .hero-meta { font-size: 0.8rem; gap: 10px; }
  .genre-bar { margin-top: 76px; padding: 12px 16px; gap: 8px; }
  .genre-btn { padding: 6px 14px; font-size: 0.8rem; }
  .section-header { padding: 0 16px; margin-top: 28px; }
  .movie-grid {
    padding: 0 16px 40px;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .modal { border-radius: 16px; }
  .modal-hero { height: 200px; }
  .modal-content { padding: 0 20px 24px; }
  .modal-top { flex-direction: column; align-items: center; text-align: center; }
  .modal-poster { width: 130px; height: 195px; }
  .modal-info { padding-top: 12px; }
  .modal-title { font-size: 1.4rem; }
  .modal-meta-row { justify-content: center; }
  .modal-credits { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .movie-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .card-body { padding: 12px; }
  .card-title { font-size: 0.9rem; }
}

/* Fade-in animation */
.movie-card {
  animation: fadeUp 0.5s ease forwards;
  opacity: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/>

      무비타임
    </div>

      <input type="text" id="searchInput" placeholder="영화 제목으로 검색...">

      <button class="theme-toggle" id="themeToggle" aria-label="테마 변경">🌙</button>

<!-- GENRE FILTER -->

</nav>

<!-- HERO -->
<section class="hero" id="heroSection"></section>

<!-- SECTION HEADER -->
<div class="section-header">
  <h2 class="section-title">인기 <span>영화</span></h2>
  <span class="movie-count" id="movieCount"></span>
</div>

<!-- MOVIE GRID -->
<div class="movie-grid" id="movieGrid"></div>

<!-- NO RESULTS -->
<div class="no-results" id="noResults" style="display:none;">

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">

    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-hero" id="modalHero"></div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
const MOVIES = [
  {
    id: 1, title: "인터스텔라", titleEn: "Interstellar", genre: "SF",
    year: 2014, rating: 9.2, director: "크리스토퍼 놀란",
    cast: "매튜 매커너히, 앤 해서웨이, 제시카 차스테인",
    poster: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=400&h=600&fit=crop",
    backdrop: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=1400&h=500&fit=crop",
    synopsis: "식량 부족과 기후 변화로 인류의 생존이 위협받는 가까운 미래. 전 NASA 파일럿 쿠퍼는 인류를 구할 새로운 행성을 찾기 위해 웜홀을 통과하는 위험한 우주 탐험에 나선다. 시간과 공간을 초월한 사랑의 이야기.",
    ratingDist: [5, 8, 15, 45, 120],
    reviews: [
      { user: "영화광", avatar: "영", date: "2025.12.15", rating: 5, text: "놀란 감독의 최고 걸작. 과학적 정확성과 감동적 스토리가 완벽하게 어우러집니다." },
      { user: "시네마틱", avatar: "시", date: "2025.11.20", rating: 5, text: "웜홀 시퀀스와 블랙홀 장면은 아직도 잊을 수 없다. 한스 짐머의 음악도 압도적." }
    ]

// Globals
let currentGenre = '전체';
let searchQuery = '';
let userReviews = {};

// --- Stars helper ---
function starsHTML(rating, size = 14) {
  const full = Math.floor(rating / 2);
  const half = rating % 2 >= 1 ? 1 : 0;
  let html = '';
  for (let i = 0; i < 5; i++) {
    if (i < full) html += `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="star-filled"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01z"/></svg>`;
    else if (i === full && half) html += `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="star-filled" style="opacity:0.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01z"/></svg>`;
    else html += `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="star-empty"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01z"/></svg>`;
  }
  return html;
}

// --- Render Grid ---
function renderGrid() {
  const grid = document.getElementById('movieGrid');
  const noResults = document.getElementById('noResults');
  const countEl = document.getElementById('movieCount');

  let filtered = MOVIES.filter(m => {
    const genreOk = currentGenre === '전체' || m.genre === currentGenre;
    const searchOk = !searchQuery || m.title.toLowerCase().includes(searchQuery) || m.titleEn.toLowerCase().includes(searchQuery);
    return genreOk && searchOk;
  });

  countEl.textContent = `${filtered.length}개의 영화`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  grid.innerHTML = filtered.map((m, i) => `
    <div class="movie-card" style="animation-delay:${i * 0.05}s" onclick="openModal(${m.id})">
      <div class="poster-wrap">
        <img src="${m.poster}" alt="${m.title}" loading="lazy">
        <span class="card-genre-tag">${m.genre}</span>
        <span class="card-rating">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01z"/></svg>
          ${m.rating}
        </span>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">
          <span>${m.year}</span>
          <div class="card-stars">${starsHTML(m.rating)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// --- Modal ---

  const m = MOVIES.find(x => x.id === id);
  if (!m) return;

  const allReviews = [...m.reviews, ...(userReviews[id] || [])];

  document.getElementById('modalHero').innerHTML = `

    </div>

    <div class="modal-section">
      <h3 class="modal-section-title">평점 분포</h3>
      <div class="rating-bars">
        ${m.ratingDist.map((count, i) => `
          <div class="rating-bar-row">
            <span class="rating-bar-label">${i + 1}</span>
            <div class="rating-bar-track">
              <div class="rating-bar-fill" style="width:${totalRatings ? (count / totalRatings * 100) : 0}%"></div>
            </div>
            <span class="rating-bar-count">${count}</span>
          </div>
        `).reverse().join('')}
      </div>
    </div>

    <div class="modal-section">
      <h3 class="modal-section-title">리뷰 (${allReviews.length})</h3>
      <div class="review-list">
        ${allReviews.map(r => `
          <div class="review-item">
            <div class="review-header">
              <div class="review-user">
                <div class="review-avatar">${r.avatar}</div>
                <div>
                  <div class="review-name">${r.user}</div>
                  <div class="review-date">${r.date}</div>
                </div>
              </div>
              <div class="review-stars">${starsHTML(r.rating * 2)}</div>
            </div>
            <p class="review-text">${r.text}</p>
          </div>
        `).join('')}
      </div>
      <div class="review-form">
        <h4>리뷰 작성</h4>
        <div class="star-input" id="starInput">
          ${[1,2,3,4,5].map(i => `<span data-val="${i}" onclick="selectStar(${i})">&#9733;</span>`).join('')}
        </div>
        <textarea id="reviewText" placeholder="이 영화에 대한 감상을 적어주세요..."></textarea>
        <button onclick="submitReview(${m.id})">리뷰 등록</button>
      </div>
    </div>
  `;

  document.getElementById('modalBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';
}

let selectedStar = 0;
function selectStar(val) {
  selectedStar = val;
  document.querySelectorAll('#starInput span').forEach((s, i) => {
    s.classList.toggle('selected', i < val);
  });
}

function submitReview(movieId) {
  const text = document.getElementById('reviewText').value.trim();
  if (!text || !selectedStar) {
    alert('별점과 리뷰를 모두 입력해주세요.');
    return;
  }
  if (!userReviews[movieId]) userReviews[movieId] = [];
  const now = new Date();
  const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  userReviews[movieId].push({
    user: '나', avatar: '나', date, rating: selectedStar, text
  });
  selectedStar = 0;
  openModal(movieId);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// --- Genre Filter ---
document.getElementById('genreBar').addEventListener('click', e => {
  if (!e.target.classList.contains('genre-btn')) return;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentGenre = e.target.dataset.genre;
  renderGrid();
});

// --- Search ---
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderGrid();
});

// --- Theme Toggle ---
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('movietime-theme', isLight ? 'light' : 'dark');
});
if (localStorage.getItem('movietime-theme') === 'light') {
  document.body.classList.add('light-mode');
  document.getElementById('themeToggle').textContent = '☀️';
}

// --- Init ---
renderHero();
renderGrid();
</script>
</body>
</html>
