<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미스틱 타로 - 오늘의 운세</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0612;
  --surface:#150e24;
  --card-bg:#1a1030;
  --purple:#8b5cf6;
  --purple-light:#a78bfa;
  --purple-dark:#6d28d9;
  --gold:#f59e0b;
  --gold-light:#fbbf24;
  --text:#e8e0f0;
  --text-dim:#9585ad;
  --glow:rgba(139,92,246,.35);
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
/* 배경 파티클 */
.bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}

.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 60px}

/* 헤더 */
.header{text-align:center;padding:40px 0 30px}
.header-icon{font-size:3rem;margin-bottom:12px;filter:drop-shadow(0 0 20px var(--glow))}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--purple-light),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.header p{color:var(--text-dim);font-size:.95rem;font-weight:300}

/* 오늘의 운세 */
.daily-fortune{
  background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(245,158,11,.08));
  border:1px solid rgba(139,92,246,.2);
  border-radius:16px;padding:24px;margin-bottom:32px;text-align:center;
  position:relative;overflow:hidden;
}
.daily-fortune::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(139,92,246,.15),transparent 70%);pointer-events:none}
.daily-fortune h2{font-size:1.1rem;color:var(--gold);margin-bottom:12px;font-weight:600}
.fortune-text{font-size:.95rem;line-height:1.7;color:var(--text);font-weight:300}
.fortune-lucky{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.fortune-lucky span{font-size:.85rem;color:var(--text-dim);background:rgba(139,92,246,.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(139,92,246,.15)}

/* 섹션 */
.section-title{text-align:center;font-size:1.3rem;font-weight:700;margin-bottom:8px;color:var(--purple-light)}
.section-sub{text-align:center;color:var(--text-dim);font-size:.85rem;margin-bottom:28px}

/* 셔플 버튼 */
.btn-area{text-align:center;margin-bottom:32px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 36px;border:none;border-radius:50px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;
  color:#fff;background:linear-gradient(135deg,var(--purple),var(--purple-dark));
  box-shadow:0 4px 24px var(--glow);transition:all .3s;position:relative;overflow:hidden;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-reset{background:linear-gradient(135deg,#374151,#1f2937);box-shadow:0 4px 16px rgba(0,0,0,.3)}

/* 카드 덱 영역 */
.deck-area{position:relative;min-height:280px;margin-bottom:40px;display:flex;justify-content:center;align-items:center}

/* 셔플 애니메이션용 카드들 */
.shuffle-cards{position:relative;width:160px;height:240px}
.shuffle-card{
  position:absolute;width:100%;height:100%;
  background:linear-gradient(145deg,var(--card-bg),#12082a);
  border:2px solid rgba(139,92,246,.3);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.shuffle-card .card-back-design{
  width:80%;height:85%;border:1px solid rgba(139,92,246,.2);border-radius:8px;
  background:repeating-conic-gradient(rgba(139,92,246,.08) 0% 25%,transparent 0% 50%) 0 0/20px 20px;
  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
}

/* 펼쳐진 카드 선택 영역 */
.spread-area{
  display:flex;justify-content:center;flex-wrap:wrap;gap:12px;
  margin-bottom:20px;
}
.spread-card{
  width:80px;height:120px;
  background:linear-gradient(145deg,var(--card-bg),#12082a);
  border:2px solid rgba(139,92,246,.25);border-radius:10px;
  cursor:pointer;transition:all .3s;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.spread-card:hover{transform:translateY(-8px);border-color:var(--purple);box-shadow:0 8px 24px var(--glow)}
.spread-card.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(245,158,11,.3);transform:translateY(-12px)}
.spread-card .mini-back{
  width:70%;height:80%;border:1px solid rgba(139,92,246,.15);border-radius:6px;
  background:repeating-conic-gradient(rgba(139,92,246,.06) 0% 25%,transparent 0% 50%) 0 0/12px 12px;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}

/* 결과 카드 3장 */
.result-area{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:40px}

.tarot-card{
  width:180px;perspective:800px;cursor:default;
}
.tarot-card-inner{
  position:relative;width:100%;height:270px;
  transition:transform .8s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;
}
.tarot-card.flipped .tarot-card-inner{transform:rotateY(180deg)}

.tarot-card-front,.tarot-card-back{
  position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
.tarot-card-back{
  background:linear-gradient(145deg,var(--card-bg),#0d0520);
  border:2px solid rgba(139,92,246,.3);
}
.tarot-card-back .card-back-inner{
  width:85%;height:90%;border:1px solid rgba(139,92,246,.2);border-radius:10px;
  background:repeating-conic-gradient(rgba(139,92,246,.08) 0% 25%,transparent 0% 50%) 0 0/24px 24px;
  display:flex;align-items:center;justify-content:center;
}
.tarot-card-back .card-back-inner span{font-size:3rem;filter:drop-shadow(0 0 10px var(--glow))}

.tarot-card-front{
  background:linear-gradient(160deg,#1e1245,#0f0825);
  border:2px solid var(--gold);
  transform:rotateY(180deg);padding:16px 12px;text-align:center;
}
.card-numeral{font-size:.7rem;color:var(--gold);letter-spacing:2px;margin-bottom:4px;font-weight:600}
.card-symbol{font-size:3.2rem;margin-bottom:8px;filter:drop-shadow(0 0 12px var(--glow))}
.card-name{font-size:.9rem;font-weight:700;color:var(--gold-light);margin-bottom:4px}
.card-name-en{font-size:.65rem;color:var(--text-dim);margin-bottom:8px;font-weight:400}
.card-keyword{font-size:.75rem;color:var(--purple-light);font-weight:500}

/* 타임 라벨 */
.time-label{
  text-align:center;font-size:.8rem;font-weight:600;
  color:var(--purple-light);margin-top:10px;letter-spacing:1px;
}

/* 해석 영역 */
.reading-area{margin-top:20px}
.reading-card{
  background:var(--surface);border:1px solid rgba(139,92,246,.15);
  border-radius:16px;padding:24px;margin-bottom:16px;
  opacity:0;transform:translateY(20px);
  transition:all .5s ease;
}
.reading-card.show{opacity:1;transform:translateY(0)}
.reading-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.reading-icon{font-size:1.8rem}
.reading-time{font-size:.75rem;color:var(--gold);font-weight:600;letter-spacing:1px}
.reading-name{font-size:1.05rem;font-weight:700}
.reading-body{font-size:.9rem;line-height:1.8;color:var(--text-dim);font-weight:300}
.reading-keywords{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.reading-keywords span{
  font-size:.75rem;padding:4px 12px;border-radius:20px;
  background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.15);color:var(--purple-light);
}

/* 총평 */
.summary-box{
  background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(139,92,246,.08));
  border:1px solid rgba(245,158,11,.2);border-radius:16px;padding:28px;
  text-align:center;margin-top:24px;
  opacity:0;transform:translateY(20px);transition:all .6s ease;
}
.summary-box.show{opacity:1;transform:translateY(0)}
.summary-box h3{color:var(--gold);font-size:1.1rem;margin-bottom:14px}
.summary-box p{font-size:.9rem;line-height:1.8;color:var(--text);font-weight:300}

/* 상태 텍스트 */
.status-text{text-align:center;color:var(--text-dim);font-size:.9rem;margin:16px 0;min-height:24px}

/* 페이드 인 */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .6s ease forwards}

/* 반응형 */
@media(max-width:640px){
  .header h1{font-size:1.5rem}
  .tarot-card{width:140px}
  .tarot-card-inner{height:210px}
  .card-symbol{font-size:2.5rem}
  .card-name{font-size:.8rem}
  .result-area{gap:12px}
  .spread-card{width:60px;height:90px}
  .daily-fortune{padding:18px}
}
@media(max-width:380px){
  .tarot-card{width:110px}
  .tarot-card-inner{height:170px}
  .card-symbol{font-size:2rem}
  .result-area{gap:8px}
}
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>

    <div class="header-icon">🔮</div>

  <div class="btn-area" id="btnArea">

  <div class="status-text" id="statusText"></div>

  <div class="deck-area" id="deckArea" style="display:none">
    <div class="shuffle-cards" id="shuffleCards">
      <div class="shuffle-card" style="z-index:3"><div class="card-back-design"><span>✦</span></div></div>
      <div class="shuffle-card" style="z-index:2"><div class="card-back-design"><span>✦</span></div></div>
      <div class="shuffle-card" style="z-index:1"><div class="card-back-design"><span>✦</span></div></div>
    </div>
  </div>

  <!-- 카드 선택 영역 -->
  <div class="spread-area" id="spreadArea" style="display:none"></div>

  <!-- 결과 카드 -->
  <div class="result-area" id="resultArea" style="display:none"></div>

  <!-- 해석 -->
  <div class="reading-area" id="readingArea"></div>

  <!-- 리셋 -->
  <div class="btn-area" id="resetArea" style="display:none">
    <button class="btn btn-reset" onclick="resetAll()">🔄 다시 뽑기</button>
  </div>
</div>

// ─── 오늘의 운세 데이터 ───
const DAILY_FORTUNES = [
  {text:'오늘은 직관이 빛나는 날입니다. 첫 느낌을 믿고 행동하면 좋은 결과가 따릅니다.', lucky:'보라색', number:7, item:'크리스탈'},

  {text:'창의적인 에너지가 넘치는 하루입니다. 새로운 아이디어를 메모해두세요.', lucky:'노란색', number:5, item:'노트'},

  {text:'소중한 인연과의 대화에서 영감을 얻는 날입니다. 마음을 열고 들어보세요.', lucky:'분홍색', number:2, item:'편지'},

  {text:'마음의 안정이 중요한 날입니다. 잠시 멈추고 깊은 숨을 쉬어보세요.', lucky:'흰색', number:4, item:'양초'},
  {text:'숨겨져 있던 재능이 빛을 발할 날입니다. 자신감을 가지세요!', lucky:'금색', number:1, item:'거울'},
  {text:'예상치 못한 기쁜 소식이 찾아올 수 있는 날입니다. 열린 마음을 유지하세요.', lucky:'하늘색', number:6, item:'열쇠'},
  {text:'과거의 경험이 오늘의 지혜가 되는 날입니다. 배움을 실천으로 옮기세요.', lucky:'남색', number:11, item:'별'}
];

// ─── 상태 관리 ───
let selectedCards = [];
let drawnCards = [];
let phase = 'idle'; // idle, shuffling, selecting, result

// ─── 초기화 ───
function init() {
  createStars();
  showDailyFortune();
}

function createStars() {
  const c = document.getElementById('bgStars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
    s.style.setProperty('--delay', (Math.random() * 3) + 's');
    s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
    c.appendChild(s);
  }
}

function showDailyFortune() {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  const idx = seed % DAILY_FORTUNES.length;
  const f = DAILY_FORTUNES[idx];
  const el = document.getElementById('dailyFortune');
  el.innerHTML = `
    <h2>🌟 오늘의 운세 — ${today.getMonth()+1}월 ${today.getDate()}일</h2>
    <p class="fortune-text">${f.text}</p>
    <div class="fortune-lucky">
      <span>🎨 행운의 색: ${f.lucky}</span>
      <span>🔢 행운의 숫자: ${f.number}</span>
      <span>✨ 행운의 아이템: ${f.item}</span>
    </div>
  `;
}

// ─── 셔플 ───
function startShuffle() {
  phase = 'shuffling';
  document.getElementById('btnShuffle').disabled = true;
  document.getElementById('statusText').textContent = '카드를 섞고 있습니다...';
  document.getElementById('deckArea').style.display = 'flex';
  document.getElementById('spreadArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('readingArea').innerHTML = '';
  document.getElementById('resetArea').style.display = 'none';

  const cards = document.querySelectorAll('.shuffle-card');
  let step = 0;
  const shuffleInterval = setInterval(() => {
    cards.forEach((c, i) => {
      const offX = (Math.random() - 0.5) * 120;
      const offY = (Math.random() - 0.5) * 40;
      const rot = (Math.random() - 0.5) * 30;
      c.style.transform = `translate(${offX}px, ${offY}px) rotate(${rot}deg)`;
    });
    step++;
    if (step >= 8) {
      clearInterval(shuffleInterval);
      cards.forEach(c => c.style.transform = 'translate(0,0) rotate(0deg)');
      setTimeout(() => showSpread(), 400);
    }
  }, 300);
}

// ─── 카드 펼치기 ───
function showSpread() {
  phase = 'selecting';
  document.getElementById('deckArea').style.display = 'none';
  document.getElementById('statusText').textContent = '카드 3장을 선택하세요 (과거 → 현재 → 미래)';

  const area = document.getElementById('spreadArea');
  area.style.display = 'flex';
  area.innerHTML = '';

  // 셔플된 인덱스 생성
  const indices = Array.from({length: 22}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  for (let i = 0; i < 22; i++) {
    const card = document.createElement('div');
    card.className = 'spread-card';
    card.dataset.index = indices[i];
    card.innerHTML = '<div class="mini-back"><span>✦</span></div>';
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    card.addEventListener('click', () => selectCard(card));
    area.appendChild(card);

    setTimeout(() => {
      card.style.transition = 'all .3s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, i * 40);
  }
}

// ─── 카드 선택 ───
const TIME_LABELS = ['과거', '현재', '미래'];

function selectCard(el) {
  if (phase !== 'selecting') return;
  if (el.classList.contains('selected')) return;
  if (selectedCards.length >= 3) return;

  el.classList.add('selected');
  const idx = parseInt(el.dataset.index);
  drawnCards.push(MAJOR_ARCANA[idx]);
  selectedCards.push(el);

  const remaining = 3 - drawnCards.length;
  if (remaining > 0) {
    document.getElementById('statusText').textContent = `${TIME_LABELS[drawnCards.length]}의 카드를 선택하세요 (남은 선택: ${remaining}장)`;
  } else {
    document.getElementById('statusText').textContent = '카드가 모두 선택되었습니다!';
    setTimeout(() => showResult(), 600);
  }
}

// ─── 결과 표시 ───
function showResult() {
  phase = 'result';
  document.getElementById('spreadArea').style.display = 'none';
  document.getElementById('statusText').textContent = '';
  document.getElementById('btnArea').style.display = 'none';

  const area = document.getElementById('resultArea');
  area.style.display = 'flex';
  area.innerHTML = '';

  drawnCards.forEach((card, i) => {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `
      <div class="tarot-card" id="tarotCard${i}">
        <div class="tarot-card-inner">
          <div class="tarot-card-back">
            <div class="card-back-inner"><span>✦</span></div>
          </div>
          <div class="tarot-card-front">
            <div class="card-numeral">${card.numeral}</div>
            <div class="card-symbol">${card.symbol}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-name-en">${card.nameEn}</div>
            <div class="card-keyword">${card.keywords[0]} · ${card.keywords[1]}</div>
          </div>
        </div>
      </div>
      <div class="time-label">${TIME_LABELS[i]}</div>
    `;
    area.appendChild(wrapper);

    // 순차적 뒤집기
    setTimeout(() => {
      document.getElementById(`tarotCard${i}`).classList.add('flipped');
    }, 600 + i * 700);
  });

  // 해석 표시
  setTimeout(() => showReadings(), 600 + 3 * 700 + 400);
}

function showReadings() {
  const area = document.getElementById('readingArea');
  const timeKeys = ['past', 'present', 'future'];

  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'reading-card';
    div.innerHTML = `
      <div class="reading-header">
        <div class="reading-icon">${card.symbol}</div>
        <div>
          <div class="reading-time">${TIME_LABELS[i]}</div>
          <div class="reading-name">${card.numeral} — ${card.name} (${card.nameEn})</div>
        </div>
      </div>
      <div class="reading-body">${card[timeKeys[i]]}</div>
      <div class="reading-keywords">${card.keywords.map(k => `<span>${k}</span>`).join('')}</div>
    `;
    area.appendChild(div);

    setTimeout(() => div.classList.add('show'), 200 + i * 400);
  });

  // 총평
  setTimeout(() => {
    const summary = document.createElement('div');
    summary.className = 'summary-box';
    summary.innerHTML = `
      <h3>✦ 종합 해석 ✦</h3>
      <p>${generateSummary()}</p>
    `;
    area.appendChild(summary);
    setTimeout(() => summary.classList.add('show'), 200);
    document.getElementById('resetArea').style.display = 'block';
  }, 200 + 3 * 400 + 300);
}

function generateSummary() {
  const [past, present, future] = drawnCards;
  return `과거의 <strong>${past.name}</strong> 카드는 ${past.keywords[0]}의 에너지로 당신의 여정을 시작하게 했습니다. `
    + `현재 <strong>${present.name}</strong> 카드가 말하듯, 지금은 ${present.keywords[0]}과(와) ${present.keywords[1]}이(가) 중요한 시기입니다. `
    + `미래의 <strong>${future.name}</strong> 카드는 ${future.keywords[0]}의 에너지가 다가오고 있음을 알려줍니다. `
    + `세 카드의 흐름을 통해 보면, 당신은 성장의 길 위에 있으며, 내면의 지혜를 믿고 나아간다면 빛나는 결과를 만들어낼 수 있을 것입니다. ✨`;
}

// ─── 리셋 ───
function resetAll() {
  selectedCards = [];
  drawnCards = [];
  phase = 'idle';
  document.getElementById('btnShuffle').disabled = false;
  document.getElementById('btnArea').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('readingArea').innerHTML = '';
  document.getElementById('resetArea').style.display = 'none';
  document.getElementById('statusText').textContent = '';
  document.getElementById('spreadArea').style.display = 'none';
}

// ─── 시작 ───
init();
</script>
