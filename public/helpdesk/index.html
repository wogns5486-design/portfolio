<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬프데스크 - 고객지원 티켓 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-light:#6366f1;--primary-dark:#4338ca;
  --primary-50:#eef2ff;--primary-100:#e0e7ff;--primary-200:#c7d2fe;
  --bg:#f8fafc;--surface:#ffffff;--surface-2:#f1f5f9;
  --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:#e2e8f0;--border-2:#cbd5e1;
  --success:#10b981;--success-bg:#ecfdf5;
  --warning:#f59e0b;--warning-bg:#fffbeb;
  --danger:#ef4444;--danger-bg:#fef2f2;
  --info:#3b82f6;--info-bg:#eff6ff;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1);
  --transition:all .2s ease;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;outline:none}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo h1{font-size:18px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:10px}
.sidebar-logo h1 svg{width:28px;height:28px}
.sidebar-logo p{font-size:12px;color:var(--text-3);margin-top:2px}
.sidebar-nav{flex:1;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-2);font-size:14px;font-weight:500;transition:var(--transition);width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--primary-50);color:var(--primary)}
.nav-item.active{background:var(--primary-100);color:var(--primary);font-weight:600}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--text-3)}

.main{flex:1;margin-left:260px;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:20px;font-weight:700;color:var(--text)}
.topbar-search{flex:1;max-width:400px;margin-left:auto;position:relative}
.topbar-search input{width:100%;padding:8px 16px 8px 40px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface-2);transition:var(--transition)}
.topbar-search input:focus{border-color:var(--primary-light);background:var(--surface);box-shadow:0 0 0 3px var(--primary-50)}
.topbar-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-3)}
.btn-new{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--primary);color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:var(--transition)}
.btn-new:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-new svg{width:18px;height:18px}
.menu-toggle{display:none;padding:8px;border-radius:var(--radius-xs)}
.menu-toggle svg{width:24px;height:24px;color:var(--text)}

.content{padding:32px;flex:1}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px 24px;border:1px solid var(--border);transition:var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stat-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:20px;height:20px}
.stat-icon.open{background:var(--info-bg);color:var(--info)}
.stat-icon.progress{background:var(--warning-bg);color:var(--warning)}
.stat-icon.resolved{background:var(--success-bg);color:var(--success)}
.stat-icon.closed{background:var(--surface-2);color:var(--text-3)}
.stat-label{font-size:13px;color:var(--text-3);font-weight:500}
.stat-value{font-size:28px;font-weight:800;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text-3);margin-top:4px}

/* Priority Stats */
.priority-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:32px;background:var(--surface-2)}
.priority-bar div{transition:width .5s ease}
.priority-bar .p-urgent{background:#ef4444}
.priority-bar .p-high{background:#f59e0b}
.priority-bar .p-medium{background:#3b82f6}
.priority-bar .p-low{background:#10b981}
.priority-legend{display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap}
.priority-legend span{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2)}
.priority-legend span::before{content:'';width:10px;height:10px;border-radius:50%}
.priority-legend .l-urgent::before{background:#ef4444}
.priority-legend .l-high::before{background:#f59e0b}
.priority-legend .l-medium::before{background:#3b82f6}
.priority-legend .l-low::before{background:#10b981}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-2);background:var(--surface);border:1px solid var(--border);transition:var(--transition)}
.filter-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-btn .count{margin-left:4px;opacity:.7}
.sort-select{margin-left:auto;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;color:var(--text-2);background:var(--surface)}

/* Ticket List */
.ticket-list{display:flex;flex-direction:column;gap:8px}
.ticket-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:grid;grid-template-columns:60px 1fr 100px 90px 120px 100px;align-items:center;gap:12px;transition:var(--transition);cursor:pointer}
.ticket-row:hover{box-shadow:var(--shadow);border-color:var(--primary-200);transform:translateX(2px)}
.ticket-id{font-size:13px;font-weight:700;color:var(--primary)}
.ticket-info h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-info p{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-align:center;white-space:nowrap}
.status-open{background:var(--info-bg);color:var(--info)}
.status-progress{background:var(--warning-bg);color:var(--warning)}
.status-resolved{background:var(--success-bg);color:var(--success)}
.status-closed{background:var(--surface-2);color:var(--text-3)}
.priority-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-align:center}
.priority-urgent{background:#fef2f2;color:#ef4444}
.priority-high{background:#fffbeb;color:#d97706}
.priority-medium{background:#eff6ff;color:#3b82f6}
.priority-low{background:#ecfdf5;color:#10b981}
.ticket-assignee{font-size:13px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-date{font-size:12px;color:var(--text-3);text-align:right}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:15px}

/* Ticket List Header */
.ticket-list-header{display:grid;grid-template-columns:60px 1fr 100px 90px 120px 100px;gap:12px;padding:0 20px 12px;font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:var(--transition)}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--surface);border-radius:var(--radius);width:95%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:scale(.95);transition:var(--transition)}
.modal-overlay.show .modal{transform:scale(1)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--surface-2)}
.modal-close svg{width:20px;height:20px;color:var(--text-2)}
.modal-body{padding:24px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;transition:var(--transition);background:var(--surface)}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px var(--primary-50)}
.form-group textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding-top:8px}
.btn{padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:var(--transition)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}

/* Detail View */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:flex;justify-content:flex-end;opacity:0;visibility:hidden;transition:var(--transition)}
.detail-overlay.show{opacity:1;visibility:visible}
.detail-panel{background:var(--surface);width:95%;max-width:640px;height:100%;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .3s ease}
.detail-overlay.show .detail-panel{transform:translateX(0)}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px}
.detail-back{padding:8px;border-radius:var(--radius-xs);transition:var(--transition);flex-shrink:0;margin-top:2px}
.detail-back:hover{background:var(--surface-2)}
.detail-back svg{width:20px;height:20px;color:var(--text-2)}
.detail-title-area{flex:1;min-width:0}
.detail-title-area h2{font-size:18px;font-weight:700;margin-bottom:4px}
.detail-title-area .detail-id{font-size:13px;color:var(--primary);font-weight:600}
.detail-meta{padding:16px 24px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-item label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}
.meta-item span{font-size:14px;color:var(--text)}
.meta-item select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--surface)}
.detail-description{padding:20px 24px;border-bottom:1px solid var(--border)}
.detail-description h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text-2)}
.detail-description p{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap}

/* Thread */
.thread-section{padding:20px 24px}
.thread-section h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-2);display:flex;align-items:center;gap:8px}
.thread-section h3 .count{background:var(--surface-2);padding:2px 8px;border-radius:10px;font-size:12px;color:var(--text-3)}
.thread-msg{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:12px;border:1px solid var(--border)}
.thread-msg.staff{background:var(--primary-50);border-color:var(--primary-200)}
.thread-msg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.thread-msg-author{font-size:13px;font-weight:600;color:var(--text)}
.thread-msg-time{font-size:11px;color:var(--text-3)}
.thread-msg-body{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.thread-input{display:flex;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.thread-input textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;resize:none;min-height:60px}
.thread-input textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px var(--primary-50)}
.thread-input button{padding:10px 20px;background:var(--primary);color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:600;align-self:flex-end;white-space:nowrap;transition:var(--transition)}
.thread-input button:hover{background:var(--primary-dark)}

.detail-actions{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid transparent;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:var(--transition)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* Responsive */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .ticket-row{grid-template-columns:50px 1fr 90px 80px 100px;gap:8px}
  .ticket-date{display:none}
  .ticket-list-header{grid-template-columns:50px 1fr 90px 80px 100px}
  .ticket-list-header span:last-child{display:none}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
  .sidebar-backdrop.show{display:block}
  .main{margin-left:0}
  .menu-toggle{display:flex}
  .topbar{padding:12px 16px}
  .topbar-search{display:none}
  .content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .ticket-row{grid-template-columns:1fr auto auto;padding:12px 16px}
  .ticket-id,.ticket-assignee{display:none}
  .ticket-list-header{display:none}
  .form-row{grid-template-columns:1fr}
  .detail-panel{max-width:100%}
  .detail-meta{grid-template-columns:1fr}
  .priority-legend{gap:12px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .filters{gap:6px}
  .filter-btn{padding:5px 12px;font-size:12px}
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 019-9"/></svg>
        헬프데스크
      </h1>
      <p>고객지원 티켓 시스템</p>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        대시보드
      </button>
      <button class="nav-item" data-view="all" onclick="switchView('all')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        전체 티켓
        <span class="badge" id="navAllCount">0</span>
      </button>
      <button class="nav-item" data-view="open" onclick="switchView('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        열림
        <span class="badge" id="navOpenCount">0</span>
      </button>
      <button class="nav-item" data-view="progress" onclick="switchView('progress')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
        진행중
      </button>
      <button class="nav-item" data-view="resolved" onclick="switchView('resolved')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        해결됨
      </button>
      <button class="nav-item" data-view="closed" onclick="switchView('closed')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l6 6m0-6l-6 6"/></svg>
        종료
      </button>
    </nav>
    <div class="sidebar-footer">
      &copy; 2026 헬프데스크 시스템
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <h2 class="topbar-title" id="topbarTitle">대시보드</h2>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="티켓 검색..." id="searchInput" oninput="renderTickets()">
      </div>
      <button class="btn-new" onclick="openNewModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
        새 티켓
      </button>
    </header>

    <div class="content">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-header">
            <span class="stat-label">열림</span>
            <div class="stat-icon open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
          </div>
          <div class="stat-value" id="statOpen">0</div>
          <div class="stat-sub">대기 중인 티켓</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <span class="stat-label">진행중</span>
            <div class="stat-icon progress"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg></div>
          </div>
          <div class="stat-value" id="statProgress">0</div>
          <div class="stat-sub">처리 중인 티켓</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <span class="stat-label">해결됨</span>
            <div class="stat-icon resolved"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          </div>
          <div class="stat-value" id="statResolved">0</div>
          <div class="stat-sub">해결된 티켓</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <span class="stat-label">종료</span>
            <div class="stat-icon closed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l6 6m0-6l-6 6"/></svg></div>
          </div>
          <div class="stat-value" id="statClosed">0</div>
          <div class="stat-sub">종료된 티켓</div>
        </div>
      </div>

      <!-- Priority Bar -->
      <div class="priority-bar" id="priorityBar"></div>
      <div class="priority-legend">
        <span class="l-urgent">긴급 <b id="legendUrgent">0</b></span>
        <span class="l-high">높음 <b id="legendHigh">0</b></span>
        <span class="l-medium">보통 <b id="legendMedium">0</b></span>
        <span class="l-low">낮음 <b id="legendLow">0</b></span>
      </div>

      <!-- Filters -->
      <div class="filters" id="filtersBar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
        <button class="filter-btn" data-filter="open" onclick="setFilter('open')">열림</button>
        <button class="filter-btn" data-filter="progress" onclick="setFilter('progress')">진행중</button>
        <button class="filter-btn" data-filter="resolved" onclick="setFilter('resolved')">해결됨</button>
        <button class="filter-btn" data-filter="closed" onclick="setFilter('closed')">종료</button>
        <select class="sort-select" id="sortSelect" onchange="renderTickets()">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="priority">우선순위순</option>
        </select>
      </div>

      <!-- Ticket List -->
      <div class="ticket-list-header" id="ticketListHeader">
        <span>번호</span><span>제목</span><span>상태</span><span>우선순위</span><span>담당자</span><span style="text-align:right">날짜</span>
      </div>
      <div class="ticket-list" id="ticketList"></div>
    </div>
  </div>
</div>

<!-- New Ticket Modal -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <div class="modal-header">
      <h2>새 티켓 작성</h2>
      <button class="modal-close" onclick="closeNewModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>제목 *</label>
        <input type="text" id="newTitle" placeholder="티켓 제목을 입력하세요">
      </div>
      <div class="form-group">
        <label>설명 *</label>
        <textarea id="newDesc" placeholder="문제 또는 요청 사항을 상세히 입력하세요"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>우선순위</label>
          <select id="newPriority">
            <option value="low">낮음</option>
            <option value="medium" selected>보통</option>
            <option value="high">높음</option>
            <option value="urgent">긴급</option>
          </select>
        </div>
        <div class="form-group">
          <label>담당자</label>
          <select id="newAssignee">
            <option value="">미배정</option>
            <option value="김민수">김민수</option>
            <option value="이지은">이지은</option>
            <option value="박서준">박서준</option>
            <option value="최유리">최유리</option>
            <option value="정하늘">정하늘</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>작성자</label>
        <input type="text" id="newAuthor" placeholder="이름을 입력하세요" value="고객">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeNewModal()">취소</button>
        <button class="btn btn-primary" onclick="createTicket()">티켓 생성</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetailIfOutside(event)">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
const STORAGE_KEY = 'helpdesk_tickets';
const STATUS_MAP = { open:'열림', progress:'진행중', resolved:'해결됨', closed:'종료' };
const PRIORITY_MAP = { urgent:'긴급', high:'높음', medium:'보통', low:'낮음' };
const PRIORITY_ORDER = { urgent:0, high:1, medium:2, low:3 };

let tickets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let currentFilter = 'all';
let currentView = 'dashboard';

// Seed sample data on first visit
if (!tickets.length) {
  const samples = [
    { title:'로그인 오류 - 비밀번호 초기화 불가', desc:'비밀번호 초기화 이메일이 발송되지 않습니다. 여러 번 시도했지만 이메일이 오지 않습니다.', status:'open', priority:'urgent', assignee:'김민수', author:'이영희', thread:[
      {author:'김민수',body:'확인 중입니다. 메일 서버 로그를 점검하고 있습니다.',staff:true,time:Date.now()-3600000},
      {author:'이영희',body:'빠른 확인 감사합니다. 추가로 스팸함도 확인했지만 없었습니다.',staff:false,time:Date.now()-1800000}
    ]},
    { title:'결제 페이지 로딩 속도 저하', desc:'결제 페이지에서 5초 이상 로딩이 걸립니다. 크롬, 파이어폭스 모두 동일합니다.', status:'progress', priority:'high', assignee:'이지은', author:'박철수', thread:[
      {author:'이지은',body:'CDN 캐시 문제로 확인되었습니다. 현재 수정 작업 진행 중입니다.',staff:true,time:Date.now()-7200000}
    ]},
    { title:'모바일 앱 푸시 알림 미수신', desc:'안드로이드 기기에서 푸시 알림이 오지 않습니다. 알림 설정은 모두 켜져 있습니다.', status:'open', priority:'medium', assignee:'박서준', author:'김하늘', thread:[] },
    { title:'회원 등급 포인트 미반영', desc:'구매 후 포인트가 반영되지 않았습니다. 주문번호: ORD-20260312-001', status:'resolved', priority:'high', assignee:'최유리', author:'정민호', thread:[
      {author:'최유리',body:'포인트 시스템 배치 처리 지연으로 인한 문제였습니다. 수동으로 포인트를 반영하였습니다.',staff:true,time:Date.now()-86400000},
      {author:'정민호',body:'확인했습니다. 감사합니다!',staff:false,time:Date.now()-80000000}
    ]},
    { title:'대시보드 그래프 깨짐 현상', desc:'관리자 대시보드의 월간 매출 그래프가 표시되지 않습니다.', status:'progress', priority:'medium', assignee:'정하늘', author:'이수진', thread:[] },
    { title:'이메일 템플릿 수정 요청', desc:'주문 확인 이메일의 로고와 하단 주소를 변경해주세요.', status:'closed', priority:'low', assignee:'김민수', author:'박지영', thread:[
      {author:'김민수',body:'이메일 템플릿을 수정하여 배포 완료했습니다.',staff:true,time:Date.now()-172800000},
      {author:'박지영',body:'잘 반영되었네요. 감사합니다.',staff:false,time:Date.now()-160000000}
    ]},
    { title:'API 응답 시간 초과 오류', desc:'외부 API 연동 시 타임아웃 오류가 빈번하게 발생합니다. 에러 코드: 504', status:'open', priority:'urgent', assignee:'이지은', author:'강동원', thread:[] },
    { title:'파일 업로드 10MB 제한 관련 문의', desc:'첨부파일 용량 제한을 20MB로 올려주실 수 있나요?', status:'open', priority:'low', assignee:'', author:'윤서연', thread:[] },
  ];
  let id = 1000;
  samples.forEach((s,i) => {
    tickets.push({
      id: ++id,
      title: s.title,
      description: s.desc,
      status: s.status,
      priority: s.priority,
      assignee: s.assignee,
      author: s.author,
      thread: s.thread || [],
      createdAt: Date.now() - (samples.length - i) * 86400000 * Math.random() * 3,
    });
  });
  save();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
}

function nextId() {
  const max = tickets.reduce((m,t) => Math.max(m,t.id), 1000);
  return max + 1;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(ts) {
  const d = new Date(ts);
  return `${formatDate(ts)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Views ---
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const titles = { dashboard:'대시보드', all:'전체 티켓', open:'열림 티켓', progress:'진행중 티켓', resolved:'해결됨 티켓', closed:'종료 티켓' };
  document.getElementById('topbarTitle').textContent = titles[view] || '대시보드';
  if (view === 'dashboard') {
    currentFilter = 'all';
  } else if (view === 'all') {
    currentFilter = 'all';
  } else {
    currentFilter = view;
  }
  updateFilterButtons();
  renderAll();
  // close sidebar on mobile
  if (window.innerWidth <= 768) toggleSidebar(false);
}

function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  const open = force !== undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  bd.classList.toggle('show', open);
}

// --- Filters ---
function setFilter(f) {
  currentFilter = f;
  updateFilterButtons();
  renderTickets();
}
function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
}

// --- Rendering ---
function renderAll() {
  renderStats();
  renderTickets();
}

function renderStats() {
  const counts = { open:0, progress:0, resolved:0, closed:0 };
  const pCounts = { urgent:0, high:0, medium:0, low:0 };
  tickets.forEach(t => { counts[t.status]++; pCounts[t.priority]++; });
  document.getElementById('statOpen').textContent = counts.open;
  document.getElementById('statProgress').textContent = counts.progress;
  document.getElementById('statResolved').textContent = counts.resolved;
  document.getElementById('statClosed').textContent = counts.closed;
  document.getElementById('navAllCount').textContent = tickets.length;
  document.getElementById('navOpenCount').textContent = counts.open;

  const total = tickets.length || 1;
  const bar = document.getElementById('priorityBar');
  bar.innerHTML = `<div class="p-urgent" style="width:${pCounts.urgent/total*100}%"></div><div class="p-high" style="width:${pCounts.high/total*100}%"></div><div class="p-medium" style="width:${pCounts.medium/total*100}%"></div><div class="p-low" style="width:${pCounts.low/total*100}%"></div>`;
  document.getElementById('legendUrgent').textContent = pCounts.urgent;
  document.getElementById('legendHigh').textContent = pCounts.high;
  document.getElementById('legendMedium').textContent = pCounts.medium;
  document.getElementById('legendLow').textContent = pCounts.low;

  // Show/hide stats based on view
  const showStats = currentView === 'dashboard';
  document.getElementById('statsGrid').style.display = showStats ? '' : 'none';
  document.getElementById('priorityBar').style.display = showStats ? '' : 'none';
  document.querySelector('.priority-legend').style.display = showStats ? '' : 'none';
}

function renderTickets() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = tickets.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false;
    if (search && !t.title.toLowerCase().includes(search) && !t.description.toLowerCase().includes(search) && !String(t.id).includes(search)) return false;
    return true;
  });

  filtered.sort((a,b) => {
    if (sort === 'newest') return b.createdAt - a.createdAt;
    if (sort === 'oldest') return a.createdAt - b.createdAt;
    if (sort === 'priority') return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
    return 0;
  });

  const list = document.getElementById('ticketList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>표시할 티켓이 없습니다</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="ticket-row" onclick="openDetail(${t.id})">
      <span class="ticket-id">#${t.id}</span>
      <div class="ticket-info">
        <h3>${escapeHtml(t.title)}</h3>
        <p>${escapeHtml(t.author)} · 댓글 ${t.thread.length}개</p>
      </div>
      <span class="status-badge status-${t.status}">${STATUS_MAP[t.status]}</span>
      <span class="priority-badge priority-${t.priority}">${PRIORITY_MAP[t.priority]}</span>
      <span class="ticket-assignee">${t.assignee || '미배정'}</span>
      <span class="ticket-date">${formatDate(t.createdAt)}</span>
    </div>
  `).join('');
}

// --- New Ticket ---
function openNewModal() {
  document.getElementById('newModal').classList.add('show');
  document.getElementById('newTitle').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newPriority').value = 'medium';
  document.getElementById('newAssignee').value = '';
  document.getElementById('newAuthor').value = '고객';
  setTimeout(() => document.getElementById('newTitle').focus(), 200);
}
function closeNewModal() {
  document.getElementById('newModal').classList.remove('show');
}
function createTicket() {
  const title = document.getElementById('newTitle').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  if (!title || !desc) { alert('제목과 설명을 입력해주세요.'); return; }
  tickets.push({
    id: nextId(),
    title,
    description: desc,
    status: 'open',
    priority: document.getElementById('newPriority').value,
    assignee: document.getElementById('newAssignee').value,
    author: document.getElementById('newAuthor').value || '고객',
    thread: [],
    createdAt: Date.now(),
  });
  save();
  closeNewModal();
  renderAll();
}

// --- Detail ---
function openDetail(id) {
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <div class="detail-title-area">
        <span class="detail-id">#${t.id}</span>
        <h2>${escapeHtml(t.title)}</h2>
      </div>
    </div>
    <div class="detail-meta">
      <div class="meta-item">
        <label>상태</label>
        <select onchange="updateTicketField(${t.id},'status',this.value)">
          ${Object.keys(STATUS_MAP).map(s => `<option value="${s}" ${t.status===s?'selected':''}>${STATUS_MAP[s]}</option>`).join('')}
        </select>
      </div>
      <div class="meta-item">
        <label>우선순위</label>
        <select onchange="updateTicketField(${t.id},'priority',this.value)">
          ${Object.keys(PRIORITY_MAP).map(p => `<option value="${p}" ${t.priority===p?'selected':''}>${PRIORITY_MAP[p]}</option>`).join('')}
        </select>
      </div>
      <div class="meta-item">
        <label>담당자</label>
        <select onchange="updateTicketField(${t.id},'assignee',this.value)">
          <option value="" ${!t.assignee?'selected':''}>미배정</option>
          ${['김민수','이지은','박서준','최유리','정하늘'].map(a => `<option value="${a}" ${t.assignee===a?'selected':''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="meta-item">
        <label>작성자</label>
        <span>${escapeHtml(t.author)}</span>
      </div>
      <div class="meta-item">
        <label>생성일</label>
        <span>${formatDateTime(t.createdAt)}</span>
      </div>
    </div>
    <div class="detail-description">
      <h3>설명</h3>
      <p>${escapeHtml(t.description)}</p>
    </div>
    <div class="thread-section">
      <h3>대화 스레드 <span class="count">${t.thread.length}</span></h3>
      ${t.thread.length ? t.thread.map(m => `
        <div class="thread-msg ${m.staff ? 'staff' : ''}">
          <div class="thread-msg-header">
            <span class="thread-msg-author">${escapeHtml(m.author)}${m.staff ? ' (담당자)' : ''}</span>
            <span class="thread-msg-time">${formatDateTime(m.time)}</span>
          </div>
          <div class="thread-msg-body">${escapeHtml(m.body)}</div>
        </div>
      `).join('') : '<p style="color:var(--text-3);font-size:14px;margin-bottom:12px">아직 대화가 없습니다.</p>'}
      <div class="thread-input">
        <textarea id="threadInput" placeholder="메시지를 입력하세요..."></textarea>
        <button onclick="addThreadMsg(${t.id})">전송</button>
      </div>
    </div>
    <div class="detail-actions">
      <button class="btn-danger" onclick="deleteTicket(${t.id})">티켓 삭제</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}
function closeDetailIfOutside(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
}

function updateTicketField(id, field, value) {
  const t = tickets.find(x => x.id === id);
  if (t) { t[field] = value; save(); renderAll(); }
}

function addThreadMsg(id) {
  const input = document.getElementById('threadInput');
  const body = input.value.trim();
  if (!body) return;
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  t.thread.push({ author: t.assignee || '담당자', body, staff: true, time: Date.now() });
  save();
  openDetail(id);
  renderAll();
}

function deleteTicket(id) {
  if (!confirm('이 티켓을 삭제하시겠습니까?')) return;
  tickets = tickets.filter(t => t.id !== id);
  save();
  closeDetail();
  renderAll();
}

// Close modal on overlay click
document.getElementById('newModal').addEventListener('click', function(e) {
  if (e.target === this) closeNewModal();
});

// Init
renderAll();
</script>
</body>
</html>
