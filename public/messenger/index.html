<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KakaoMsg - 메신저</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --yellow:#FEE500;
  --yellow-dark:#E5CF00;
  --brown:#3C1E1E;
  --bg:#F6F6F6;
  --sidebar-bg:#FFFFFF;
  --chat-bg:#ABC1D1;
  --my-bubble:#FEE500;
  --other-bubble:#FFFFFF;
  --text:#1A1A1A;
  --text-sub:#888;
  --border:#E8E8E8;
  --online:#2ECC71;
  --offline:#BDC3C7;
  --unread:#FF3B30;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* LAYOUT */
.app{display:flex;height:100vh;max-width:1400px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.1);}
.sidebar{width:360px;min-width:360px;background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--border);z-index:10;}
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);position:relative;}

/* SIDEBAR HEADER */
.sidebar-header{padding:16px 20px;background:var(--yellow);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sidebar-header h1{font-size:18px;font-weight:700;color:var(--brown);white-space:nowrap;}
.sidebar-header .actions{display:flex;gap:8px;}
.sidebar-header .actions button{width:36px;height:36px;border:none;background:rgba(60,30,30,.1);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.sidebar-header .actions button:hover{background:rgba(60,30,30,.2);}

/* SEARCH */
.search-box{padding:12px 16px;border-bottom:1px solid var(--border);}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:none;border-radius:20px;background:#F0F0F0;font-size:14px;font-family:inherit;outline:none;transition:.2s;}
.search-box input:focus{background:#E8E8E8;}
.search-box{position:relative;}
.search-box::before{content:'\uD83D\uDD0D';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1;}

/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto;scrollbar-width:thin;}
.chat-list::-webkit-scrollbar{width:4px;}
.chat-list::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
.chat-item{display:flex;align-items:center;padding:14px 20px;gap:14px;cursor:pointer;transition:background .15s;border-bottom:1px solid #f5f5f5;position:relative;}
.chat-item:hover{background:#FAFAFA;}
.chat-item.active{background:#FFF9DB;}
.chat-item .avatar{position:relative;flex-shrink:0;}
.chat-item .avatar img{width:50px;height:50px;border-radius:16px;object-fit:cover;background:#eee;}
.chat-item .avatar .status-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;}
.status-dot.online{background:var(--online);}
.status-dot.offline{background:var(--offline);}
.chat-item .info{flex:1;min-width:0;}
.chat-item .info .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.chat-item .info .name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item .info .time{font-size:11px;color:var(--text-sub);white-space:nowrap;flex-shrink:0;margin-left:8px;}
.chat-item .info .last-msg{font-size:13px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.chat-item .unread-badge{position:absolute;right:20px;top:50%;transform:translateY(4px);background:var(--unread);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;}

/* CHAT AREA HEADER */
.chat-header{padding:14px 20px;background:#fff;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);z-index:5;}
.chat-header .back-btn{display:none;width:36px;height:36px;border:none;background:none;cursor:pointer;font-size:20px;border-radius:50%;transition:.2s;}
.chat-header .back-btn:hover{background:#f0f0f0;}
.chat-header .avatar{position:relative;flex-shrink:0;}
.chat-header .avatar img{width:42px;height:42px;border-radius:14px;object-fit:cover;background:#eee;}
.chat-header .avatar .status-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid #fff;}
.chat-header .user-info .name{font-size:15px;font-weight:600;}
.chat-header .user-info .status-text{font-size:12px;color:var(--text-sub);}
.chat-header .header-actions{margin-left:auto;display:flex;gap:6px;}
.chat-header .header-actions button{width:36px;height:36px;border:none;background:none;cursor:pointer;font-size:18px;border-radius:50%;transition:.2s;}
.chat-header .header-actions button:hover{background:#f0f0f0;}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:4px;}
.date-divider{text-align:center;margin:16px 0;font-size:12px;color:rgba(0,0,0,.4);}
.date-divider span{background:rgba(0,0,0,.08);padding:4px 12px;border-radius:10px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;}
.msg-row.me{flex-direction:row-reverse;}
.msg-row .bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;}
.msg-row.other .bubble{background:var(--other-bubble);border-top-left-radius:4px;box-shadow:var(--shadow);}
.msg-row.me .bubble{background:var(--my-bubble);border-top-right-radius:4px;}
.msg-row .msg-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;}
.msg-row.other .msg-meta{align-items:flex-start;}
.msg-row .msg-meta .read{font-size:10px;color:var(--yellow-dark);font-weight:600;}
.msg-row .msg-meta .msg-time{font-size:10px;color:rgba(0,0,0,.35);}
.msg-row .sender-avatar{width:36px;height:36px;border-radius:12px;object-fit:cover;flex-shrink:0;align-self:flex-start;background:#eee;}
.msg-row.me .sender-avatar{display:none;}
.msg-group-name{font-size:12px;font-weight:600;color:rgba(0,0,0,.5);margin-bottom:2px;margin-left:48px;}

/* TYPING INDICATOR */
.typing-indicator{display:none;align-items:center;gap:8px;padding:8px 0;margin-left:48px;}
.typing-indicator.show{display:flex;}
.typing-indicator .dots{display:flex;gap:3px;}
.typing-indicator .dots span{width:6px;height:6px;background:rgba(0,0,0,.3);border-radius:50%;animation:typingBounce .6s infinite alternate;}
.typing-indicator .dots span:nth-child(2){animation-delay:.15s;}
.typing-indicator .dots span:nth-child(3){animation-delay:.3s;}
@keyframes typingBounce{0%{opacity:.3;transform:translateY(0);}100%{opacity:1;transform:translateY(-4px);}}
.typing-indicator .typing-text{font-size:12px;color:rgba(0,0,0,.4);}

/* INPUT BAR */
.input-bar{padding:12px 16px;background:#fff;display:flex;align-items:flex-end;gap:8px;box-shadow:0 -1px 3px rgba(0,0,0,.05);}
.input-bar .tool-btns{display:flex;gap:4px;padding-bottom:4px;}
.input-bar .tool-btns button{width:34px;height:34px;border:none;background:none;cursor:pointer;font-size:18px;border-radius:50%;transition:.2s;}
.input-bar .tool-btns button:hover{background:#f0f0f0;}
.input-bar .msg-input{flex:1;max-height:100px;min-height:40px;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;font-family:inherit;outline:none;resize:none;line-height:1.4;overflow-y:auto;transition:.2s;}
.input-bar .msg-input:focus{border-color:var(--yellow-dark);}
.input-bar .send-btn{width:40px;height:40px;border:none;background:var(--yellow);border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;margin-bottom:0;}
.input-bar .send-btn:hover{background:var(--yellow-dark);}
.input-bar .send-btn:disabled{background:#eee;cursor:default;}

/* EMOJI PICKER */
.emoji-picker{display:none;position:absolute;bottom:70px;left:16px;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:12px;width:300px;z-index:20;}
.emoji-picker.show{display:block;}
.emoji-picker .emojis{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
.emoji-picker .emojis button{width:34px;height:34px;border:none;background:none;font-size:20px;cursor:pointer;border-radius:8px;transition:.15s;}
.emoji-picker .emojis button:hover{background:#f0f0f0;}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(0,0,0,.3);}
.empty-state .icon{font-size:64px;margin-bottom:16px;}
.empty-state p{font-size:16px;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%;min-width:100%;position:absolute;inset:0;z-index:20;transition:transform .3s ease;}
  .app.chat-open .sidebar{transform:translateX(-100%);}
  .chat-area{width:100%;}
  .chat-header .back-btn{display:flex;align-items:center;justify-content:center;}
  .msg-row .bubble{max-width:78%;}
}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}

/* ANIMATIONS */
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row{animation:slideIn .2s ease;}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>채팅</h1>
      <div class="actions">
        <button title="새 채팅" onclick="alert('새 채팅 기능 (데모)')">&#x2795;</button>
        <button title="설정" onclick="alert('설정 (데모)')">&#x2699;&#xFE0F;</button>
      </div>
    </div>
    <div class="search-box">
      <input type="text" placeholder="채팅방 검색" id="searchInput" oninput="filterChats()">
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#x1F4AC;</div>
      <p>채팅방을 선택해주세요</p>
    </div>

    <div class="chat-header" id="chatHeader" style="display:none;">
      <button class="back-btn" onclick="goBack()">&#x2190;</button>
      <div class="avatar">
        <img id="headerAvatar" src="" alt="">
        <div class="status-dot" id="headerStatus"></div>
      </div>
      <div class="user-info">
        <div class="name" id="headerName"></div>
        <div class="status-text" id="headerStatusText"></div>
      </div>
      <div class="header-actions">
        <button title="검색">&#x1F50D;</button>
        <button title="통화">&#x1F4DE;</button>
        <button title="더보기">&#x22EE;</button>
      </div>
    </div>

    <div class="messages" id="messages" style="display:none;"></div>

    <div class="emoji-picker" id="emojiPicker">
      <div class="emojis" id="emojiGrid"></div>
    </div>

    <div class="input-bar" id="inputBar" style="display:none;">
      <div class="tool-btns">
        <button title="파일 첨부" onclick="alert('파일 첨부 (데모)')">&#x1F4CE;</button>
        <button title="이모지" onclick="toggleEmoji()">&#x1F600;</button>
      </div>
      <textarea class="msg-input" id="msgInput" placeholder="메시지를 입력하세요" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>&#x27A4;</button>
    </div>
  </div>
</div>

<script>

const chatRooms = [

    id: 1,
    name: '김민지',
    avatar: AVATARS[0],
    online: true,
    unread: 3,
    messages: [

      { sender: 'me', text: '안녕하세요~ 10시에 시작이에요!', time: '오전 9:15', read: true },
      { sender: 'other', text: '넵 감사합니다. 회의 자료는 준비됐나요?', time: '오전 9:16', read: true },
      { sender: 'me', text: '네, 어제 밤에 다 정리해뒀어요. 공유드릴게요.', time: '오전 9:18', read: true },
      { sender: 'other', text: '오 역시 빠르시네요! 👍', time: '오전 9:20', read: false },
      { sender: 'other', text: '아 그리고 점심 같이 먹을래요?', time: '오전 9:21', read: false },
      { sender: 'other', text: '새로 생긴 파스타집 가보고 싶어요', time: '오전 9:22', read: false }
    ]
  },
  {
    id: 2,
    name: '박서준',
    avatar: AVATARS[1],
    online: true,
    unread: 1,
    messages: [
      { sender: 'me', text: '형 주말에 뭐해요?', time: '어제', read: true },
      { sender: 'other', text: '아직 특별한 계획 없는데, 왜?', time: '어제', read: true },
      { sender: 'me', text: '같이 등산 갈래요? 북한산 코스 괜찮대요', time: '어제', read: true },
      { sender: 'other', text: '오 좋지! 몇 시에 출발할까?', time: '어제', read: true },
      { sender: 'me', text: '아침 7시에 만나서 출발하면 딱 좋을 것 같아요', time: '어제', read: true },
      { sender: 'other', text: '그래 그때 보자! 등산화 챙겨야겠다 ㅎㅎ', time: '어제', read: false }
    ]
  },
  {

    name: '이수현',
    avatar: AVATARS[2],
    online: false,

      { sender: 'other', text: '프로젝트 진행 상황 어떠세요?', time: '월요일', read: true },

      { sender: 'other', text: '오 빠르네요! API 연동은요?', time: '월요일', read: true },
      { sender: 'me', text: '내일부터 시작할 예정이에요. 백엔드 API 문서 보내주시면 바로 작업 들어갈게요', time: '월요일', read: true },
      { sender: 'other', text: '네 지금 바로 보내드릴게요. 수고하세요!', time: '월요일', read: true },

  },
  {

      { sender: 'me', text: '완전 재밌었어. 특히 마지막 반전이 대박이더라', time: '지난주', read: true },
      { sender: 'other', text: 'ㅋㅋㅋ 그치? 나도 그 부분에서 소름 돋았어', time: '지난주', read: true },
      { sender: 'me', text: '다음에 또 좋은 책 있으면 추천해줘!', time: '지난주', read: true },
      { sender: 'other', text: '응응 요즘 읽고 있는 거 있는데 다 읽으면 알려줄게', time: '지난주', read: true }
    ]

];

let currentRoom = null;

// ==================== EMOJI LIST ====================
const EMOJIS = ['😀','😂','🤣','😊','😍','🥰','😘','😎','🤗','🤔','😮','😱','😢','😭','🥺','😤','👍','👎','👏','🙏','💪','🔥','❤️','💛','💚','💙','🎉','🎊','✨','🌟','🍕','🍗','🍜','☕','🎵','📸','💻','📱','🚗','✈️','🏠','⏰','📌','✅','❌','💬','👋','🙌','💯','🌈'];

// ==================== INIT ====================
function init() {
  renderChatList();
  renderEmojiPicker();
  document.getElementById('msgInput').addEventListener('input', function() {
    document.getElementById('sendBtn').disabled = !this.value.trim();
  });
  document.addEventListener('click', function(e) {
    const picker = document.getElementById('emojiPicker');
    if (picker.classList.contains('show') && !picker.contains(e.target) && !e.target.closest('.tool-btns')) {
      picker.classList.remove('show');
    }
  });
}

// ==================== RENDER CHAT LIST ====================
function renderChatList(filter = '') {
  const list = document.getElementById('chatList');
  list.innerHTML = '';
  const filtered = chatRooms.filter(r => r.name.includes(filter) || r.messages.some(m => m.text.includes(filter)));
  filtered.forEach(room => {
    const lastMsg = room.messages[room.messages.length - 1];
    const div = document.createElement('div');
    div.className = 'chat-item' + (currentRoom && currentRoom.id === room.id ? ' active' : '');
    div.onclick = () => openChat(room.id);
    div.innerHTML = `
      <div class="avatar">
        <img src="${room.avatar}" alt="${room.name}">
        <div class="status-dot ${room.online ? 'online' : 'offline'}"></div>
      </div>
      <div class="info">
        <div class="top-row">
          <span class="name">${room.name}</span>
          <span class="time">${lastMsg.time}</span>
        </div>
        <div class="last-msg">${lastMsg.text}</div>
      </div>
      ${room.unread > 0 ? `<div class="unread-badge">${room.unread}</div>` : ''}
    `;
    list.appendChild(div);
  });
}

// ==================== OPEN CHAT ====================
function openChat(id) {
  currentRoom = chatRooms.find(r => r.id === id);
  if (!currentRoom) return;

  // Mark as read
  currentRoom.unread = 0;
  currentRoom.messages.forEach(m => m.read = true);

  // Update header
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('inputBar').style.display = 'flex';
  document.getElementById('headerAvatar').src = currentRoom.avatar;
  document.getElementById('headerName').textContent = currentRoom.name;
  document.getElementById('headerStatus').className = 'status-dot ' + (currentRoom.online ? 'online' : 'offline');
  document.getElementById('headerStatusText').textContent = currentRoom.online ? '온라인' : '오프라인';

  // Mobile
  document.getElementById('app').classList.add('chat-open');

  renderMessages();
  renderChatList(document.getElementById('searchInput').value);
  document.getElementById('msgInput').focus();
}

// ==================== RENDER MESSAGES ====================
function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  // Date divider
  const divider = document.createElement('div');
  divider.className = 'date-divider';
  divider.innerHTML = '<span>오늘</span>';
  container.appendChild(divider);

  currentRoom.messages.forEach((msg, i) => {
    // Show sender name for other's first message in group
    if (msg.sender === 'other') {
      const prev = currentRoom.messages[i - 1];
      if (!prev || prev.sender !== 'other') {
        const nameDiv = document.createElement('div');
        nameDiv.className = 'msg-group-name';
        nameDiv.textContent = currentRoom.name;
        container.appendChild(nameDiv);
      }
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + msg.sender;

    const prev = currentRoom.messages[i - 1];
    const showAvatar = msg.sender === 'other' && (!prev || prev.sender !== 'other');

    row.innerHTML = `
      ${msg.sender === 'other' ? `<img class="sender-avatar" src="${showAvatar ? currentRoom.avatar : ''}" alt="" style="${showAvatar ? '' : 'visibility:hidden'}">` : ''}
      <div class="bubble">${escapeHtml(msg.text)}</div>
      <div class="msg-meta">
        ${msg.sender === 'me' && msg.read ? '<span class="read">읽음</span>' : ''}
        <span class="msg-time">${msg.time}</span>
      </div>
    `;
    container.appendChild(row);
  });

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.id = 'typingIndicator';
  typing.innerHTML = `
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="typing-text">${currentRoom.name}님이 입력 중...</span>
  `;
  container.appendChild(typing);

  container.scrollTop = container.scrollHeight;
}

// ==================== SEND MESSAGE ====================
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentRoom) return;

  const now = new Date();
  const timeStr = formatTime(now);

  currentRoom.messages.push({ sender: 'me', text, time: timeStr, read: false });
  input.value = '';
  input.style.height = '40px';
  document.getElementById('sendBtn').disabled = true;
  renderMessages();
  renderChatList(document.getElementById('searchInput').value);

  // Show typing then auto reply
  setTimeout(() => {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.classList.add('show');
    const msgContainer = document.getElementById('messages');
    if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
  }, 600);

  setTimeout(() => {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.classList.remove('show');

    const replyTime = formatTime(new Date());
    const reply = AUTO_REPLIES[Math.floor(Math.random() * AUTO_REPLIES.length)];
    currentRoom.messages.push({ sender: 'other', text: reply, time: replyTime, read: true });

    // Mark my last message as read
    for (let i = currentRoom.messages.length - 1; i >= 0; i--) {
      if (currentRoom.messages[i].sender === 'me') {
        currentRoom.messages[i].read = true;
        break;
      }
    }

    renderMessages();
    renderChatList(document.getElementById('searchInput').value);
  }, 1500 + Math.random() * 1500);
}

// ==================== EMOJI ====================
function renderEmojiPicker() {
  const grid = document.getElementById('emojiGrid');
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => {
      const input = document.getElementById('msgInput');
      input.value += emoji;
      input.focus();
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('emojiPicker').classList.remove('show');
    };
    grid.appendChild(btn);
  });
}

function toggleEmoji() {
  document.getElementById('emojiPicker').classList.toggle('show');
}

// ==================== HELPERS ====================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '40px';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function goBack() {
  document.getElementById('app').classList.remove('chat-open');
}

function filterChats() {
  renderChatList(document.getElementById('searchInput').value);
}

function formatTime(date) {
  const h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, '0');
  const period = h < 12 ? '오전' : '오후';
  const h12 = h % 12 || 12;
  return `${period} ${h12}:${m}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ==================== START ====================
init();
</script>
</body>
