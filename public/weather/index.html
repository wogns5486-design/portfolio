<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --glass-bg:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.18);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.18);
  --text:#fff;
  --text-secondary:rgba(255,255,255,0.7);
  --text-tertiary:rgba(255,255,255,0.5);
  --radius:20px;
  --radius-sm:14px;
}
html{font-size:16px}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text);
  min-height:100vh;
  transition:background .8s ease;
  overflow-x:hidden;
}
/* backgrounds */
body.bg-clear{background:linear-gradient(135deg,#1a8fe3 0%,#56b4f9 40%,#7ec8f8 100%)}
body.bg-cloudy{background:linear-gradient(135deg,#636e7b 0%,#8e99a4 40%,#a3b1bf 100%)}
body.bg-rain{background:linear-gradient(135deg,#1b2838 0%,#2c3e50 40%,#34495e 100%)}
body.bg-snow{background:linear-gradient(135deg,#a8c0d6 0%,#c4d7e8 40%,#dce9f3 100%)}
body.bg-night{background:linear-gradient(135deg,#0f0c29 0%,#1a1a3e 40%,#24243e 100%)}

.app{max-width:480px;margin:0 auto;padding:20px 16px 40px;position:relative}

/* Search */
.search-wrap{position:relative;margin-bottom:24px}
.search-wrap input{
  width:100%;padding:14px 48px 14px 20px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:16px;
  color:#fff;font-size:15px;font-weight:500;
  outline:none;transition:all .3s;
}
.search-wrap input::placeholder{color:var(--text-tertiary)}
.search-wrap input:focus{border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.18)}
.search-wrap .icon{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:.5;pointer-events:none;
}
.suggestions{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:100;
  background:rgba(30,30,50,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:14px;
  overflow:hidden;display:none;
}
.suggestions.show{display:block}
.suggestions .item{
  padding:12px 20px;cursor:pointer;font-size:14px;font-weight:500;
  transition:background .15s;
}
.suggestions .item:hover,.suggestions .item.active{background:rgba(255,255,255,0.1)}

/* Location header */
.location{text-align:center;margin-bottom:4px}
.location h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.location .desc{font-size:14px;color:var(--text-secondary);font-weight:500;margin-top:2px}

/* Main weather */
.main-weather{text-align:center;padding:20px 0 24px}
.main-weather .emoji{font-size:80px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15))}
.main-weather .temp{font-size:84px;font-weight:800;letter-spacing:-4px;line-height:1}
.main-weather .temp span{font-size:40px;font-weight:600;vertical-align:super;letter-spacing:0}
.main-weather .condition{font-size:18px;font-weight:600;margin-top:4px}

/* Quick stats row */
.quick-stats{
  display:flex;gap:8px;margin-bottom:16px;
}
.quick-stat{
  flex:1;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  padding:14px 8px;text-align:center;
}
.quick-stat .label{font-size:11px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.quick-stat .value{font-size:17px;font-weight:700}
.quick-stat .unit{font-size:11px;font-weight:500;color:var(--text-secondary)}

/* Glass card */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--glass-shadow);
  padding:20px;margin-bottom:16px;
}
.glass .card-title{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-tertiary);margin-bottom:14px;
}

/* Hourly forecast */
.hourly-scroll{
  display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.hourly-scroll::-webkit-scrollbar{display:none}
.hour-item{
  flex:0 0 auto;text-align:center;min-width:58px;
  padding:10px 6px;border-radius:28px;transition:background .2s;
}
.hour-item.now{background:rgba(255,255,255,0.18)}
.hour-item .time{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px}
.hour-item .h-emoji{font-size:22px;margin-bottom:6px}
.hour-item .h-temp{font-size:15px;font-weight:700}

/* Weekly forecast */
.week-item{
  display:flex;align-items:center;padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.week-item:last-child{border-bottom:none}
.week-item .day{width:44px;font-size:14px;font-weight:600;color:var(--text-secondary)}
.week-item .day.today{color:#fff}
.week-item .w-emoji{font-size:22px;width:36px;text-align:center}
.week-item .pop{width:44px;font-size:12px;color:rgba(100,180,255,0.9);font-weight:600;text-align:center}
.week-item .temp-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;margin:0 8px}
.week-item .temp-low,.week-item .temp-high{font-size:14px;font-weight:600;width:30px}
.week-item .temp-low{color:var(--text-secondary);text-align:right}
.week-item .temp-high{text-align:left}
.week-item .bar-track{
  flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.week-item .bar-fill{
  position:absolute;height:100%;border-radius:3px;
  background:linear-gradient(90deg,#64b5f6,#ffb74d,#ef5350);
  transition:left .4s,right .4s;
}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item{
  background:rgba(255,255,255,0.06);
  border-radius:var(--radius-sm);
  padding:16px;
}
.detail-item .d-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.detail-item .d-value{font-size:22px;font-weight:700}
.detail-item .d-sub{font-size:12px;color:var(--text-secondary);margin-top:4px;font-weight:500}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
.fade-up:nth-child(2){animation-delay:.05s}
.fade-up:nth-child(3){animation-delay:.1s}
.fade-up:nth-child(4){animation-delay:.15s}
.fade-up:nth-child(5){animation-delay:.2s}
.fade-up:nth-child(6){animation-delay:.25s}

/* Responsive */
@media(max-width:400px){
  .main-weather .temp{font-size:68px}
  .main-weather .emoji{font-size:64px}
  .quick-stats{flex-wrap:wrap}
  .quick-stat{flex:0 0 calc(50% - 4px)}
}
</style>
</head>

};

const conditionEmoji = {
  clear: "☀️", partly: "⛅", cloudy: "☁️", rain: "🌧️", snow: "🌨️"
};

const conditionLabel = {
  clear: "맑음", partly: "구름 조금", cloudy: "흐림", rain: "비", snow: "눈"
};

// State
let currentCity = "서울";

// Elements
const searchInput = document.getElementById("searchInput");
const suggestionsEl = document.getElementById("suggestions");

// Format date
function getDateStr() {
  const d = new Date();
  const days = ["일","월","화","수","목","금","토"];
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

// UV description
function uvDesc(v) {
  if (v <= 2) return "낮음";
  if (v <= 5) return "보통";
  if (v <= 7) return "높음";
  if (v <= 10) return "매우 높음";
  return "위험";
}

// Render city
function render(name) {
  currentCity = name;
  const c = cities[name];
  if (!c) return;

  // Background
  document.body.className = "bg-" + c.bg;

  // Header
  document.getElementById("cityName").textContent = name;
  document.getElementById("dateDesc").textContent = getDateStr();

  // Main
  document.getElementById("mainEmoji").textContent = c.emoji;
  document.getElementById("mainTemp").innerHTML = c.temp + '<span>°</span>';
  document.getElementById("mainCondition").textContent = c.condition;

  // Quick stats
  document.getElementById("feelsLike").textContent = c.feelsLike + "°";
  document.getElementById("humidity").innerHTML = c.humidity + '<span class="unit">%</span>';
  document.getElementById("wind").innerHTML = c.wind + '<span class="unit">m/s</span>';
  document.getElementById("uv").textContent = c.uv + " " + uvDesc(c.uv);

  // Hourly
  const now = new Date().getHours();
  const hourlyHTML = [];
  for (let i = 0; i < 24; i++) {
    const h = (now + i) % 24;
    const t = c.hourlyBase[(now + i) % 24];
    const cond = c.hourlyConditions[(now + i) % 24];
    const label = i === 0 ? "지금" : (h < 10 ? "0" : "") + h + "시";
    hourlyHTML.push(
      `<div class="hour-item${i===0?' now':''}">
        <div class="time">${label}</div>
        <div class="h-emoji">${conditionEmoji[cond] || "☀️"}</div>
        <div class="h-temp">${t}°</div>
      </div>`
    );
  }
  document.getElementById("hourlyScroll").innerHTML = hourlyHTML.join("");

  // Weekly
  const allLo = c.weekly.map(w => w.lo);
  const allHi = c.weekly.map(w => w.hi);
  const minT = Math.min(...allLo);
  const maxT = Math.max(...allHi);
  const range = maxT - minT || 1;

  const weekHTML = c.weekly.map((w, i) => {
    const left = ((w.lo - minT) / range) * 100;
    const right = 100 - ((w.hi - minT) / range) * 100;
    return `<div class="week-item">
      <div class="day${i===0?' today':''}">${w.day}</div>
      <div class="w-emoji">${w.emoji}</div>
      <div class="pop">${w.pop > 0 ? w.pop + '%' : ''}</div>
      <div class="temp-bar-wrap">
        <div class="temp-low">${w.lo}°</div>
        <div class="bar-track">
          <div class="bar-fill" style="left:${left}%;right:${right}%"></div>
        </div>
        <div class="temp-high">${w.hi}°</div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("weeklyList").innerHTML = weekHTML;

  // Detail
  document.getElementById("detailGrid").innerHTML = `
    <div class="detail-item">
      <div class="d-label">일출</div>
      <div class="d-value">${c.sunrise}</div>
      <div class="d-sub">오전</div>
    </div>
    <div class="detail-item">
      <div class="d-label">일몰</div>
      <div class="d-value">${c.sunset}</div>
      <div class="d-sub">오후</div>
    </div>
    <div class="detail-item">
      <div class="d-label">기압</div>
      <div class="d-value">${c.pressure}</div>
      <div class="d-sub">hPa</div>
    </div>
    <div class="detail-item">
      <div class="d-label">가시거리</div>
      <div class="d-value">${c.visibility}</div>
      <div class="d-sub">km</div>
    </div>
  `;

  // Re-trigger animations
  document.querySelectorAll('.fade-up').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
}

// Search
const cityNames = Object.keys(cities);

searchInput.addEventListener("input", function() {
  const q = this.value.trim();
  if (!q) { suggestionsEl.classList.remove("show"); return; }
  const matches = cityNames.filter(n => n.includes(q));
  if (matches.length === 0) { suggestionsEl.classList.remove("show"); return; }
  suggestionsEl.innerHTML = matches.map(m => `<div class="item" data-city="${m}">${m}</div>`).join("");
  suggestionsEl.classList.add("show");
});

suggestionsEl.addEventListener("click", function(e) {
  const item = e.target.closest(".item");
  if (!item) return;
  const city = item.dataset.city;
  searchInput.value = "";
  suggestionsEl.classList.remove("show");
  render(city);
});

searchInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const q = this.value.trim();
    const match = cityNames.find(n => n.includes(q));
    if (match) {
      searchInput.value = "";
      suggestionsEl.classList.remove("show");
      render(match);
    }
  }
});

document.addEventListener("click", function(e) {
  if (!e.target.closest(".search-wrap")) {
    suggestionsEl.classList.remove("show");
  }
});

// Init
render("서울");
</script>
</body>
</html>
