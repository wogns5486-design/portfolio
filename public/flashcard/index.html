<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 플래시카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --primary: #4f6ef7;
  --primary-hover: #3b5de7;
  --success: #22c55e;
  --success-bg: #dcfce7;
  --danger: #ef4444;
  --danger-bg: #fee2e2;
  --warning: #f59e0b;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.1);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ─── Header ─── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-actions { display: flex; gap: 8px; }

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: .875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: transparent; color: var(--text-secondary); padding: 8px; }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: .8rem; }
.btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; border-radius: 10px; }

/* ─── Layout ─── */
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 4px;
  border: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: .875rem;
  font-weight: 600;
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
}
.tab.active { background: var(--primary); color: #fff; }
.tab:not(.active):hover { background: var(--bg); }

/* ─── Section ─── */
.section { display: none; }
.section.active { display: block; }

/* ─── Deck List ─── */
.deck-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.deck-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.deck-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-2px); }
.deck-card.selected { border-color: var(--primary); background: #f0f4ff; }
.deck-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.deck-card .count { font-size: .8rem; color: var(--text-secondary); }
.deck-card .deck-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity .15s;
}
.deck-card:hover .deck-actions { opacity: 1; }
.deck-card .deck-color {
  width: 32px; height: 4px; border-radius: 2px; margin-bottom: 12px;
}

/* ─── Card List ─── */
.word-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.word-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all .15s;
}
.word-item:hover { box-shadow: var(--shadow); }
.word-item .word-en { font-weight: 600; }
.word-item .word-ko { color: var(--text-secondary); font-size: .9rem; }
.word-item .word-text { display: flex; flex-direction: column; gap: 2px; }
.word-item .word-actions { display: flex; gap: 4px; }

/* ─── Add Form ─── */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }
.input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: .9rem;
  outline: none;
  transition: border .15s;
  background: var(--bg);
}
.input:focus { border-color: var(--primary); background: #fff; }

/* ─── Flashcard Study ─── */
.study-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.progress-wrap { width: 100%; margin-bottom: 20px; }
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #8b5cf6);
  border-radius: 3px;
  transition: width .3s;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: .8rem;
  color: var(--text-secondary);
  margin-top: 6px;
}

.flashcard-scene {
  perspective: 1000px;
  width: 100%;
  max-width: 480px;
  height: 280px;
  margin: 0 auto 24px;
  cursor: pointer;
}
.flashcard {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,.0,.2,1);
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  box-shadow: var(--shadow-lg);
  border: 1.5px solid var(--border);
}
.flashcard-front {
  background: linear-gradient(145deg, #fff, #f8faff);
}
.flashcard-back {
  background: linear-gradient(145deg, #f0f4ff, #e8eeff);
  transform: rotateY(180deg);
}
.flashcard-label {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.flashcard-word {
  font-size: 2rem;
  font-weight: 800;
  text-align: center;
  word-break: keep-all;
}
.flashcard-hint {
  font-size: .8rem;
  color: var(--text-secondary);
  margin-top: 16px;
}

.study-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
.study-controls .btn { min-width: 100px; padding: 12px 20px; font-size: .95rem; }
.study-nav {
  display: flex;
  justify-content: center;
  gap: 8px;
}

/* ─── Stats ─── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-align: center;
}
.stat-num { font-size: 1.5rem; font-weight: 800; }
.stat-label { font-size: .75rem; color: var(--text-secondary); margin-top: 2px; }
.stat-card.correct .stat-num { color: var(--success); }
.stat-card.wrong .stat-num { color: var(--danger); }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  padding: 16px;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform .2s;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
.modal .form-row { flex-direction: column; }
.modal label { font-size: .85rem; font-weight: 600; margin-bottom: 4px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ─── Empty State ─── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-secondary);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty h3 { color: var(--text); margin-bottom: 6px; }

/* ─── Toast ─── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: .875rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s, toastOut .3s 2.2s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-12px); } }

/* ─── Study Complete ─── */
.study-complete {
  text-align: center;
  padding: 48px 24px;
}
.study-complete h2 { font-size: 1.5rem; margin-bottom: 8px; }
.study-complete p { color: var(--text-secondary); margin-bottom: 24px; }

/* ─── Responsive ─── */
@media (max-width: 480px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.05rem; }
  .container { padding: 16px 12px; }
  .tabs { flex-wrap: wrap; }
  .tab { font-size: .8rem; padding: 8px; }
  .form-row { flex-direction: column; }
  .flashcard-scene { height: 240px; }
  .flashcard-word { font-size: 1.5rem; }
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-card { padding: 12px 8px; }
  .stat-num { font-size: 1.2rem; }
  .study-controls .btn { min-width: 80px; padding: 10px 14px; font-size: .85rem; }
  .deck-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <h1>Flashcard</h1>
  <div class="header-actions">
    <button class="btn btn-ghost btn-icon" onclick="exportData()" title="내보내기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="btn btn-ghost btn-icon" onclick="document.getElementById('importFile').click()" title="가져오기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="importFile" accept=".json" hidden onchange="importData(event)">
  </div>
</header>

<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="decks">데크 관리</button>
    <button class="tab" data-tab="cards">단어 목록</button>
    <button class="tab" data-tab="study">학습</button>
  </div>

  <!-- ═══ Deck Section ═══ -->
  <div id="sec-decks" class="section active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:1.1rem;font-weight:700;">내 데크</h2>
      <button class="btn btn-primary btn-sm" onclick="openDeckModal()">+ 새 데크</button>
    </div>
    <div id="deckGrid" class="deck-grid"></div>
    <div id="deckEmpty" class="empty" style="display:none;">
      <div class="empty-icon">📚</div>
      <h3>데크가 없습니다</h3>
      <p>새 데크를 만들어 단어를 추가하세요.</p>
    </div>
  </div>

  <!-- ═══ Cards Section ═══ -->
  <div id="sec-cards" class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <h2 style="font-size:1.1rem;font-weight:700;">단어 목록</h2>
        <select id="cardDeckSelect" class="input" style="flex:none;width:auto;padding:6px 12px;font-size:.85rem;" onchange="renderCards()"></select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="toggleAddForm()">+ 단어 추가</button>
    </div>
    <div id="addFormWrap" class="add-form" style="display:none;">
      <div class="form-row">
        <input type="text" id="inputEn" class="input" placeholder="영어 단어">
        <input type="text" id="inputKo" class="input" placeholder="한국어 뜻">
      </div>
      <div class="form-row">
        <button class="btn btn-primary" onclick="addCard()">추가</button>
        <button class="btn btn-outline" onclick="toggleAddForm()">취소</button>
      </div>
    </div>
    <div id="wordList" class="word-list"></div>
    <div id="cardEmpty" class="empty" style="display:none;">
      <div class="empty-icon">🃏</div>
      <h3>단어가 없습니다</h3>
      <p>위 버튼으로 단어를 추가하세요.</p>
    </div>
  </div>

  <!-- ═══ Study Section ═══ -->
  <div id="sec-study" class="section">
    <div class="study-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <h2 style="font-size:1.1rem;font-weight:700;">학습 모드</h2>
        <select id="studyDeckSelect" class="input" style="flex:none;width:auto;padding:6px 12px;font-size:.85rem;" onchange="initStudy()"></select>
      </div>
      <button class="btn btn-outline btn-sm" onclick="shuffleStudy()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        셔플
      </button>
    </div>

    <div id="studyArea">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체</div></div>
        <div class="stat-card correct"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">맞음</div></div>
        <div class="stat-card wrong"><div class="stat-num" id="statWrong">0</div><div class="stat-label">틀림</div></div>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text">
          <span id="progressLabel">0 / 0</span>
          <span id="progressPct">0%</span>
        </div>
      </div>

      <!-- Card -->
      <div class="flashcard-scene" id="flashcardScene" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-face flashcard-front">
            <div class="flashcard-label">English</div>
            <div class="flashcard-word" id="cardFront">—</div>
            <div class="flashcard-hint">클릭하여 뒤집기</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="flashcard-label">한국어</div>
            <div class="flashcard-word" id="cardBack">—</div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="study-controls">
        <button class="btn btn-danger" onclick="markWrong()">틀림</button>
        <button class="btn btn-success" onclick="markCorrect()">맞음</button>
      </div>
      <div class="study-nav">
        <button class="btn btn-outline btn-sm" onclick="prevCard()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          이전
        </button>
        <button class="btn btn-outline btn-sm" onclick="nextCard()">
          다음
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- Complete -->
    <div id="studyComplete" class="study-complete" style="display:none;">
      <div style="font-size:3rem;margin-bottom:12px;">🎉</div>
      <h2>학습 완료!</h2>
      <p id="completeMsg"></p>
      <div class="stats-row" style="max-width:360px;margin:0 auto 20px;">
        <div class="stat-card correct"><div class="stat-num" id="finalCorrect">0</div><div class="stat-label">맞음</div></div>
        <div class="stat-card wrong"><div class="stat-num" id="finalWrong">0</div><div class="stat-label">틀림</div></div>
        <div class="stat-card"><div class="stat-num" id="finalRate">0%</div><div class="stat-label">정답률</div></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn btn-primary" onclick="initStudy()">다시 학습</button>
        <button class="btn btn-outline" onclick="studyWrongOnly()">틀린 단어만</button>
      </div>
    </div>

    <div id="studyEmpty" class="empty" style="display:none;">
      <div class="empty-icon">📖</div>
      <h3>학습할 단어가 없습니다</h3>
      <p>데크에 단어를 추가한 후 학습하세요.</p>
    </div>
  </div>
</div>

<!-- ═══ Deck Modal ═══ -->
<div class="modal-overlay" id="deckModal">
  <div class="modal">
    <h2 id="deckModalTitle">새 데크 만들기</h2>
    <div class="form-row">
      <label>데크 이름</label>
      <input type="text" id="deckNameInput" class="input" placeholder="예: TOEIC 필수 단어">
    </div>
    <div class="form-row">
      <label>색상</label>
      <div id="colorPicker" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeDeckModal()">취소</button>
      <button class="btn btn-primary" id="deckSaveBtn" onclick="saveDeck()">만들기</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
const COLORS = ['#4f6ef7','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4','#f97316','#6366f1'];
const LS_KEY = 'flashcard_app_data';

let data = loadData();
let editDeckId = null;
let studyCards = [];
let studyIdx = 0;
let studyCorrect = 0;
let studyWrong = 0;
let selectedColor = COLORS[0];

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { decks: [], cards: [] };
}

function saveData() {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

/* ─── Tabs ─── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'cards') renderCards();
    if (tab.dataset.tab === 'study') initStudy();
    if (tab.dataset.tab === 'decks') renderDecks();
  });
});

/* ─── Decks ─── */
function renderDecks() {
  const grid = document.getElementById('deckGrid');
  const empty = document.getElementById('deckEmpty');
  if (!data.decks.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = data.decks.map(d => {
    const cnt = data.cards.filter(c => c.deckId === d.id).length;
    return `<div class="deck-card" onclick="selectDeckAndGoCards('${d.id}')">
      <div class="deck-actions">
        <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();openEditDeck('${d.id}')" title="수정">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();deleteDeck('${d.id}')" title="삭제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      <div class="deck-color" style="background:${d.color}"></div>
      <h3>${esc(d.name)}</h3>
      <div class="count">${cnt}개 단어</div>
    </div>`;
  }).join('');
}

function selectDeckAndGoCards(id) {
  document.getElementById('cardDeckSelect').value = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector('[data-tab="cards"]').classList.add('active');
  document.getElementById('sec-cards').classList.add('active');
  renderCards();
}

function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div style="width:28px;height:28px;border-radius:8px;background:${c};cursor:pointer;border:3px solid ${c===selectedColor?'#1e293b':'transparent'};transition:border .15s;" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  selectedColor = c;
  renderColorPicker();
}

function openDeckModal(id) {
  editDeckId = id || null;
  const m = document.getElementById('deckModal');
  document.getElementById('deckModalTitle').textContent = id ? '데크 수정' : '새 데크 만들기';
  document.getElementById('deckSaveBtn').textContent = id ? '저장' : '만들기';
  if (id) {
    const d = data.decks.find(x => x.id === id);
    document.getElementById('deckNameInput').value = d.name;
    selectedColor = d.color;
  } else {
    document.getElementById('deckNameInput').value = '';
    selectedColor = COLORS[0];
  }
  renderColorPicker();
  m.classList.add('show');
  setTimeout(() => document.getElementById('deckNameInput').focus(), 100);
}

function closeDeckModal() {
  document.getElementById('deckModal').classList.remove('show');
  editDeckId = null;
}

function openEditDeck(id) { openDeckModal(id); }

function saveDeck() {
  const name = document.getElementById('deckNameInput').value.trim();
  if (!name) { toast('데크 이름을 입력하세요.'); return; }
  if (editDeckId) {
    const d = data.decks.find(x => x.id === editDeckId);
    d.name = name;
    d.color = selectedColor;
    toast('데크가 수정되었습니다.');
  } else {
    data.decks.push({ id: genId(), name, color: selectedColor });
    toast('새 데크가 생성되었습니다.');
  }
  saveData();
  closeDeckModal();
  renderDecks();
  populateDeckSelects();
}

function deleteDeck(id) {
  if (!confirm('이 데크와 포함된 모든 단어를 삭제할까요?')) return;
  data.decks = data.decks.filter(d => d.id !== id);
  data.cards = data.cards.filter(c => c.deckId !== id);
  saveData();
  renderDecks();
  populateDeckSelects();
  toast('데크가 삭제되었습니다.');
}

/* ─── Cards ─── */
function populateDeckSelects() {
  const opts = data.decks.map(d => `<option value="${d.id}">${esc(d.name)}</option>`).join('');
  document.getElementById('cardDeckSelect').innerHTML = opts;
  document.getElementById('studyDeckSelect').innerHTML = opts;
}

function getCurrentDeckId(selectId) {
  return document.getElementById(selectId).value;
}

function renderCards() {
  const deckId = getCurrentDeckId('cardDeckSelect');
  const cards = data.cards.filter(c => c.deckId === deckId);
  const list = document.getElementById('wordList');
  const empty = document.getElementById('cardEmpty');
  if (!cards.length) {
    list.innerHTML = '';
    empty.style.display = data.decks.length ? 'block' : 'none';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = cards.map(c => `
    <div class="word-item">
      <div class="word-text">
        <span class="word-en">${esc(c.en)}</span>
        <span class="word-ko">${esc(c.ko)}</span>
      </div>
      <div class="word-actions">
        <button class="btn btn-ghost btn-icon btn-sm" onclick="editCard('${c.id}')" title="수정">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="deleteCard('${c.id}')" title="삭제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function toggleAddForm() {
  const f = document.getElementById('addFormWrap');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') document.getElementById('inputEn').focus();
}

function addCard() {
  const en = document.getElementById('inputEn').value.trim();
  const ko = document.getElementById('inputKo').value.trim();
  const deckId = getCurrentDeckId('cardDeckSelect');
  if (!deckId) { toast('먼저 데크를 선택하세요.'); return; }
  if (!en || !ko) { toast('영어와 한국어를 모두 입력하세요.'); return; }
  data.cards.push({ id: genId(), deckId, en, ko });
  saveData();
  document.getElementById('inputEn').value = '';
  document.getElementById('inputKo').value = '';
  document.getElementById('inputEn').focus();
  renderCards();
  renderDecks();
  toast('단어가 추가되었습니다.');
}

function editCard(id) {
  const c = data.cards.find(x => x.id === id);
  const en = prompt('영어 단어:', c.en);
  if (en === null) return;
  const ko = prompt('한국어 뜻:', c.ko);
  if (ko === null) return;
  if (!en.trim() || !ko.trim()) { toast('빈 값은 입력할 수 없습니다.'); return; }
  c.en = en.trim();
  c.ko = ko.trim();
  saveData();
  renderCards();
  toast('단어가 수정되었습니다.');
}

function deleteCard(id) {
  if (!confirm('이 단어를 삭제할까요?')) return;
  data.cards = data.cards.filter(c => c.id !== id);
  saveData();
  renderCards();
  renderDecks();
  toast('단어가 삭제되었습니다.');
}

// Enter key in inputs
document.getElementById('inputEn').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputKo').focus();
});
document.getElementById('inputKo').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCard();
});

/* ─── Study ─── */
function initStudy() {
  const deckId = getCurrentDeckId('studyDeckSelect');
  const cards = data.cards.filter(c => c.deckId === deckId);
  startStudy(cards);
}

function startStudy(cards) {
  studyCards = [...cards];
  studyIdx = 0;
  studyCorrect = 0;
  studyWrong = 0;
  document.getElementById('studyComplete').style.display = 'none';

  if (!studyCards.length) {
    document.getElementById('studyArea').style.display = 'none';
    document.getElementById('studyEmpty').style.display = 'block';
    return;
  }
  document.getElementById('studyArea').style.display = 'block';
  document.getElementById('studyEmpty').style.display = 'none';
  updateStudyUI();
}

function updateStudyUI() {
  const total = studyCards.length;
  const answered = studyCorrect + studyWrong;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = studyCorrect;
  document.getElementById('statWrong').textContent = studyWrong;
  const pct = total ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${studyIdx + 1} / ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';

  const card = studyCards[studyIdx];
  document.getElementById('cardFront').textContent = card ? card.en : '—';
  document.getElementById('cardBack').textContent = card ? card.ko : '—';
  document.getElementById('flashcard').classList.remove('flipped');
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function markCorrect() {
  if (!studyCards.length) return;
  studyCorrect++;
  advanceCard();
}

function markWrong() {
  if (!studyCards.length) return;
  studyWrong++;
  if (!studyCards[studyIdx]._wrong) studyCards[studyIdx]._wrong = true;
  advanceCard();
}

function advanceCard() {
  if (studyIdx >= studyCards.length - 1) {
    showComplete();
    return;
  }
  studyIdx++;
  updateStudyUI();
}

function nextCard() {
  if (studyIdx < studyCards.length - 1) {
    studyIdx++;
    updateStudyUI();
  }
}

function prevCard() {
  if (studyIdx > 0) {
    studyIdx--;
    updateStudyUI();
  }
}

function shuffleStudy() {
  for (let i = studyCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyCards[i], studyCards[j]] = [studyCards[j], studyCards[i]];
  }
  studyIdx = 0;
  studyCorrect = 0;
  studyWrong = 0;
  updateStudyUI();
  toast('카드가 셔플되었습니다.');
}

function showComplete() {
  document.getElementById('studyArea').style.display = 'none';
  document.getElementById('studyComplete').style.display = 'block';
  const total = studyCorrect + studyWrong;
  const rate = total ? Math.round((studyCorrect / total) * 100) : 0;
  document.getElementById('finalCorrect').textContent = studyCorrect;
  document.getElementById('finalWrong').textContent = studyWrong;
  document.getElementById('finalRate').textContent = rate + '%';
  document.getElementById('completeMsg').textContent = `총 ${total}개 단어 중 ${studyCorrect}개를 맞혔습니다.`;
}

function studyWrongOnly() {
  const wrong = studyCards.filter(c => c._wrong);
  if (!wrong.length) { toast('틀린 단어가 없습니다!'); return; }
  wrong.forEach(c => delete c._wrong);
  startStudy(wrong);
  toast(`틀린 ${wrong.length}개 단어로 학습합니다.`);
}

/* ─── Keyboard shortcuts ─── */
document.addEventListener('keydown', e => {
  const sec = document.getElementById('sec-study');
  if (!sec.classList.contains('active') || !studyCards.length) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === '1' || e.key === 'x') markWrong();
  if (e.key === '2' || e.key === 'o') markCorrect();
});

/* ─── Import/Export ─── */
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'flashcard-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('데이터를 내보냈습니다.');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (imported.decks && imported.cards) {
        data = imported;
        saveData();
        renderDecks();
        populateDeckSelects();
        toast('데이터를 가져왔습니다.');
      } else {
        toast('올바른 형식이 아닙니다.');
      }
    } catch {
      toast('파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ─── Util ─── */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ─── Modal close on backdrop ─── */
document.getElementById('deckModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDeckModal();
});

/* ─── Init ─── */
function init() {
  // Seed sample deck if first time
  if (!data.decks.length) {
    const id = genId();
    data.decks.push({ id, name: '기본 단어장', color: '#4f6ef7' });
    data.cards.push(
      { id: genId(), deckId: id, en: 'apple', ko: '사과' },
      { id: genId(), deckId: id, en: 'book', ko: '책' },
      { id: genId(), deckId: id, en: 'computer', ko: '컴퓨터' },
      { id: genId(), deckId: id, en: 'dream', ko: '꿈' },
      { id: genId(), deckId: id, en: 'energy', ko: '에너지' },
      { id: genId(), deckId: id, en: 'freedom', ko: '자유' },
      { id: genId(), deckId: id, en: 'global', ko: '세계적인' },
      { id: genId(), deckId: id, en: 'happiness', ko: '행복' }
    );
    saveData();
  }
  populateDeckSelects();
  renderDecks();
}

init();
</script>
