<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowPanel — 이커머스 관리자 대시보드</title>
  <meta name="description" content="FlowPanel은 이커머스 비즈니스를 위한 올인원 관리자 대시보드입니다." />
  <meta name="author" content="FlowPanel" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ░░ Toast Container ░░ -->
<div id="toastContainer" class="toast-container"></div>

<!-- ░░ Modal Overlay ░░ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBody"></div>
</div>

<!-- ░░ Sidebar Overlay (mobile) ░░ -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ░░ Sidebar ░░ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    <span class="logo-text">Flow<em>Panel</em></span>
  </div>

  <div class="sidebar-section-label">메인 메뉴</div>
  <nav class="sidebar-nav">
    <a class="nav-item active" href="#" data-page="dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      대시보드
    </a>
    <a class="nav-item" href="#" data-page="orders">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      주문 관리
      <span class="nav-badge">10</span>
    </a>
    <a class="nav-item" href="#" data-page="members">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      회원 관리
    </a>
    <a class="nav-item" href="#" data-page="products">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      상품 관리
    </a>
    <a class="nav-item" href="#" data-page="analytics">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      매출 분석
    </a>
  </nav>

  <div class="sidebar-section-label">시스템</div>
  <nav class="sidebar-nav" style="padding-top:0">
    <a class="nav-item" href="#" data-page="settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>
      설정
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">KH</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Kim Hyunwoo</div>
        <div class="user-role">Super Admin</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#545e72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:auto;flex-shrink:0"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>
  </div>
</aside>

<!-- ░░ Main Wrapper ░░ -->
<div class="main-wrapper">

  <!-- Header -->
  <header class="header">
    <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="header-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="headerSearchInput" placeholder="검색… (Ctrl+K)" aria-label="검색" />
    </div>

    <div class="header-actions">
      <div class="notif-wrap">
        <button class="header-btn" id="notifBtn" aria-label="알림">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
        <div class="notif-dropdown" id="notifDropdown"></div>
      </div>

      <button class="header-btn" aria-label="캘린더" onclick="showToast('캘린더 기능은 준비 중입니다.','info')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>

      <div class="header-profile" role="button" tabindex="0" onclick="navigateTo('settings')">
        <div class="profile-avatar" id="headerAvatar">KH</div>
        <span class="profile-name" id="headerName">Kim Hyunwoo</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8892a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </header>

  <!-- Page Shell: persistent header row -->
  <div class="page-shell">
    <div class="page-title">
      <h1 id="pageTitle">대시보드 개요</h1>
      <p id="pageSubtitle">2025년 12월 기준 실시간 현황</p>
    </div>
    <div class="page-actions" id="pageActions"></div>
  </div>

  <!-- Dynamic content -->
  <main class="page-content" id="pageMain"></main>

</div><!-- /main-wrapper -->

<script src="script.js"></script>
</body>
</html>
